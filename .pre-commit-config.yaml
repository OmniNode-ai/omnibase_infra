# ONEX Infrastructure Pre-commit Configuration
# Mirrors omnibase_core settings for consistency across ONEX ecosystem
#
# PERFORMANCE OPTIMIZATION (2025-12):
# ====================================
# Two-stage validation strategy for optimal developer experience:
#
# PRE-COMMIT (target: <15 seconds):
#   - Formatting (ruff format/fix)
#   - Basic file checks (whitespace, large files, merge conflicts)
#   - Quick structural validations
#   - Security checks (secrets, private keys)
#
# PRE-PUSH (quick validation before sharing):
#   - mypy type checking (changed files only)
#
# Note: ruff replaces both black and isort (10-100x faster)
#
# USAGE:
#   pre-commit install                    # Install pre-commit hooks
#   pre-commit install --hook-type pre-push  # Install pre-push hooks
#   pre-commit run --all-files            # Run all pre-commit hooks
repos:
  # Stub implementation detection + transport-mock lint — sourced from omnibase_core.
  # Rev bumped to OMN-13026 (transport-mock-lint hook added).
  - repo: https://github.com/OmniNode-ai/omnibase_core
    rev: cfaa6ec863c3026b5e65196151ed76cdad13dae3 # pragma: allowlist secret
    hooks:
      - id: check-stub-implementations
      # OMN-13026: bare AsyncMock/MagicMock without spec=/spec_set= on
      # EventBus/transport/kafka surfaces. Ratchet: existing violations frozen
      # in config/validation/transport_mock_baseline.yaml (218 violations, 63 files).
      # New violations blocked. Drain tracked by OMN-13026 per-site tickets.
      - id: transport-mock-lint
        args: [--baseline, config/validation/transport_mock_baseline.yaml]
  # Canonical Inference Gate (OMN-13249, fleet rollout of OMN-13219).
  # Rejects NEW non-canonical model-inference surfaces: shelled model CLIs
  # (codex/claude/gemini/opencode) and *_MODEL/*_PROVIDER env reads. Structural
  # carve-out: a model-CLI shell-out is permitted iff the enclosing node
  # contract.yaml declares descriptor.agent_invocation: true (a contract fact,
  # never a free-text comment). Ratchet: existing violations grandfathered in the
  # shared baseline at omnibase_core/src/omnibase_core/validation/baselines/canonical_inference_baseline.json;
  # baseline is burn-down only. Suppression: # canonical-inference-ok: <reason>
  - repo: https://github.com/OmniNode-ai/omnibase_core
    rev: 940d2f2ab44d2f455a607926674b90ecbc9b74ba # pragma: allowlist secret
    hooks:
      - id: check-canonical-inference
        args: [--repo, omnibase_infra, --repo-root, .]
        exclude: ^(tests/|archived/|archive/).*\.py$
  # URL Authority Gate (OMN-13298, child of OMN-12803).
  # Ratchet: NEW fingerprints fail; existing violations grandfathered in the
  # shared baseline at omnibase_core/src/omnibase_core/validation/baselines/url_authority_baseline.json.
  # Baseline is burn-down only. Suppress with: # url-authority-ok: <reason>
  - repo: https://github.com/OmniNode-ai/omnibase_core
    rev: c93c98c92bd1a5b335d7aa504a8cf63dc029b3e7 # pragma: allowlist secret
    hooks:
      - id: check-url-authority
        args: [--repo, omnibase_infra, --repo-root, .]
        exclude: ^(tests/|archived/|archive/).*\.py$
  # Hardcoded topic guard — sourced from onex_change_control (OMN-5256/OMN-5259)
  # Pre-existing violations excluded pending migration to canonical constants (OMN-5259)
  # OMN-13195 (phase A4): dropped the redundant `event_bus/topic_constants.py`
  # exclude — the hook already approves that basename via its internal
  # APPROVED_BASENAMES (check_hardcoded_topics.py), so the path-regex exclude was
  # a no-op.
  # OMN-13199 (phase A5): topic_constants.py is now fully un-allowlisted from the
  # local topic-literal gate (check_topic_literals.py) after OMN-13202 deleted its
  # last TOPIC_* literals. The file holds DLQ builders only and the gate now fails
  # closed on any reintroduced literal — A5-full is complete.
  - repo: https://github.com/OmniNode-ai/onex_change_control
    rev: 8d7e85bc00e7f1b1306d1cb40949be1ab6e7e91a # pragma: allowlist secret
    hooks:
      - id: no-hardcoded-topics
        exclude: ^(src/omnibase_infra/(enums/generated|cli|tui|models/registration/model_event_bus_topic_entry\.py|nodes/.*/handlers|nodes/.*/services|nodes/.*/contracts|runtime/contract_registration_event_router\.py|services/observability|services/service_timeout_emitter\.py|topics/service_topic_registry\.py|validation|contracts/)|scripts/|tests/|contracts/|src/dep_health_allowlist\.yaml)
      - id: no-bare-feature-flags
        # YAML formatting (standard across ecosystem)
      - id: no-untracked-todos
        stages: [pre-commit]
  - repo: https://github.com/google/yamlfmt
    rev: v0.17.2
    hooks:
      - id: yamlfmt
        exclude: ^(archived/|tests/fixtures/|tests/unit/registry/fixtures/|\.github/workflows/)
  # Essential file formatting (standard across ecosystem)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^\.github/workflows/
      - id: end-of-file-fixer
        exclude: ^\.github/workflows/
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
  # OMN-13220: shellcheck the deploy surface this repo owns. Scoped to
  # deploy-runtime.sh + its runtime_build sibling scripts (the deploy crash-loop
  # blast radius) rather than all 56 scripts/*.sh, so the gate enforces real
  # defects without a 56-script pre-existing-cleanup detour. SC1091 (sourced
  # host-env files shellcheck cannot follow) is silenced in .shellcheckrc.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: shellcheck (deploy-runtime surface)
        files: ^scripts/(deploy-runtime\.sh|runtime_build/.*\.sh)$
        stages: [pre-commit]
  # actionlint (GitHub Actions linting) is intentionally NOT wired as a
  # repo-wide pre-commit hook in this PR: a baseline run flags pre-existing
  # findings across ~20 unrelated workflows (embedded-shellcheck style nits +
  # an actionlint secret-name case-normalization quirk in
  # dependency-cascade.yml). This PR touches no workflow files, so adding the
  # gate here would ship a hook that is red on day one over code this ticket
  # did not author — detection without a clean baseline, which Rule 5 prohibits.
  # actionlint is run ad-hoc in CI verification for OMN-13220; wiring it as a
  # required gate is tracked as its own workflow-cleanup follow-up.
  # ONEX Python Development Hooks (from shared templates)
  # Order: ruff format → ruff check → mypy (formatting before linting before type checking)
  # Note: ruff replaces both black and isort (10-100x faster)
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format (auto-format)
        entry: uv run --frozen ruff format
        language: system
        types: [python]
        exclude: ^(archived/|tests/fixtures/|\.github/workflows/|src/omnibase_infra/enums/generated/).*$
        stages: [pre-commit]
      - id: ruff-fix
        name: ruff check (auto-fix linting + import sorting)
        entry: uv run --frozen ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
        exclude: ^(archived/|tests/fixtures/|\.github/workflows/|src/omnibase_infra/enums/generated/).*$
        stages: [pre-commit]
        # Note: --exit-non-zero-on-fix ensures pre-commit fails if files were modified,
        # forcing you to re-stage the changes. This keeps pre-commit and CI in sync.
      - id: mypy-type-check
        name: mypy (type checking)
        entry: bash -c 'uv run --frozen mypy "$@" --show-error-codes --no-error-summary' --
        language: system
        types: [python]
        files: ^src/omnibase_infra/.*\.py$
        exclude: ^(tests/|archived/).*\.py$
        pass_filenames: true # Only check changed files, not entire codebase
        stages: [pre-push] # Moved to pre-push: ~1-5s for changed files only
      # Cleanup: Clear tmp/ directory before commits
      - id: clean-tmp-directory
        name: Clean tmp directory
        entry: bash -c "rm -rf tmp/* 2>/dev/null || true"
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
      - id: lint-pricing-manifest
        name: Lint pricing manifest seed keys
        entry: uv run --frozen python scripts/lint_pricing_manifest.py
        language: system
        files: ^src/omnibase_infra/configs/pricing_manifest\.yaml$
        pass_filenames: true
        stages: [pre-commit]
      - id: reject-node-implementations
        name: Reject unallowlisted node handlers (belong in omnimarket)
        entry: bash scripts/ci/reject-node-implementations.sh --staged
        language: system
        files: ^src/omnibase_infra/nodes/[^/]+/handlers/.*\.py$
        pass_filenames: false
        stages: [pre-commit]
      # OMN-12965: enforce runtime image identity stamping (version + revision).
      # A blank/placeholder identity degrades every proof packet. Guards both the
      # Dockerfile workspace-mode identity guard and the cmd_up build-arg wiring.
      - id: check-runtime-image-identity
        name: Enforce runtime image identity labels (OMN-12965)
        entry: uv run --frozen python scripts/check_runtime_image_identity.py
        language: system
        files: ^(docker/Dockerfile\.runtime|src/omnibase_infra/docker/catalog/cli\.py)$
        pass_filenames: false
        stages: [pre-commit]
      # OMN-11069: Block new os.environ/os.getenv reads outside approved overlay modules
      - id: check-env-reads
        name: Block new os.environ reads (use overlay-resolved config)
        entry: scripts/check-env-reads.sh --staged
        language: script
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
  # ONEX Validation Hooks (infrastructure-specific)
  - repo: local
    hooks:
      # Migration freeze enforcement - block new migrations during DB-per-repo refactor
      - id: onex-validate-migration-freeze
        name: ONEX Migration Freeze Enforcement
        entry: uv run --frozen python scripts/validate.py migration_freeze
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: onex-validate-migration-sequence
        name: ONEX Migration Sequence Duplicate Check
        entry: uv run --frozen python scripts/validation/validate_migration_sequence.py
        language: system
        pass_filenames: false
        always_run: false
        stages: [pre-commit]
      # OMN-12559 / OMN-13124: vendored omnimarket node migrations must stay in
      # sync with source. MUST always_run — the prior files:-scoped trigger only
      # fired when a file under docker/migrations/forward/nodes/ (or the sync
      # script) was staged. A node migration added in the *omnimarket* repo
      # (e.g. node_projection_pattern_learning, OMN-13124) never touches those
      # infra paths, so the hook silently passed and the un-vendored migration
      # merged — the table was missing in omnidash_analytics on a clean redeploy
      # (golden-chain run12 Finding). always_run closes that gap. The script
      # itself returns exit 2 (gate fires) when the omnimarket source is
      # unresolvable unless SYNC_NODE_MIGRATIONS_SKIP_UNRESOLVABLE=1.
      - id: onex-check-node-migration-sync
        name: ONEX Node Migration Vendor Sync Check
        entry: bash scripts/sync-node-migrations.sh --check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      # Reject any staged .env file at any path depth (OMN-2476)
      # Uses (^|/)\.env([._-].+)?$ to block root/.env, config/.env, .env.production, .env.staging,
      # .env_local, .env_production, .env-secret, etc. (dot-separated, underscore-separated, and
      # hyphen-separated variants).
      - id: no-env-file
        name: Reject committed .env files (anywhere in tree)
        entry: 'bash -c ''if git diff --cached --name-only | grep -qE "(^|/)\.env([._-].+)?$"; then echo "BLOCKED: .env staged — use ~/.omnibase/.env (root and subdir .env files rejected)"; exit 1; fi'''
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      # Root directory cleanliness - no ephemeral files in root
      - id: onex-validate-clean-root
        name: ONEX Root Directory Cleanliness
        entry: uv run --frozen python scripts/validate.py clean_root
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      # Architecture validation - one model per file
      - id: onex-validate-architecture
        name: ONEX Architecture Validation
        entry: uv run --frozen python scripts/validate.py architecture
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      # Architecture layer validation - core/infra separation
      # Verifies omnibase_core has no infrastructure dependencies (kafka, httpx, etc.)
      #
      # NOTE: Runs in 'pre-push' stage (not pre-commit) because:
      #   1. It checks omnibase_core (external package), which adds latency
      #   2. Known issues exist that are tracked in Linear tickets
      #   3. Full validation already runs in CI (test.yml ONEX Validators job)
      #
      # Known issues: OMN-1015 (aiohttp), OMN-1295 (redis)
      # These cause expected failures until the tickets are resolved.
      #
      # Manual run: pre-commit run onex-validate-architecture-layers --hook-stage pre-push
      # Or: uv run python scripts/validate.py architecture_layers --verbose
      - id: onex-validate-architecture-layers
        name: ONEX Architecture Layer Validation
        entry: uv run --frozen python scripts/validate.py architecture_layers
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      # Contract validation - YAML contracts
      - id: onex-validate-contracts
        name: ONEX Contract Validation
        entry: uv run --frozen python scripts/validate.py contracts
        language: system
        files: '\.yaml$'
        pass_filenames: false
        stages: [pre-commit]
      # OMN-12957: runtime_profiles contract validator (omnibase_core).
      # Enforces three rules on every node contract.yaml:
      #   - runtime_profiles_missing (OMN-9886)
      #   - runtime_profile_unregistered (declared profile not in the canonical
      #     omnibase_core REGISTERED_RUNTIME_PROFILES registry)
      #   - runtime_profile_no_consumer_lane (subscribing REDUCER/EFFECT names
      #     no consumer-attached profile, so subscriptions are never drained)
      # Pre-existing violators are frozen in validation/runtime_profiles_allowlist.yaml
      # (discovered by repo-root walk; drain tracked by OMN-12982).
      - id: onex-validate-runtime-profiles
        name: Validate runtime_profiles on node contracts (OMN-12957)
        entry: uv run --frozen python -m omnibase_core.validation.validator_runtime_profiles src/
        language: system
        files: 'contract\.yaml$'
        pass_filenames: false
        stages: [pre-commit]
      # OMN-13290: backend secret-ref / credential-ref discipline (omnibase_core).
      # Rejects literal credentials (PEM keys, service-account JSON, bearer/sk-/AIza/ya29.
      # tokens) in committed config, and requires a logical secret_ref/api_key_ref/
      # api_key_env (API-key auth) or credential_ref (ADC) on every authenticated cloud
      # backend in a bifrost routing-authority config. Credential VALUES live in the
      # secret store, never in routing-authority config. Sourced from omnibase_core
      # (ported from omnimarket OMN-12971). Suppression (test fixtures only):
      # backend-secret-ok: <reason> on the offending line.
      - id: onex-validate-backend-secret-discipline
        name: Backend Secret Discipline (OMN-13290)
        entry: uv run --frozen python -m omnibase_core.validators.backend_secret_discipline
        language: system
        files: \.(ya?ml|json)$
        pass_filenames: true
        stages: [pre-commit]
      # Pattern validation - naming conventions
      - id: onex-validate-patterns
        name: ONEX Pattern Validation
        entry: uv run --frozen python scripts/validate.py patterns
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      # Naming convention validation - file and class naming [OMN-1305]
      # Validates Handler*, Dispatcher*, Store*, Adapter*, etc. naming patterns
      # Runtime: <3s (single pass with caching)
      - id: onex-validate-naming
        name: ONEX Naming Convention Validation
        entry: uv run --frozen python scripts/validation/validate_naming.py src/omnibase_infra --errors-only
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      # OMN-10123: Plugin* classes are deterministic compute plugins only.
      # Daemon/service/worker lifecycles belong behind ONEX nodes and handlers.
      - id: no-plugin-daemon-classes
        name: Block Plugin* daemon/service/worker classes
        entry: env PYTHONPATH=src uv run --frozen python -m omnibase_infra.validators.no_plugin_daemon_classes src/omnibase_infra
        language: system
        types: [python]
        files: ^src/omnibase_infra/.*\.py$
        pass_filenames: false
        stages: [pre-commit]
      # OMN-10820: Block Any in handler handle()/~__init__() signatures.
      # Budget starts at 0 (current codebase is clean). Decrement target: stay at 0.
      # Suppress a justified exception with: # substrate-allow: <reason>
      - id: handler-any-signature
        name: Block Any in handler signatures (OMN-10820)
        entry: env PYTHONPATH=src uv run --frozen python -m omnibase_infra.validators.handler_any_signature --max-violations 0 src/omnibase_infra
        language: system
        types: [python]
        files: ^src/omnibase_infra/.*\.py$
        pass_filenames: false
        stages: [pre-commit]
      # OMN-10822: Budget gate for # type: ignore[arg-type] and [union-attr].
      # Budget: 74 (57 arg-type + 17 union-attr) — initial baseline 2026-05-22.
      # Decrement --max-violations as violations are fixed. Target: 0.
      # New suppressions must use # substrate-allow: <reason> to justify.
      - id: type-ignore-budget
        name: type-ignore budget gate (arg-type + union-attr) (OMN-10822)
        entry: env PYTHONPATH=src uv run --frozen python -m omnibase_infra.validators.type_ignore_budget --max-violations 74 src/omnibase_infra
        language: system
        types: [python]
        files: ^src/omnibase_infra/.*\.py$
        pass_filenames: false
        stages: [pre-commit]
      # Union usage validation
      # TECH DEBT: Baseline increased to 108 violations (OMN-871)
      # Target: Reduce to 30 incrementally after PR #37 merges
      - id: onex-validate-unions
        name: ONEX Union Usage Validation
        entry: uv run --frozen python scripts/validate.py unions
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      # Circular import check
      - id: onex-validate-imports
        name: ONEX Circular Import Check
        entry: uv run --frozen python scripts/validate.py imports
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      # Any type validation (OMN-1276)
      # Ensures no `Any` types are used in the codebase
      - id: onex-validate-any-types
        name: ONEX Any Type Validation
        entry: uv run --frozen python scripts/validate.py any_types
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      # Bare model_dump() Detection (OMN-4912)
      # Prevents bare model_dump() calls that produce non-JSON-safe types at
      # serialization boundaries. Baseline: 23 violations (2026-03-13).
      # Ratchet rule: any PR reducing violations must lower --max-violations.
      - id: validate-model-dump-json-mode
        name: Validate model_dump uses mode="json"
        entry: uv run --frozen python scripts/validation/validate_model_dump_json_mode.py --directory src/ --max-violations 0
        language: system
        pass_filenames: false
        files: ^src/.*\.py$
        stages: [pre-commit]
      # Declarative node enforcement
      # Ensures node.py files follow the ONEX declarative pattern:
      # - Only extend base classes, no custom methods/properties
      # - All behavior defined in contract.yaml, implemented by handlers
      # Incremental validation: only checks staged node.py files, not entire codebase
      # Exempt nodes via: # ONEX_EXCLUDE: declarative_node
      - id: onex-validate-declarative-nodes
        name: ONEX Declarative Node Validation
        entry: uv run --frozen python scripts/validate.py declarative_nodes
        language: system
        files: nodes/.*/node\.py$
        pass_filenames: true
        stages: [pre-commit]
      # Reducer purity enforcement (OMN-914)
      # Ensures reducers remain pure functions with no I/O dependencies
      # Timeout: 60s prevents hanging if tests get stuck (normal runtime: <5s)
      - id: reducer-purity-check
        name: Reducer Purity Enforcement
        entry: uv run --frozen pytest tests/unit/nodes/reducers/test_reducer_purity.py -v --tb=short --timeout=60 --timeout-method=thread
        language: system
        types: [python]
        files: ^src/omnibase_infra/nodes/reducers/
        pass_filenames: false
        stages: [pre-commit]
      # Prod promotion-lineage guard tests (OMN-12626, R1)
      # Runs the guard's unit tests whenever the guard or the prod build/deploy
      # tooling changes, so the clean-tree + ancestor-of-origin/main + image
      # revision rules cannot silently regress. Timeout protects against hangs.
      - id: prod-promotion-lineage-guard
        name: Prod promotion-lineage guard tests (OMN-12626)
        entry: uv run --frozen pytest tests/scripts/test_check_prod_promotion_lineage.py tests/scripts/test_deploy_runtime_prod_lineage.py -q --tb=short --timeout=120 --timeout-method=thread
        language: system
        pass_filenames: false
        files: ^(scripts/check_prod_promotion_lineage\.py|tests/scripts/test_(check_prod_promotion_lineage|deploy_runtime_prod_lineage)\.py|scripts/deploy-runtime\.sh|scripts/deploy-agent/deploy_agent/executor\.py)$
        stages: [pre-commit]
      # Markdown link validation (PR #172)
      # Ensures all internal markdown links point to existing files and anchors
      # External links are skipped by default (configurable in .markdown-link-check.json)
      - id: onex-validate-markdown-links
        name: ONEX Markdown Link Validation
        entry: uv run --frozen python scripts/validate.py markdown_links
        language: system
        types: [markdown]
        pass_filenames: true
        stages: [pre-commit]
      # DB quality gate - forbid domain-specific DB adapters (OMN-1785)
      # Detects forbidden patterns: adapter classes, direct SQL, direct connections
      # outside of omnibase_infra and tests. Escape hatches: # db-adapter-ok, # sql-ok
      - id: onex-validate-db-quality-gate
        name: ONEX DB Quality Gate
        entry: uv run --frozen python scripts/validate.py db_quality_gate
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      - id: check-ai-slop
        name: Check for AI-slop patterns
        language: system
        entry: uv run --frozen python scripts/validation/check_ai_slop.py --strict
        types_or: [python, markdown]
        pass_filenames: true
        stages: [pre-commit]
      # Topic naming lint — validate onex.{kind}.{producer}.{event}.v{n} convention
      # (OMN-3188: YAML contracts; OMN-3259: Python enum/constant files)
      # Triggers on contract*.yaml OR any *.py change; always scans full source tree.
      - id: topic-naming-lint
        name: Topic Naming Lint
        entry: bash scripts/validation/run_topic_lint.sh
        language: system
        types_or: [yaml, python]
        files: (contract.*\.yaml|\.py)$
        pass_filenames: false
        stages: [pre-commit]
      # OMN-4885: Validate published_events topics appear in event_bus.publish_topics
      - id: onex-validate-published-events
        name: Contract published_events consistency
        entry: uv run --frozen python scripts/validation/check_published_events_consistency.py
        language: system
        pass_filenames: false
        files: contract\.yaml$
        stages: [pre-commit]
      # OMN-10741: Unified localhost/hardcoded-endpoint fallback validator
      # Covers all 6 pattern types from OMN-10658 enforcement sweep.
      # Annotation: add  # fallback-ok: <reason>  to exempt a justified line.
      - id: no-env-fallbacks
        name: No localhost/hardcoded-endpoint fallbacks (OMN-10741)
        entry: uv run --frozen python scripts/validate_no_env_fallbacks.py
        language: system
        pass_filenames: true
        types_or: [python, shell]
        stages: [pre-commit]
      # OMN-3554: Reject hardcoded Kafka broker address fallbacks
      # Detects os.getenv("KAFKA_*", non-empty) and private-IP Kafka broker ports
      - id: kafka-no-hardcoded-fallback
        name: Reject hardcoded Kafka broker address fallbacks
        entry: bash scripts/validation/check_kafka_no_hardcoded_fallback.sh
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]
      # OMN-7077: Prevent new direct imports of EventBusInmemory from infra path
      - id: no-infra-inmemory-import
        name: Block infra-path EventBusInmemory imports (OMN-7077)
        entry: bash scripts/validation/check_no_infra_inmemory_import.sh
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]
      # OMN-3530: Ensure writer_postgres.py / handler_*_postgres.py changes include a migration
      - id: onex-check-migration-required
        name: Writer-Migration Coupling Check
        language: system
        entry: uv run --frozen python scripts/check_migration_required.py --pre-commit
        pass_filenames: false
        stages: [pre-commit]
      # OMN-3617: Block planning docs (belong in omni_home/docs/plans/)
      - id: no-planning-docs
        name: Block planning docs (belong in omni_home/docs/plans/)
        entry: 'bash -c ''PLAN_FILES=$(git diff --cached --name-only --diff-filter=ACMR -- "docs/plans/"); if [ -n "$PLAN_FILES" ]; then echo "ERROR: Planning docs must live in omni_home/docs/plans/, not in this repo:"; echo "$PLAN_FILES"; echo ""; echo "Move your file to /Volumes/PRO-G40/Code/omni_home/docs/plans/"; exit 1; fi'''
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      # OMN-3254: Topic enum drift check — verify generated enums include all topics
      # from contracts and the contract-declarative runtime/topics.yaml manifest.
      # OMN-13199 (phase A5): dropped the `topic_constants.py` trigger — OMN-13202
      # emptied generate_topic_enums.py's _DEFAULT_SUPPLEMENTARY_SOURCES, so the
      # codegen no longer reads that file's AST; re-running the drift check on
      # topic_constants.py changes was a dead trigger.
      - id: topic-enum-drift-check
        name: Topic Enum Drift Check
        entry: uv run --frozen python scripts/generate_topic_enums.py --check
        language: system
        types_or: [yaml, python]
        files: (contract.*\.yaml|topics\.yaml|enums/generated/)
        pass_filenames: false
        stages: [pre-commit]
      # OMN-3777: Block cloud bus references in source code
      - id: no-cloud-bus
        name: Block cloud bus references
        entry: bash scripts/check_no_cloud_bus_wrapper.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      # OMN-4385: SPDX header enforcement
      - id: validate-spdx-headers
        name: ONEX SPDX Header Requirement
        entry: uv run --frozen onex spdx validate
        language: system
        pass_filenames: true
        files: ^(src|tests|scripts|examples)/.*\.(py|sh|bash|yml|yaml|toml)$
        exclude: ^(archived/|archive/)
        stages: [pre-commit]
      # OMN-4600: Contract topic parity gate — blocks new Python-only registry entries
      - id: topic-parity-gate
        name: Topic Contract Parity Gate
        entry: uv run --frozen python scripts/check_contract_topic_parity.py
        language: system
        pass_filenames: false
        files: (platform_topic_suffixes\.py|contract\.yaml|topics\.yaml)
        stages: [pre-commit]
      # OMN-5440/OMN-11673: Verify required docker-compose env vars are set in
      # contract-rendered policy env or operator env.
      - id: check-required-env-vars
        name: Check required env vars are set in configured env files
        entry: python scripts/check_required_env_vars.py
        language: python
        files: docker/docker-compose\.infra\.yml
        pass_filenames: false
      # OMN-4857: Block Consul references in source (decommissioned service)
      # Prevents reintroduction of CONSUL_HOST or consul.connect.io references in src/.
      - id: no-consul-references
        name: No Consul service discovery (decommissioned — OMN-4857)
        language: pygrep
        entry: "CONSUL_HOST|consul\\.connect\\.io"
        files: ^src/
        exclude: ^tests/
        stages: [pre-commit]
      # OMN-5189: Block vestigial ONEX_ENV reads — use ONEX_ENVIRONMENT instead
      # ONEX_ENV is never set in containers; reads silently default to "dev", creating
      # env-prefixed topics (e.g. dev.onex.evt.*) that break node registration.
      - id: no-onex-env-reads
        name: Block vestigial ONEX_ENV reads (use ONEX_ENVIRONMENT — OMN-5189)
        language: pygrep
        entry: "os\\.getenv\\([\"']ONEX_ENV[\"']|os\\.environ\\.get\\([\"']ONEX_ENV[\"']|os\\.environ\\[[\"']ONEX_ENV[\"']"
        files: ^src/
        exclude: ^tests/
        stages: [pre-commit]
      # OMN-10087: Guard against re-adding clients/clientScopes to realm.json
      - id: check-realm-no-clients
        name: realm.json must not own clients/scopes
        entry: bash scripts/check-realm-no-clients.sh
        language: system
        files: ^docker/keycloak/omninode-realm\.json$
        pass_filenames: false
        stages: [pre-commit]
      # OMN-4569: Block operational artifact files from being committed
      # Recovery logs and validation logs are auto-generated by automated tooling
      # and must never be tracked as repo content.
      - id: block-operational-artifacts
        name: Block operational artifact files (recovery/validation logs)
        language: fail
        files: '(^docs/recovery/|[^/]*-validation-log-\d{4}-\d{2}-\d{2}|[^/]*-recovery-log-\d{4}-\d{2}-\d{2})'
        entry: "Operational artifact detected — do not commit recovery/validation logs. These are auto-generated session files. See OMN-4569."
        stages: [pre-commit]
      # OMN-5063: Block untyped metadata dict fields
      # Centralized in onex_change_control (OMN-5135)
      - id: no-untyped-metadata
        name: No untyped metadata dict fields
        language: system
        entry: uv run --frozen check-no-untyped-metadata
        types: [python]
        exclude: ^tests/|^examples/|^scripts/
        stages: [pre-commit]
      # OMN-9125: Strict-gate ordering — gate PRs must have compliance PRs land first
      - id: check-strict-gate-ordering
        name: Strict-gate ordering check
        entry: bash scripts/check-strict-gate-ordering.sh
        language: system
        pass_filenames: false
        files: ^src/omnibase_infra/runtime/(auto_wiring/handler_wiring|service_kernel)\.py$
        stages: [pre-commit]
      - id: normalization-symmetry
        name: normalization-symmetry
        entry: uv run python -m omnibase_core.validators.normalization-symmetry
        language: system
        pass_filenames: false
        stages: [manual]
      # OMN-13034 (retro B-6): Lane-boundary attestation gate.
      # Rejects any staged file that contains lane-boundary attestation language
      # (markdown lane tables, compose_project declarations, GENERATED_LANE_TABLE
      # blocks) WITHOUT a same-session 'verified: <date> via <command>' annotation.
      # Phantom-lane boilerplate is unwritable. See scripts/check_lane_attestation.py.
      - id: check-lane-attestation
        name: Lane-boundary attestation requires verified annotation (OMN-13034)
        entry: uv run --frozen python scripts/check_lane_attestation.py --staged
        language: system
        pass_filenames: false
        types_or: [markdown, yaml]
        stages: [pre-commit]
      # Skip-token rejection gate (OMN-11412 / OMN-10414)
      # Blocks [skip-*] bypass tokens in staged markdown/yaml/txt files.
      # Escape hatch: add '# skip-token-allowed: <receipt-id>' with a traceable approval receipt.
      - id: reject-deploy-gate-skip-token
        name: Reject skip-gate bypass tokens (OMN-10414)
        entry: .pre-commit-hooks/reject-deploy-gate-skip-token.sh
        language: script
        pass_filenames: true
        always_run: true
        stages: [pre-commit]
        exclude: ^tests/.*fixtures/
      - id: reject-deploy-gate-skip-token-commit-msg
        name: Reject skip-gate bypass tokens in commit messages (OMN-10414)
        entry: .pre-commit-hooks/reject-deploy-gate-skip-token.sh
        language: script
        pass_filenames: true
        stages: [commit-msg]
      # OMN-11926: LLM topology contract drift validator
      # Fails on any shape violation in contracts/llm_endpoints.yaml.
      - id: llm-topology-validator
        name: LLM topology contract drift validator (OMN-11926)
        entry: env PYTHONPATH=src uv run --frozen python -m omnibase_infra.validators.llm_topology_validator contracts/llm_endpoints.yaml
        language: system
        files: ^contracts/llm_endpoints\.yaml$
        pass_filenames: false
        stages: [pre-commit]
# Configuration
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]
fail_fast: false
# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes for omnibase_infra

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_schedule: weekly
  submodules: false
  # Skip ONEX validation hooks in CI that require omnibase_core imports
  # Note: onex-validate-clean-root is NOT skipped (standalone script, no omnibase_core dependency)
  # Also skip migration freeze (checks staged files via git diff --cached, which is empty in CI;
  # CI should run: uv run python scripts/validation/validate_migration_freeze.py --check-committed)
  skip: [no-env-file, onex-validate-architecture, onex-validate-architecture-layers, onex-validate-contracts, onex-validate-patterns, onex-validate-unions, onex-validate-imports, onex-validate-any-types, onex-validate-migration-freeze, normalization-symmetry]
