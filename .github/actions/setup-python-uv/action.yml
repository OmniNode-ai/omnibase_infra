name: 'Setup Python and uv'
description: 'Common setup for Python projects with uv: install Python, uv, restore cache, and install dependencies'
author: 'OmniNode'
inputs:
  python-version:
    description: 'Python version to install'
    required: false
    default: '3.12'
  uv-version:
    description: 'uv version to install'
    required: false
    default: '0.6.14'
  cache-version:
    description: 'Cache version suffix for busting stale caches'
    required: false
    default: '0.6.0'
  cache-key-prefix:
    description: 'Custom prefix for the cache key (e.g., uv-boundary, uv-handshake)'
    required: false
    default: 'uv'
  lock-file-path:
    description: 'Path to uv.lock for cache key hashing (glob pattern)'
    required: false
    default: '**/uv.lock'
  install-args:
    description: 'Extra arguments passed to uv sync (e.g., --frozen)'
    required: false
    default: '--reinstall-package omnibase-core --reinstall-package omnibase-spi'
  working-directory:
    description: 'Working directory for uv sync (useful when the repo is checked out into a subdirectory)'
    required: false
    default: '.'
  skip-install:
    description: 'Set to "true" to skip the uv sync step (useful for multi-repo setups that install manually)'
    required: false
    default: 'false'
  cache-enabled:
    description: 'Set to "false" to skip uv cache restore/save for short timeout-sensitive jobs'
    required: false
    default: 'true'
  sync-attempts:
    description: 'Maximum uv sync attempts before failing'
    required: false
    default: '5'
  sync-retry-delay-seconds:
    description: 'Base delay in seconds between uv sync retries'
    required: false
    default: '10'
  github-token:
    description: >-
      Token used to authenticate uv git+https dependency fetches against github.com. Defaults to the workflow GITHUB_TOKEN, which authenticates same-org public-repo fetches and lifts them above the anonymous rate limit. Override with `secrets.CROSS_REPO_PAT` for private cross-repo deps.
    required: false
    default: ${{ github.token }}
  shared-env-enabled:
    description: >-
      Use the host-local immutable CI environment cache. "auto" enables it only when OMNI_CI_SHARED_ENV_ENABLED=true in the workflow environment.
    required: false
    default: 'auto'
  shared-env-root:
    description: Host-local root for immutable CI environments.
    required: false
    default: '/home/runner/.cache/omni/ci-envs'
  shared-env-install-args:
    description: Arguments used when building the immutable shared CI env.
    required: false
    default: '--frozen --all-extras --all-groups --no-install-project'
runs:
  using: 'composite'
  steps:
    - name: Resolve shared CI env mode
      id: shared_env_mode
      shell: bash
      env:
        SHARED_ENV_ENABLED: ${{ inputs.shared-env-enabled }}
      run: |
        case "${SHARED_ENV_ENABLED}" in
          true)
            enabled=true
            ;;
          false)
            enabled=false
            ;;
          auto)
            if [ "${OMNI_CI_SHARED_ENV_ENABLED:-false}" = "true" ]; then
              enabled=true
            else
              enabled=false
            fi
            ;;
          *)
            echo "::error::shared-env-enabled must be true, false, or auto"
            exit 2
            ;;
        esac
        echo "enabled=${enabled}" >> "$GITHUB_OUTPUT"
        echo "shared CI env enabled: ${enabled}"
    - name: Set up Python
      if: steps.shared_env_mode.outputs.enabled != 'true'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install uv
      if: steps.shared_env_mode.outputs.enabled != 'true'
      uses: astral-sh/setup-uv@v7
      with:
        version: ${{ inputs.uv-version }}
        enable-cache: ${{ inputs.cache-enabled != 'false' }}
    - name: Prepare shared CI env
      if: steps.shared_env_mode.outputs.enabled == 'true' && inputs.skip-install != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        OMNI_CI_ENV_ROOT: ${{ inputs.shared-env-root }}
        OMNI_CI_REPO: omnibase_infra
        OMNI_CI_ENV_INSTALL_ARGS: ${{ inputs.shared-env-install-args }}
        PYTHON_VERSION: ${{ inputs.python-version }}
        UV_VERSION: ${{ inputs.uv-version }}
        GIT_FETCH_TOKEN: ${{ inputs.github-token }}
      run: |
        "${GITHUB_ACTION_PATH}/../../../scripts/ci/ensure_ci_env.sh"
    - name: Load cached uv
      if: steps.shared_env_mode.outputs.enabled != 'true' && inputs.cache-enabled != 'false'
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles(inputs.lock-file-path) }}-${{ inputs.cache-version }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ inputs.python-version }}-${{ inputs.cache-version }}-
    - name: Install dependencies
      if: steps.shared_env_mode.outputs.enabled != 'true' && inputs.skip-install != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CACHE_ENABLED: ${{ inputs.cache-enabled }}
        INSTALL_ARGS: ${{ inputs.install-args }}
        UV_SYNC_ATTEMPTS: ${{ inputs.sync-attempts }}
        UV_SYNC_RETRY_DELAY_SECONDS: ${{ inputs.sync-retry-delay-seconds }}
        GIT_FETCH_TOKEN: ${{ inputs.github-token }}
      run: |
        export UV_HTTP_TIMEOUT="${UV_HTTP_TIMEOUT:-600}"
        export UV_CONCURRENT_DOWNLOADS="${UV_CONCURRENT_DOWNLOADS:-1}"
        export UV_CONCURRENT_BUILDS="${UV_CONCURRENT_BUILDS:-1}"
        export UV_CONCURRENT_INSTALLS="${UV_CONCURRENT_INSTALLS:-1}"
        export UV_TORCH_BACKEND="${UV_TORCH_BACKEND:-cpu}"
        git config --global http.version HTTP/1.1
        # Treat a stalled transfer (0 bytes/s) as a failure rather than hanging
        # indefinitely, so the retry loop below can recover. (OMN-12529)
        git config --global http.lowSpeedLimit 0
        git config --global http.lowSpeedTime 999999
        # Authenticate uv's internal git+https fetches. Anonymous github.com
        # requests are rate-limited (60/hr); many parallel --no-cache syncs from
        # one runner egress IP trip "Empty reply from server". Authenticated
        # requests get 5000/hr. uv shells out to `git fetch`, which inherits the
        # GIT_CONFIG_* env vars below — a process-scoped insteadOf rewrite that
        # never writes the token to a persistent gitconfig on the self-hosted
        # runner. (OMN-12432)
        if [ -n "${GIT_FETCH_TOKEN}" ]; then
          export GIT_CONFIG_COUNT=1
          export GIT_CONFIG_KEY_0="url.https://x-access-token:${GIT_FETCH_TOKEN}@github.com/.insteadOf"
          export GIT_CONFIG_VALUE_0="https://github.com/"
          echo "git github.com fetches: authenticated (x-access-token)"
        else
          echo "::warning::github-token not provided; uv git fetches stay anonymous and may be rate-limited"
        fi
        read -r -a install_args <<< "$INSTALL_ARGS"
        sync_attempts="${UV_SYNC_ATTEMPTS}"
        retry_delay_seconds="${UV_SYNC_RETRY_DELAY_SECONDS}"

        if ! [[ "$sync_attempts" =~ ^[1-9][0-9]*$ ]]; then
          echo "::error::sync-attempts must be a positive integer (got: ${sync_attempts})"
          exit 2
        fi

        if ! [[ "$retry_delay_seconds" =~ ^[0-9]+$ ]]; then
          echo "::error::sync-retry-delay-seconds must be a non-negative integer (got: ${retry_delay_seconds})"
          exit 2
        fi

        echo "uv version: $(uv --version)"
        echo "uv sync attempts: ${sync_attempts}"
        echo "uv sync retry delay seconds: ${retry_delay_seconds}"
        echo "UV_HTTP_TIMEOUT=${UV_HTTP_TIMEOUT:-<unset>}"
        echo "UV_CONCURRENT_DOWNLOADS=${UV_CONCURRENT_DOWNLOADS:-<unset>}"
        echo "UV_CONCURRENT_BUILDS=${UV_CONCURRENT_BUILDS:-<unset>}"
        echo "UV_TORCH_BACKEND=${UV_TORCH_BACKEND:-<unset>}"
        echo "UV_NO_CACHE=${UV_NO_CACHE:-<unset>}"

        sync_cmd=(uv sync)
        if [ "$CACHE_ENABLED" = "false" ]; then
          sync_cmd+=(--no-cache)
        fi

        sync_cmd+=("${install_args[@]}")

        attempt=1
        until "${sync_cmd[@]}"; do
          status=$?
          if [ "$attempt" -ge "$sync_attempts" ]; then
            echo "::error::uv sync failed after ${attempt} attempt(s)"
            exit "$status"
          fi

          sleep_seconds=$((retry_delay_seconds * attempt))
          echo "::warning::uv sync attempt ${attempt}/${sync_attempts} failed with exit ${status}; retrying in ${sleep_seconds}s"
          sleep "$sleep_seconds"
          attempt=$((attempt + 1))
        done
    - name: Emit runner image identity
      # OMN-12567: every job that prepares Python emits the bound runner image
      # identity as startup evidence so image-drift debugging is deterministic.
      # The action-relative path makes this work for both same-repo and
      # cross-repo (subdir) checkout layouts.
      shell: bash
      run: |
        set -euo pipefail
        scripts_ci="${GITHUB_ACTION_PATH}/../../../scripts/ci"
        lock_file="${GITHUB_ACTION_PATH}/../../../docker/runners/runner-image.lock.json"
        if [[ ! -f "${lock_file}" ]]; then
          echo "::warning::runner image lock file not found at ${lock_file}; skipping identity emission"
          exit 0
        fi
        if [[ -n "${pythonLocation:-}" && -x "${pythonLocation}/bin/python" ]]; then
          python_bin="${pythonLocation}/bin/python"
        else
          python_bin="$(command -v python3)"
        fi
        evidence="$(
          PYTHONPATH="${scripts_ci}" "${python_bin}" \
            "${scripts_ci}/runner_image_identity.py" \
            --lock-file "${lock_file}" --mode emit
        )"
        echo "runner image identity (startup evidence): ${evidence}"
        echo "OMNI_RUNNER_IMAGE_IDENTITY_EVIDENCE=${evidence}" >> "${GITHUB_ENV}"
        {
          echo "### Runner image identity (OMN-12567)"
          echo ""
          echo '```json'
          echo "${evidence}"
          echo '```'
        } >> "${GITHUB_STEP_SUMMARY}"
