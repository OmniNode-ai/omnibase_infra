# required-checks.yaml v3 (OMN-14865)
# Location: .github/required-checks.yaml
#
# Upgraded to schema v3 (fan-out of OMN-14854's omniclaude canary, PR #1917
# merged to omniclaude dev): this file is now the OPERATIONAL input to the
# Required-Check Skip-Vector Guard (validate_no_required_check_skip_vectors.py,
# invoked via required-check-skip-guard-caller.yml -> omniclaude's reusable
# workflow). It SUPERSEDES the prior v1 prose-only manifest, which documented
# `test.yml` (a workflow that no longer exists — CI is now `ci.yml`) and was
# never read by any script: `scripts/audit-branch-protection.py` fetches
# required_status_checks live via `gh api`, and the separate parity ratchet
# (scripts/enforcement_parity_manifest.yaml, OMN-14288) is its own
# machine-asserted config-as-data file, untouched by this change.
#
# Exhaustive: every context in required_status_checks.contexts for
# omnibase_infra's `dev` branch has a `mode: REQUIRED` row below (fetched via
# `gh api repos/OmniNode-ai/omnibase_infra/branches/dev/protection/required_status_checks`,
# 17 contexts, verified 2026-07-20). The privileged reconcile job
# (required-check-manifest-reconcile.yml, not yet added in this PR — see ticket
# OMN-14865 follow-up) will fail closed if this file and live branch protection
# diverge in either direction, once wired.
#
# `main`'s required_status_checks set is verifiably NOT identical to `dev`'s
# (verified 2026-07-20: main has only 5 contexts — "CI Summary", "Handler
# Contract Compliance", "verify / verify", "call-reject-skip-token / scan /
# reject-skip-gate-token", "main-target-guard" — a strict subset of dev's 17
# plus main-target-guard). Per the omniclaude canary's own scope note, this
# manifest is single-branch (dev); a `main`-scoped section is an explicit open
# follow-up, not resolved here.
#
# Do NOT rename/remove a REQUIRED row without following the Branch Protection
# Migration Safety procedure — flip branch protection first (or same PR), then
# update this file, so the reconcile job never observes a divergence window.
#
# NOTE on `workflow`/`job_path`/`caller_workflow`/`reusable_workflow` fields
# below: these are documentation only. The validator's context->job resolution
# (both Shape A direct-job and Shape B/C composed-context matching) walks the
# live `.github/workflows/*.yml` files by job name/id — it does not consume
# these manifest fields. Only `name`, `mode`, `producer_kind`, `skip_semantics`,
# and `rationale` are functionally load-bearing.
schema_version: 3
classification: toolchain
repo: omnibase_infra
gates:
  - name: "CI Summary"
    mode: REQUIRED
    producer_kind: local
    workflow: ci.yml
    job_path: ["ci-summary"]
    skip_semantics: never
    rationale: "Umbrella fail-closed poller aggregating all ci.yml job conclusions (OMN-14127); job-level `if: always()`. Live required status check on omnibase_infra dev branch protection."
  - name: "Handler Contract Compliance"
    mode: REQUIRED
    producer_kind: local
