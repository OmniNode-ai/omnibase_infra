    rationale: "Live required status check on omnibase_infra dev branch protection. No job-level if:, no path filter, pull_request+merge_group trigger present."
  - name: "verify / verify"
    mode: REQUIRED
    producer_kind: cross_repo
    caller_workflow: call-receipt-gate.yml
    caller_job: verify
    cross_repo_ref: "OmniNode-ai/omnibase_core/.github/workflows/receipt-gate.yml@main"
    skip_semantics: never
