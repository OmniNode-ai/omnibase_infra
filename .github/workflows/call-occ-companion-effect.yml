#
# call-occ-companion-effect.yml
#
# Per-repo occ-companion-effect trigger for omnibase_infra (OMN-14941, canary
# before fan-out). Thin caller — all publish logic lives in the omniclaude
# reusable, which runs omnimarket's canonical publisher.
#
# On a ticketed product PR (opened/synchronize/reopened/ready_for_review) the
# reusable publishes `onex.cmd.omnimarket.occ-companion-effect-requested.v1`;
# the .201 dev-lane effects runtime (node_occ_companion_effect — the canonical
# RSD-3 write-EFFECT) mints the OCC evidence companion and stamps
# `Evidence-Source: OCC#<n>` onto this PR. Only this path produces
# `occ:machine-minted` + `minted_by_node=true`.
#
# TRIGGER COVERAGE (OMN-14987): opened/synchronize alone miss two born-path
# holes. (1) draft->ready_for_review WITHOUT an intervening push never re-fires
# either event -- GitHub emits a distinct ready_for_review event that this
# workflow did not listen for, so a PR opened as draft and later marked ready
# was permanently stranded unbound (live case: infra#2407, confirmed via
# `gh api .../actions/workflows/{id}/runs`: no run fired between the opened
# run and the ready_for_review transition). (2) closed-then-reopened has the
# same hole via the reopened event. Both are now listed. The F-17
# draft-suppression guard is NOT a trigger-level gate -- it lives downstream
# in node_occ_companion_compute (handler_occ_companion_compute.py), which
# checks live pr_is_draft state at compute time, so adding ready_for_review
# here cannot cause a mint while the PR is still a draft; it only unblocks
# the mint for the transition OUT of draft.
#
# TRIGGER — NO base-branch filter, deliberately (the #2377 stacked-PR vector):
# a trigger-level `branches: [main, dev, hotfix/**]` filter means a PR whose
# base is a feature branch never fires, and when that base later retargets
# dev the opened/synchronize events have already passed — the PR silently
# never gets a companion. Every pull_request fires here; the reusable's own
# bot/OMN gate (plus this caller's copy of it) filters what should not
# publish, and any future base filtering must be IN-JOB with a logged skip,
# never at the trigger. call-occ-autobind.yml carried the same
# branches: [...] filter and the same #2377 hole until OMN-14987 removed it
# to match this file's design -- both callers are now symmetric on this
# point.
#
# ADDITIVE / REJECTS NOTHING: this workflow is NOT a required status check. It
# publishes a command; it never fails a PR's merge. A fail-loud exit 1 on the
# trusted runner (unreachable dev broker) is a non-blocking red signal, not a
# merge gate.
#
# PIN CHOICE (E1 failure class): the reusable is pinned `@dev` because that is
# the ref that resolves. `@main` is exactly how the autobind born path died:
# call-occ-autobind.yml pinned call-occ-autobind-reusable.yml@main while the
# file existed only on omniclaude dev (verified 2026-07-22:
# `gh api repos/OmniNode-ai/omniclaude/contents/.github/workflows/call-occ-autobind-reusable.yml?ref=main`
# -> HTTP 404), so every invocation failed at workflow parse time and the
# publisher never ran. A dev squash SHA cannot be pinned before the omniclaude
# OMN-14941 PR merges (the SHA does not exist yet), so `@dev` is the only
# viable resolvable pin today.
#
# SEQUENCING: this pin resolves only AFTER the omniclaude OMN-14941 PR (adding
# call-occ-companion-effect-reusable.yml) merges to omniclaude dev. Until
# then, this workflow fails at parse ("workflow was not found") and the
# tests/ci/test_workflow_uses_refs_resolve.py gate is RED on this repo —
# merge the omniclaude PR first. That gate enforces the ordering
# mechanically instead of by convention.
#
# RE-PIN FOLLOW-UP (OMN-14812-style): once the reusable promotes to omniclaude
# main, re-pin this `uses:` to `@main` or a main SHA so the caller no longer
# tracks a moving dev branch.
#
# SECRET-FREE: no `secrets: inherit` — the dev-lane broker comes from
# omnimarket's committed config/ci_bus_lanes.yaml overlay (OMN-14813), and the
# dev-lane listener is plaintext. This repo needs no Kafka secrets for this
# workflow.
#
# MANUAL REPLAY ENTRYPOINT (OMN-14993): `workflow_dispatch` lets an operator
# manually re-request a mint for a PR whose original `pull_request` event was
# swallowed (e.g. the pre-fix 422 bug, OMN-14981/OMN-14939). This ONLY works
# for a PR that is currently OPEN and non-draft -- the downstream F-17 guard
# in omnimarket's handler_occ_companion_compute.py deliberately refuses to
# author a companion for a closed/merged/draft PR (added after incident
# occ#4333), so `scripts/ci/occ_manual_replay_precheck.py` refuses BEFORE
# publish for those states rather than let the request silently vanish
# downstream. Merged/closed-PR replay is explicitly OUT OF SCOPE -- see
# OMN-14993 and OMN-14991 Recommendation 4 for why building that is a
# separate, deliberate design decision, not a trigger-wiring change. The
# `occ-companion-effect-manual-replay` job below deliberately duplicates the
# reusable's checkout/pip/run GHA glue (not the publish LOGIC itself, which
# stays sourced from omnimarket) rather than threading override inputs
# through the shared cross-repo reusable used by every born-path caller.
#
# Ticket: OMN-14941, OMN-14993

name: OCC Companion Effect Publisher

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: >
          PR number to manually re-request an occ-companion-effect mint for
          (OMN-14993). Only works for a PR that is currently OPEN and
          non-draft -- a closed/merged/draft PR is refused before publish
          (see scripts/ci/occ_manual_replay_precheck.py); it is not silently
          accepted and dropped downstream.
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  occ-companion-effect:
    # Skip dependency bots and PRs with no OMN ticket token (same gate the
    # reusable enforces defensively). Gating here means the reusable is not
    # even invoked for non-OMN / bot PRs.
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'renovate[bot]' &&
      (contains(github.event.pull_request.title, 'OMN-') ||
       contains(github.event.pull_request.head.ref, 'OMN-'))
    uses: OmniNode-ai/omniclaude/.github/workflows/call-occ-companion-effect-reusable.yml@dev
    with:
      lane: dev

  occ-companion-effect-manual-replay:
    # OMN-14993: manual re-publish entrypoint, gated to the workflow_dispatch
    # trigger only. See the header comment above -- open/non-draft PRs only.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]') }}
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    env:
      PR_NUMBER: ${{ inputs.pr_number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Fetch live PR state
        id: pr
        run: |
          gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" \
            --json number,state,isDraft,headRefOid,headRefName,title,body \
            > pr_state.json
          jq 'del(.body)' pr_state.json

      - name: Precheck -- refuse closed/merged/draft (F-17 boundary, OMN-14993)
        run: python3 scripts/ci/occ_manual_replay_precheck.py pr_state.json

      - name: Ticket gate (mirrors the reusable's defensive gate, OMN-13990 H4)
        run: |
          title="$(jq -r .title pr_state.json)"
          head_ref="$(jq -r .headRefName pr_state.json)"
          if [[ "${title}" != *"OMN-"* && "${head_ref}" != *"OMN-"* ]]; then
            echo "REFUSED: PR #${PR_NUMBER} title/branch carries no OMN- ticket token; the reusable's defensive gate would also skip this PR." >&2
            exit 1
          fi

      - name: Fetch canonical occ-companion-effect publisher (omnimarket)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: OmniNode-ai/omnimarket
          ref: dev
          path: .occ-companion-effect-src
          persist-credentials: false
          sparse-checkout: |
            scripts/publish_occ_companion_effect_command.py
            scripts/publish_occ_autobind_command.py
            config/ci_bus_lanes.yaml
            src/omnimarket/events/topics.py
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet confluent-kafka click pyyaml

      - name: Publish onex.cmd.omnimarket.occ-companion-effect-requested.v1 (manual replay)
        env:
          RUNNER_IS_TRUSTED: "true"
          PR_REPO: ${{ github.repository }}
          LANE: dev
        working-directory: .occ-companion-effect-src
        run: |
          PR_HEAD_SHA="$(jq -r .headRefOid ../pr_state.json)"
          PR_BODY="$(jq -r .body ../pr_state.json)"
          export PR_HEAD_SHA PR_BODY
          python scripts/publish_occ_companion_effect_command.py --lane "${LANE}"
