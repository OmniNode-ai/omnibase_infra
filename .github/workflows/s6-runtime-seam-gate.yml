#
# s6-runtime-seam-gate.yml — OMN-14758 (epic OMN-14717, S6)
#
# Runs the S6 cross-boundary seam test (topic -> handler -> emit over InMemoryTransport)
# plus the routing-map builder / DLQ resolver / single-owner / phantom-alarm unit tests
# on any PR that touches the composition-root surface those tests protect: service_kernel,
# the S3 kafka_transport face, the routing-map builder, or the DLQ resolver.
#
# Enforcement, not detection (CLAUDE.md Rule 5): wired as a CI job in the SAME PR as the
# test. It ALWAYS reports (merge_group short-circuits to exit 0, per the deploy-gate
# pattern) so it can later be promoted to a REQUIRED context without wedging the queue.
#
# Promoting "s6-runtime-seam-gate" to a required status check is a SERIAL OPERATOR
# FOLLOW-UP (branch-protection mutation) — NOT done in this PR. See the PR body.
#
# Design: docs/plans/2026-07-17-s6-composition-wiring-plan.md §e
# Ticket:  OMN-14758 | Epic: OMN-14717

name: S6 Runtime Seam Gate

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "src/omnibase_infra/runtime/service_kernel.py"
      - "src/omnibase_infra/runtime/auto_wiring/handler_wiring.py"
      - "src/omnibase_infra/event_bus/kafka_transport.py"
      - "src/omnibase_infra/runtime/core_runtime/**"
      - "tests/unit/runtime/core_runtime/**"
      - "tests/integration/runtime/test_s6_delegation_routing_map_binding.py"
      - ".github/workflows/s6-runtime-seam-gate.yml"
  workflow_dispatch:

concurrency:
  group: s6-runtime-seam-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'merge_group' }}

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.6.14"
  CACHE_VERSION: "0.6.0"
  # Force inmemory event bus (no Kafka in CI); the seam test drives the in-memory
  # transport in-process and never touches a broker.
  ONEX_EVENT_BUS_TYPE: "inmemory"
  # Required by transitive LLM transport import paths; dummy value (no LLM calls).
  LLM_ENDPOINT_CIDR_ALLOWLIST: "10.0.0.0/8"

jobs:
  occ-preflight:
    # self-gating-ok: centralized OCC preflight reusable is the canonical cross-repo gate for non-OCC repositories.
    uses: OmniNode-ai/omnibase_core/.github/workflows/occ-preflight.yml@79c620f904526f773f6b92eb98743b011fe2eb12
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts
      core-ref: 8a47e092002dd1338599fa0733feda469436acbf

  s6-runtime-seam-gate:
    needs: occ-preflight
    name: s6-runtime-seam-gate
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted; public forks use ubuntu-latest.
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON((github.event_name == 'merge_group' && vars.OMNI_REQUIRED_CI_RUNS_ON_JSON) || vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 20

    steps:
      # merge_group short-circuit (deploy-gate pattern): the queue commit is already
      # proven by the per-PR run; a required context must still report a green result on
      # merge_group SHAs so it does not wedge the queue.
      - name: Skip on merge_group
        if: github.event_name == 'merge_group'
        run: |
          echo "::notice::s6-runtime-seam-gate short-circuits on merge_group (proven on the PR run)."
          exit 0

      - name: Checkout code
        if: github.event_name != 'merge_group'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python and uv
        if: github.event_name != 'merge_group'
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Run S6 seam + composition unit tests
        if: github.event_name != 'merge_group'
        run: |
          uv run pytest \
            tests/integration/runtime/test_s6_delegation_routing_map_binding.py \
            tests/unit/runtime/core_runtime/ \
            -v
