# OMN-6912

name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  # OMN-13949: cancel superseded PR runs to free saturated runners. merge_group
  # entries carry a unique github.ref, so queue entries never cross-cancel.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  occ-preflight:
    # self-gating-ok: centralized OCC preflight reusable is the canonical cross-repo gate for non-OCC repositories.
    uses: OmniNode-ai/omnibase_core/.github/workflows/occ-preflight.yml@789d175d78a7a802f4f0f4aa2af7083bdfd312c2
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts
      core-ref: 8a47e092002dd1338599fa0733feda469436acbf

  pr-title:
    needs: occ-preflight
    uses: OmniNode-ai/onex_change_control/.github/workflows/pr-title-check-reusable.yml@4120218a4c874094416312cadcbd88b9fb737cf8
    permissions:
      pull-requests: read
