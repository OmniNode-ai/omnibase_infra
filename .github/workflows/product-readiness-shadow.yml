#
# Product Readiness — SHADOW workflow (OMN-14707 / OMN-14644 Phase 3, CI-01/CI-02).
#
# Phase 3 FINAL fan-out (omnibase_infra — the worst OCC cascade, runtime-critical).
# This workflow adds an ADDITIVE, report-only Product Readiness surface that runs
# the substantive product proof (lint, typecheck, a hermetic unit slice)
# *independently of* `occ-preflight`, then emits the typed reason-graph so an
# `occ-preflight` cascade projects as ONE root cause rather than N red/skipped
# checks. It mirrors the proven omnimarket (#1796) and omniclaude (#1906) shadows.
#
# WHY THIS IS NOT A POLLER (the wiring bug it replaces — OMN-14707):
#   The first cut of this workflow was a single NO-`needs` `product-readiness`
#   job that POLLED the head's LEAF product check-runs (Detect Changes / Lint /
#   ONEX Validators / CI Tests Gate) via the Checks API. That can never yield an
#   OCC-independent signal on omnibase_infra: EVERY one of those leaves carries
#   `needs: occ-preflight` (+ `if: needs.occ-preflight.result == 'success'`) in
#   `ci.yml`, so whenever `occ-preflight` is red the leaves all SKIP. The poller
#   therefore read only skipped/absent leaves and always classified the head as
#   `product_infra` (a vacuous RUNNER_INFRA root) — never an independent product
#   verdict. The poller pattern is fundamentally wrong wherever the product leaves
#   are occ-gated (the entire CI-02 problem). The fix is to RUN our own
#   occ-independent subchecks, exactly like the sibling shadows (RUN-OWN-SUBCHECKS).
#
# LOAD-BEARING INVARIANTS (do not weaken — see design §1.1 / §3):
#   1. NO `occ-preflight` anywhere in this workflow's needs-chain. The product
#      subcheck jobs below carry no `needs:` at all, so Product Readiness reports
#      FIRST on the exact head SHA, independent of any OCC evidence. `reason-graph`
#      needs ONLY the three subcheck jobs (never occ-preflight).
#   2. This workflow NEVER references or triggers `call-occ-preflight.yml` and so
#      mints NO OCC request. The authoritative OCC path is untouched and still runs
#      from `ci.yml` exactly as before.
#   3. REPORT-ONLY / NON-REQUIRED / STANDALONE. This is a SEPARATE workflow and is
#      deliberately NOT folded into `ci.yml`'s required `CI Summary` rollup —
#      folding it in would make it authoritative and violate the shadow invariant.
#      The only branch-protection-required contexts on `dev` stay byte-identical;
#      this workflow adds `product-readiness-shadow / reason-graph` (and the
#      `lint (shadow)` / `typecheck (shadow)` / `tests+coverage (shadow)` subcheck
#      contexts) as NON-required shadow contexts and cannot wedge a merge. Making
#      any context here required (or removing `occ-preflight` from the 88
#      authoritative occ-gated jobs) is a separate operator-gated WS4 step; do NOT
#      do it here.
#
# During the shadow window, the reason-graph verdict is compared against the OLD
# authoritative `CI Summary` outcome across live PR classes. Cutover to a required
# context happens only after a zero-disagreement window + operator approval (WS4).

name: product-readiness-shadow

# No `paths:` filter — the shadow MUST fire on every PR (including its own), per
# the omniclaude#1906 self-exclusion lesson (a paths filter that excludes the PR's
# own changed files silently prevents the workflow from running).
on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

permissions:
  contents: read

# Shadow surface: a newer head supersedes an in-flight shadow run for the same ref.
concurrency:
  group: product-readiness-shadow-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.6.14"
  PYTHON_VERSION: "3.12"
  CACHE_VERSION: "0.6.0"
  # OMN-12564 canary: trusted self-hosted CI reuses an immutable host-local
  # dependency environment; public fork PRs keep isolated setup.
  OMNI_CI_SHARED_ENV_ENABLED: >-
    ${{
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name != github.repository)
      && 'false'
      || 'true'
    }}
  OMNI_CI_ENV_ROOT: "/home/runner/.cache/omni/ci-envs"
  # Force uv git subprocesses onto HTTP/1.1 (self-hosted HTTP/2 stream resets).
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "http.version"
  GIT_CONFIG_VALUE_0: "HTTP/1.1"
  UV_HTTP_TIMEOUT: "600"
  # Force the in-memory event bus so the hermetic unit slice never reaches Kafka.
  ONEX_EVENT_BUS_TYPE: "inmemory"

jobs:
  # --- Product subchecks — each INDEPENDENT of occ-preflight ---------------
  # These carry NO `needs:` and so run FIRST on the exact head, before any OCC
  # evidence exists. They run the SAME toolchain the authoritative ci.yml product
  # jobs run (ruff / mypy / a hermetic pytest slice), just decoupled from OCC.
  lint-shadow:
    name: lint (shadow)
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON((github.event_name == 'merge_group' && vars.OMNI_REQUIRED_CI_RUNS_ON_JSON) || vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"
      - name: Check ruff formatting
        run: uv run ruff format --check src/ tests/
      - name: Check ruff linting (includes import sorting)
        run: uv run ruff check src/ tests/

  typecheck-shadow:
    name: typecheck (shadow)
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON((github.event_name == 'merge_group' && vars.OMNI_REQUIRED_CI_RUNS_ON_JSON) || vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"
      - name: Run mypy type checking
        run: uv run mypy src/omnibase_infra

  tests-shadow:
    # Fast, HERMETIC unit slice — NO postgres/redis/kafka/consul services. The
    # coverage dimension is folded into this job for the shadow surface: its
    # conclusion is passed as BOTH tests_conclusion and coverage_conclusion below.
    name: tests+coverage (shadow)
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON((github.event_name == 'merge_group' && vars.OMNI_REQUIRED_CI_RUNS_ON_JSON) || vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"
      - name: Unit tests (fast, hermetic slice — no broker/db deps)
        # OMN-14708: use --timeout-method=signal, not thread. thread-method
        # calls os._exit(1) on the FIRST hanging test, hard-killing the pytest
        # process and MASKING every downstream result (one hang hid the whole
        # slice). signal-method fires SIGALRM on the main thread, so pytest
        # interrupts ONLY the hanging test, records it as a failure, and
        # continues running the rest of the suite — one hang is reported, not
        # cascaded. (This hermetic unit slice is single-process/no-xdist, so
        # SIGALRM lands on the test-running main thread as required.) Marker
        # exclusions and the 60s per-test timeout are unchanged.
        run: |
          uv run pytest tests/ \
            --ignore=tests/integration \
            -m "unit and not integration and not postgres and not kafka and not consul and not database and not slow and not chaos and not performance and not replay" \
            -q --no-header \
            --timeout=60 --timeout-method=signal

  # --- Typed reason-graph (report-only) ------------------------------------
  # NO occ-preflight in this needs-chain. Consumes the product subchecks'
  # conclusions only and emits exactly one typed root. Surfaced NON-required
  # context: `product-readiness-shadow / reason-graph`.
  reason-graph:
    name: reason-graph
    needs: [lint-shadow, typecheck-shadow, tests-shadow]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Emit typed reason graph (report-only)
        env:
          # Exact head SHA the graph is content-addressed to. For pull_request
          # use the PR head (github.sha is the ephemeral merge commit); for
          # merge_group use the queued head; else the pushed SHA.
          HEAD_SHA: >-
            ${{ github.event.pull_request.head.sha
              || github.event.merge_group.head_sha
              || github.sha }}
          LINT_CONCLUSION: ${{ needs.lint-shadow.result }}
          TYPECHECK_CONCLUSION: ${{ needs.typecheck-shadow.result }}
          TESTS_CONCLUSION: ${{ needs.tests-shadow.result }}
        run: |
          set -euo pipefail
          facts="$(python - <<'PY'
          import json, os
          tests = os.environ.get("TESTS_CONCLUSION", "")
          print(json.dumps({
              "head_sha": os.environ.get("HEAD_SHA", ""),
              "subchecks": {
                  "change_detection": "success",
                  "lint": os.environ.get("LINT_CONCLUSION", ""),
                  "typecheck": os.environ.get("TYPECHECK_CONCLUSION", ""),
                  "tests": tests,
                  "coverage": tests,
              },
          }))
          PY
          )"
          graph="$(python scripts/ci/product_reason_graph.py graph --facts-json "$facts" --summary 2> summary.md)"
          echo "$graph"
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
          root_kind="$(printf '%s' "$graph" | python -c 'import json,sys; r=json.load(sys.stdin)["root"]; print(r["kind"] if r else "READY")')"
          if [ "$root_kind" = "READY" ]; then
            echo "::notice title=CI Reason Graph::READY — product dimension is green (report-only)"
          else
            echo "::warning title=CI Reason Graph::ROOT ${root_kind} (report-only shadow; not merge-blocking)"
          fi
