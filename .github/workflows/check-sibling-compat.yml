name: Sibling Compat Check (OMN-4315)

# Permanent prevention for the --no-deps cascade window issue.
# Runs when pyproject.toml changes on any PR to catch dependency conflicts
# that would manifest as ImportError in the Kafka CI jobs.

on:
  pull_request:
    branches: [main, dev, develop]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
  merge_group:
  workflow_dispatch:

env:
  UV_VERSION: "0.6.14"
  PYTHON_VERSION: "3.12"
  CACHE_VERSION: "0.6.0"
  UV_HTTP_TIMEOUT: "600"
  UV_TORCH_BACKEND: cpu

jobs:
  sibling-compat:
    name: Sibling Compat Check (OMN-4315)
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 45

    steps:
      - name: Checkout omnibase_infra
        uses: actions/checkout@v6
        with:
          path: omnibase_infra

      - name: Checkout omniintelligence (sibling)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omniintelligence
          path: omniintelligence
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout omnimemory (sibling)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnimemory
          path: omnimemory
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout omnibase_compat (sibling)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnibase_compat
          path: omnibase_compat
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python and uv
        uses: ./omnibase_infra/.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"
          cache-key-prefix: uv-sibling-compat
          lock-file-path: 'omnibase_infra/**/uv.lock'
          working-directory: omnibase_infra
          install-args: ""

      - name: Validate sibling repo compatibility (OMN-4315)
        working-directory: omnibase_infra
        run: |
          echo "================================================================"
          echo "Sibling Compat Check (OMN-4315 permanent prevention)"
          echo "Validates: uv pip install --overrides succeeds for siblings"
          echo "Prevents: --no-deps workaround that hides transitive dep failures"
          echo "================================================================"
          INFRA_VERSION=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "omnibase-infra==${INFRA_VERSION}" > /tmp/sibling-overrides.txt
          echo "omnibase-compat @ file://$(pwd)/../omnibase_compat" >> /tmp/sibling-overrides.txt
          echo "Override: omnibase-infra==${INFRA_VERSION}"
          echo "Override: omnibase-compat @ file://$(pwd)/../omnibase_compat"
          echo ""
          echo "Dry-run install of siblings with full transitive deps..."
          attempt=1
          max_attempts=5
          until uv pip install --torch-backend cpu --overrides /tmp/sibling-overrides.txt \
            -e ../omniintelligence \
            --dry-run; do
            status=$?
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::uv pip install sibling dry-run failed after ${attempt} attempt(s)"
              exit "${status}"
            fi
            echo "::warning::uv pip install sibling dry-run attempt ${attempt}/${max_attempts} failed with exit ${status}; retrying in 10s"
            attempt=$((attempt + 1))
            sleep 10
          done
          echo ""
          echo "PASS: Sibling repos are compatible with current omnibase_infra."
          echo ""
          echo "NOTE: omnimemory temporarily excluded from sibling check."
          echo "omnimemory 0.6.6 will be released after this infra release."
