name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
  merge_group:
  workflow_dispatch:

# OMN-6488: cancel-in-progress for merge_group events only — re-enqueue should
# cancel the previous run.  Regular PR pushes keep cancel-in-progress: false so
# in-flight tests aren't killed when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'merge_group' }}

env:
  UV_VERSION: "0.6.14"
  PYTHON_VERSION: "3.12"
  CACHE_VERSION: "0.6.0"
  # OMN-12564 canary: trusted self-hosted CI reuses an immutable host-local
  # dependency environment keyed by uv.lock/tool versions instead of resolving
  # dependencies independently in every job. Public fork PRs keep isolated setup.
  OMNI_CI_SHARED_ENV_ENABLED: >-
    ${{
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name != github.repository)
      && 'false'
      || 'true'
    }}
  OMNI_CI_ENV_ROOT: "/home/runner/.cache/omni/ci-envs"
  # uv resolves several pinned git dependencies during CI.  The self-hosted
  # runner pool has intermittent HTTP/2 stream resets against GitHub; force git
  # subprocesses spawned by uv onto HTTP/1.1 so dependency installs are stable.
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "http.version"
  GIT_CONFIG_VALUE_0: "HTTP/1.1"
  # Large transitive wheels such as torch and CUDA packages can exceed uv's
  # default timeout on self-hosted runners during sibling-boundary jobs.
  UV_HTTP_TIMEOUT: "600"
  # Force inmemory event bus for CI tests (no Kafka infrastructure available)
  # This overrides the default "kafka" in contracts/runtime/runtime_config.yaml
  ONEX_EVENT_BUS_TYPE: "inmemory"
  # Explicit database name for integration tests that pass POSTGRES_DATABASE
  # into Docker containers and for injection_effectiveness conftest.  Production
  # code uses OMNIBASE_INFRA_DB_URL instead (see docs/patterns/db_url_contract.md).
  POSTGRES_DATABASE: "omnibase_infra"
  # LLM endpoint CIDR allowlist — required by MixinLlmHttpTransport.
  # CI uses a dummy value since no LLM calls are made during tests.
  LLM_ENDPOINT_CIDR_ALLOWLIST: "10.0.0.0/8"

jobs:
  # =============================================================================
  # Phase 0 - Zone filter (OMN-10475)
  # =============================================================================
  # Calls the reusable workflow in omnibase_core. When every changed file is in
  # the DOCS zone (including contracts/, drift/dod_receipts/, allowlists/,
  # .evidence/), heavy jobs (test-parallel, migration-integration) skip, while
  # lint, validators, contract gates, and receipt-gate callers still run.
  zone-filter:
    uses: OmniNode-ai/omnibase_core/.github/workflows/zone-filter.yml@296431f68a7431b9a98cd3661c6a2e05d1a18e45
    with:
      python-version: "3.12"

  # =============================================================================
  # Phase 1 - Quick Validation (parallel, ~2-3 min)
  # =============================================================================
  # Phase 2 - Parallel Test Suite (after Phase 1 completes)
  #   15 splits of ~618 tests each (~2-3 min per split)
  # Phase 3 - Aggregation
  # =============================================================================

  lint:
    name: Lint
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Check ruff formatting
        run: uv run ruff format --check src/ tests/

      - name: Check ruff linting (includes import sorting)
        run: uv run ruff check src/ tests/

      - name: Check shared enum ownership
        run: python scripts/check_shared_enum_ownership.py src/

      - name: Check Kafka bootstrap no localhost fallback (OMN-8783)
        run: uv run python scripts/ci_check_kafka_no_localhost_default.py

      - name: Check no localhost env fallbacks in src/ (OMN-10732)
        run: uv run python scripts/validate_no_env_fallbacks.py

      - name: Check topic suffix exports (F56)
        run: python scripts/validation/check_topic_suffix_exports.py

      - name: Check Plugin* lifecycle class guard (OMN-10123)
        run: PYTHONPATH=src uv run python -m omnibase_infra.validators.no_plugin_daemon_classes src/omnibase_infra

      - name: Check handler Any signature gate (OMN-10820)
        run: PYTHONPATH=src uv run python -m omnibase_infra.validators.handler_any_signature --max-violations 0 src/omnibase_infra

      - name: Check type-ignore budget gate (OMN-10822)
        run: PYTHONPATH=src uv run python -m omnibase_infra.validators.type_ignore_budget --max-violations 74 src/omnibase_infra

      - name: LLM topology contract drift validator (OMN-11926)
        run: PYTHONPATH=src uv run python -m omnibase_infra.validators.llm_topology_validator contracts/llm_endpoints.yaml

      - name: Run mypy type checking
        run: uv run mypy src/omnibase_infra

  # ONEX validation - Infrastructure-specific validators
  onex-validation:
    name: ONEX Validators
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Run architecture layer check
        run: |
          echo "================================================================"
          echo "Architecture Layer Verification (OMN-255)"
          echo "================================================================"
          uv run python scripts/validate.py architecture_layers --verbose

      - name: Run ONEX validators
        run: |
          uv run python scripts/validate.py all --verbose

      - name: Run I/O Purity Audit
        run: |
          echo "================================================================"
          echo "I/O Purity Audit (OMN-325)"
          echo "================================================================"
          uv run pytest tests/audit/test_io_violations.py::TestCIGateIOPurity -v --tb=short

      - name: Run markdown link validation
        run: |
          echo "================================================================"
          echo "Markdown Link Validation"
          echo "================================================================"
          uv run python scripts/validate.py markdown_links --verbose

      - name: Run DB quality gate
        run: |
          echo "================================================================"
          echo "DB Quality Gate - Forbid Domain-Specific Adapters (OMN-1785)"
          echo "================================================================"
          uv run python scripts/validate.py db_quality_gate --verbose

      - name: No Consul references (decommissioned — OMN-4857)
        run: |
          echo "================================================================"
          echo "No Consul references check (OMN-4857)"
          echo "================================================================"
          if grep -rn "CONSUL_HOST" src/; then
            echo "FAIL: CONSUL_HOST references found in src/ — Consul is decommissioned (OMN-4857)"
            exit 1
          fi
          echo "PASS: No CONSUL_HOST references in src/"

      - name: Check published_events consistency (OMN-4885)
        run: uv run python scripts/validation/check_published_events_consistency.py

      - name: Batch-validate all node contracts via model_validate() (OMN-9752)
        run: |
          echo "================================================================"
          echo "Batch contract node_type validation (OMN-9752)"
          echo "================================================================"
          uv run python scripts/batch_validate_node_contracts.py --verbose

  infra-node-handler-ownership:
    name: Infra Node Handler Ownership
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Reject unallowlisted infra node handlers
        run: bash scripts/ci/reject-node-implementations.sh --all

  # Fingerprint drift detection -- CI twins for runtime assertions B2 and B3
  # Prevents stale fingerprint artifacts from being merged (OMN-2149)
  fingerprint-check:
    name: Fingerprint Check
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Check schema fingerprint (CI twin for B2)
        run: uv run python scripts/check_schema_fingerprint.py verify

      - name: Check event registry fingerprint (CI twin for B3)
        run: uv run python scripts/check_event_registry_fingerprint.py verify

  # Demo loop assertion gate -- validates canonical event pipeline (OMN-2297)
  # Runs in CI mode (skips live infra checks) as pre-deploy validation
  demo-loop-gate:
    name: Demo Loop Gate
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Run demo loop assertion gate
        run: |
          echo "================================================================"
          echo "Demo Loop Assertion Gate (OMN-2297)"
          echo "================================================================"
          uv run python -m omnibase_infra.validation.demo_loop_gate --ci

  # Migration freeze enforcement - blocks new migrations when .migration_freeze exists
  # Part of DB-per-repo refactor (OMN-2055), tracking: OMN-2071
  migration-freeze:
    name: Migration Freeze Check
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check migration freeze
        run: ./scripts/check_migration_freeze.sh --ci

  # Topic enum drift check -- CI gate for contract-driven topic enum pipeline (OMN-3187)
  # Ensures generated enum files stay in sync with contract.yaml definitions
  topic-enum-drift:
    name: Topic Enum Drift Check
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Check topic enum drift
        run: |
          echo "================================================================"
          echo "Topic Enum Drift Check (OMN-3187)"
          echo "================================================================"
          uv run python scripts/generate_topic_enums.py --check

  # Topic naming lint -- CI gate for ONEX topic naming convention (OMN-3188)
  # Validates onex.{kind}.{producer}.{event}.v{n} format in all contract.yaml files
  topic-naming-lint:
    name: Topic Naming Lint
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Lint topic names
        run: |
          echo "================================================================"
          echo "Topic Naming Lint (OMN-3188)"
          echo "================================================================"
          uv run python scripts/validation/lint_topic_names.py \
            --scan-contracts src/omnibase_infra/nodes

      - name: Check for placeholder topic names (OMN-4805)
        run: |
          echo "================================================================"
          echo "Placeholder Topic Denylist Check (OMN-4805)"
          echo "================================================================"
          uv run python scripts/validation/lint_topic_names.py \
            --check-placeholders \
            --scan-dir src/omnibase_infra

  # Topic drift check -- CI gate validating SUFFIX_* constants against contracts (OMN-5248/OMN-5258)
  # Ensures static topic constants stay in sync with contract.yaml topic declarations.
  # Cross-repo scanning (OMN-5258): checks out sibling repos to resolve topic references.
  topic-drift-check:
    name: Topic Drift Check
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    # The drift scan is short, but self-hosted post-job cache/archive cleanup
    # has exceeded 5 minutes under runner pressure.
    timeout-minutes: 10

    steps:
      - name: Checkout omnibase_infra
        uses: actions/checkout@v6
        with:
          path: omnibase_infra

      - name: Checkout omniintelligence (sibling contracts)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omniintelligence
          path: omniintelligence
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout omnimemory (sibling contracts)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnimemory
          path: omnimemory
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout omniclaude (sibling contracts)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omniclaude
          path: omniclaude
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python and uv
        uses: ./omnibase_infra/.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"
          cache-key-prefix: uv-topic-drift
          lock-file-path: 'omnibase_infra/**/uv.lock'
          working-directory: omnibase_infra

      - name: Check topic drift (cross-repo)
        working-directory: omnibase_infra
        run: |
          echo "================================================================"
          echo "Topic Drift Check (OMN-5248/OMN-5258)"
          echo "Cross-repo scanning: omniintelligence, omnimemory, omniclaude"
          echo "================================================================"
          uv run python scripts/check_topic_drift.py \
            --contracts-dir src/omnibase_infra/nodes \
            --extra-contracts-dir ../omniintelligence/src/omniintelligence/nodes \
            --extra-contracts-dir ../omnimemory/src/omnimemory/nodes \
            --extra-contracts-dir ../omniclaude/src/omniclaude/nodes \
            --warn-only

  # Schema handshake gate -- validates producer->consumer Pydantic round-trip
  # across every registered Kafka boundary pair (OMN-3411).
  # Uses --changed-only in CI: only checks pairs whose models were touched by the PR.
  # Requires sibling repos omniintelligence + omnimemory to be checked out.
  schema-handshake:
    name: Kafka Schema Handshake (OMN-3411)
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 45

    steps:
      - name: Checkout omnibase_infra
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: omnibase_infra

      - name: Checkout omniintelligence (sibling)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omniintelligence
          path: omniintelligence
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout omnimemory (sibling)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnimemory
          path: omnimemory
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout omnibase_compat (sibling)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnibase_compat
          path: omnibase_compat
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python and uv
        uses: ./omnibase_infra/.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"
          cache-key-prefix: uv-handshake
          lock-file-path: 'omnibase_infra/**/uv.lock'
          working-directory: omnibase_infra
          shared-env-enabled: "false"

      - name: Preinstall CPU-only torch for sibling deps
        working-directory: omnibase_infra
        run: |
          set -eu
          export UV_HTTP_TIMEOUT="${UV_HTTP_TIMEOUT:-600}"
          attempt=1
          max_attempts=5
          until uv pip install "torch>=2.6.0,<3.0.0" --index-url https://download.pytorch.org/whl/cpu; do
            status=$?
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::uv pip install schema-handshake torch CPU wheel failed after ${attempt} attempt(s)"
              exit "${status}"
            fi
            delay=$((attempt * 10))
            echo "::warning::uv pip install schema-handshake torch CPU wheel attempt ${attempt}/${max_attempts} failed with exit ${status}; retrying in ${delay}s"
            attempt=$((attempt + 1))
            sleep "${delay}"
          done

      - name: Install sibling repos as editable (boundary pair deps)
        working-directory: omnibase_infra
        # Use --overrides to install siblings with their full transitive deps while
        # forcing omnibase-infra to the locally-installed editable version from uv sync.
        # This avoids the cascade-window version conflict (siblings pin a released version
        # of omnibase-infra that may lag behind the current PR) while ensuring transitive
        # deps like adaptive-classifier are properly installed.
        # Prior approach (--no-deps) skipped transitive deps entirely, causing
        # ModuleNotFoundError for packages like adaptive_classifier at collection time.
        run: |
          set -eu
          INFRA_VERSION=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "omnibase-infra==${INFRA_VERSION}" > /tmp/sibling-overrides.txt
          echo "omnibase-compat @ file://$(pwd)/../omnibase_compat" >> /tmp/sibling-overrides.txt
          export UV_HTTP_TIMEOUT="${UV_HTTP_TIMEOUT:-600}"
          attempt=1
          max_attempts=5
          until uv pip install --overrides /tmp/sibling-overrides.txt -e ../omniintelligence; do
            status=$?
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::uv pip install schema-handshake sibling deps failed after ${attempt} attempt(s)"
              exit "${status}"
            fi
            delay=$((attempt * 10))
            echo "::warning::uv pip install schema-handshake sibling deps attempt ${attempt}/${max_attempts} failed with exit ${status}; retrying in ${delay}s"
            attempt=$((attempt + 1))
            sleep "${delay}"
          done

      - name: Run schema handshake validation (changed-only)
        working-directory: omnibase_infra
        run: |
          echo "================================================================"
          echo "Kafka Schema Handshake Gate (OMN-3411)"
          echo "Mode: --changed-only (only pairs whose models changed in this PR)"
          echo "================================================================"
          uv run python scripts/validate-kafka-schema-handshake.py --changed-only || { code=$?; [ $code -eq 2 ] && echo "Sibling packages not fully installed — OK for release chain" && exit 0 || exit $code; }

  # Arch invariants: block raw topic literals in production code (OMN-3343)
  # Scans src/**/*.py for onex.(evt|cmd).* string literals outside canonical
  # topic definition files. Pre-existing violations are suppressed via baseline.
  arch-invariants:
    name: Arch Invariants (OMN-3343)
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Check for raw topic literals in production code
        run: |
          echo "================================================================"
          echo "Arch Invariants: Raw Topic Literal Check (OMN-3343)"
          echo "================================================================"
          uv run python scripts/validation/check_topic_literals.py \
            --baseline scripts/validation/topic_literal_baseline.txt

  plugin-env-service-completeness:
    name: "Plugin ENV->Service Completeness (OMN-4313)"
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Plugin ENV->Service Completeness Check
        run: |
          echo "================================================================"
          echo "Guardrail: every *_HOST env var in x-runtime-env must have a"
          echo "matching service in docker-compose.infra.yml (OMN-4313)"
          echo "================================================================"
          uv run pytest tests/ci/test_plugin_env_service_completeness.py -v

  compose-required-env-coverage:
    name: "Compose Required-Env Coverage (OMN-5439)"
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Check compose :? env var fixture coverage
        run: |
          echo "================================================================"
          echo "Compose Required-Env Coverage Guard (OMN-5439)"
          echo "Every :?-required var in compose must be in test fixture dict"
          echo "================================================================"
          uv run pytest tests/ci/test_compose_required_env_coverage.py -v --tb=short

  # Contract path pre-flight: verify all referenced module paths exist before expensive test splits (F8/OMN-6478)
  contract-path-preflight:
    name: Contract Path Pre-Flight
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v6

      - name: Verify all referenced contract paths exist
        run: |
          WARNINGS=0
          SKIPPED=0
          CHECKED=0
          # Find all contract.yaml files and verify referenced module paths
          for contract in $(find src/ -name "contract.yaml" -o -name "*.contract.yaml" 2>/dev/null); do
            # Extract module paths from contract YAML (lines like "  module: some.module.path")
            MODULES=$(grep -E '^\s+module:' "$contract" | sed 's/.*module:\s*"\?\([^"]*\)"\?/\1/' || true)
            for mod in $MODULES; do
              # Only validate modules within this repo (omnibase_infra).
              # Cross-repo references (omnibase_core, omnibase_spi, etc.) are
              # external dependencies and cannot be validated locally.
              case "$mod" in
                omnibase_infra.*)
                  CHECKED=$((CHECKED + 1))
                  MOD_PATH=$(echo "$mod" | tr '.' '/')
                  if [ ! -f "src/${MOD_PATH}.py" ] && [ ! -f "src/${MOD_PATH}/__init__.py" ]; then
                    echo "::error file=${contract}::Contract references module '${mod}' but neither src/${MOD_PATH}.py nor src/${MOD_PATH}/__init__.py exists"
                    WARNINGS=$((WARNINGS + 1))
                  fi
                  ;;
                *)
                  SKIPPED=$((SKIPPED + 1))
                  ;;
              esac
            done
          done
          echo "Contract path pre-flight: ${CHECKED} local modules checked, ${WARNINGS} dead references, ${SKIPPED} cross-repo references skipped"
          if [ "$WARNINGS" -gt "0" ]; then
            echo "Contract path pre-flight FAILED: ${WARNINGS} dead module reference(s)"
            exit 1
          fi

  contract-sync-gate:
    name: Contract Sync Gate (Wave C) [OMN-8915]
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@v6

      - name: Install gh CLI
        run: |
          type gh || (apt-get update -qq && apt-get install -y -qq gh)

      - name: Run contract-sync gate
        run: |
          PR="${{ github.event.pull_request.number || github.event.merge_group.head_sha }}"
          if [[ -z "$PR" || "$PR" == "null" ]]; then
            echo "No PR number available — skipping in merge_group context"
            exit 0
          fi
          bash scripts/validate-pr-contract-sync.sh "$PR"
        env:
          GH_TOKEN: ${{ github.token }}

  # ---------------------------------------------------------------------------
  # Phase 1.6 - Detect Changes (OMN-10715)
  # ---------------------------------------------------------------------------
  # Runs detect_test_paths and emits outputs for dynamic matrix shaping.
  # When ENABLE_SMART_TESTS is off (default), emits a 15-shard matrix with
  # full_suite_reason=FEATURE_FLAG_OFF so the full-suite pytest step runs.
  # When the flag is on and the change set is small, emits a smaller matrix
  # and selected_paths, activating the smart-selection pytest step instead.

  detect-changes:
    name: Detect Changes
    needs: [lint, onex-validation, infra-node-handler-ownership, migration-freeze, fingerprint-check, demo-loop-gate, topic-enum-drift, topic-naming-lint, topic-drift-check, arch-invariants, schema-handshake, plugin-env-service-completeness, compose-required-env-coverage, contract-path-preflight, contract-compliance, contract-sync-gate]
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    outputs:
      is_full_suite: ${{ steps.detect.outputs.is_full_suite }}
      full_suite_reason: ${{ steps.detect.outputs.full_suite_reason }}
      split_count: ${{ steps.detect.outputs.split_count }}
      matrix: ${{ steps.detect.outputs.matrix }}
      selected_paths: ${{ steps.detect.outputs.selected_paths }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Compute changed files
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base" || true
            git diff --name-only "$base"...HEAD > changed.txt
          else
            git diff --name-only HEAD~1 HEAD > changed.txt || echo "" > changed.txt
          fi
          echo "Changed files:"
          cat changed.txt

      - name: Resolve test selection
        id: detect
        env:
          FLAG: ${{ vars.ENABLE_SMART_TESTS == 'true' && 'on' || 'off' }}
        run: |
          uv run python -m scripts.ci.detect_test_paths \
            --changed-files-from changed.txt \
            --ref-name "${{ github.ref_name }}" \
            --event-name "${{ github.event_name }}" \
            --feature-flag "$FLAG" \
            > selection.json
          cat selection.json
          is_full=$(jq -r '.is_full_suite' selection.json)
          reason=$(jq -r '.full_suite_reason // ""' selection.json)
          split_count=$(jq -r '.split_count' selection.json)
          matrix=$(jq -c '.matrix' selection.json)
          paths=$(jq -c '.selected_paths' selection.json)
          echo "is_full_suite=$is_full" >> "$GITHUB_OUTPUT"
          echo "full_suite_reason=$reason" >> "$GITHUB_OUTPUT"
          echo "split_count=$split_count" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected_paths=$paths" >> "$GITHUB_OUTPUT"

      - name: Upload selection artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-selection
          path: selection.json
          retention-days: 7

  # Parallel test execution — matrix shape driven by detect-changes output (OMN-10715).
  # When ENABLE_SMART_TESTS is off (default), detect-changes emits a 15-shard matrix
  # with full_suite_reason=FEATURE_FLAG_OFF so the full-suite pytest step runs.
  # When the flag is on and the change set is small, detect-changes emits a smaller
  # matrix and selected_paths, activating the smart-selection pytest step instead.
  #
  # Split strategy: 9265 tests / 15 = ~618 tests per split (~2-3 min each)
  # Reduced from 10 splits + -n auto after repeated xdist OOM crashes on shard 3
  test-parallel:
    name: Tests (Split ${{ matrix.split }}/${{ needs.detect-changes.outputs.split_count }})
    needs: [zone-filter, lint, onex-validation, migration-freeze, fingerprint-check, demo-loop-gate, topic-enum-drift, topic-naming-lint, topic-drift-check, arch-invariants, schema-handshake, plugin-env-service-completeness, compose-required-env-coverage, contract-path-preflight, contract-compliance, contract-sync-gate, detect-changes]
    if: needs.zone-filter.outputs.docs_only != 'true'
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        split: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Run pytest (smart selection)
        if: vars.ENABLE_SMART_TESTS == 'true' && needs.detect-changes.outputs.is_full_suite == 'false'
        run: |
          paths=$(echo '${{ needs.detect-changes.outputs.selected_paths }}' | jq -r '.[]')
          uv run pytest $paths \
            --ignore=tests/integration/docker \
            -m "not slow and not chaos and not kafka and not performance" \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            -n 2 --dist loadgroup \
            --timeout=60 \
            --timeout-method=thread \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Run pytest (full suite)
        if: vars.ENABLE_SMART_TESTS != 'true' || needs.detect-changes.outputs.is_full_suite == 'true'
        run: |
          uv run pytest tests/ \
            --ignore=tests/integration/docker \
            -m "not slow and not chaos and not kafka and not performance" \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            -n 2 --dist loadgroup \
            --timeout=60 \
            --timeout-method=thread \
            --tb=short \
            --store-durations \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.split }}
          path: junit-${{ matrix.split }}.xml
          retention-days: 7

      - name: Upload test durations (for split rebalancing)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-durations-split-${{ matrix.split }}
          path: .test_durations
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Version Pin Compliance Check (OMN-4807)
  # ---------------------------------------------------------------------------
  # Verifies that this repo's dependency pins are compliant with the shared
  # version matrix defined in omni_home/standards/version-matrix.yaml.
  # Depends on OMN-4803 (check_version_pins.py must exist in omni_home main).
  version-pin-check:
    name: Version Pin Compliance
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout onex_change_control standards
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: OmniNode-ai/onex_change_control
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: onex_change_control
          sparse-checkout: |
            standards/
            scripts/
          sparse-checkout-cone-mode: false

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"

      - name: Check version pin compliance
        run: |
          SCRIPT="onex_change_control/scripts/check_version_pins.py"
          if [ ! -f "$SCRIPT" ]; then
            echo "::warning::$SCRIPT not found — skipping version pin check"
            exit 0
          fi
          # The script scans root/*/pyproject.toml — create a temp workspace
          # with a symlink so the scanner can find this repo's pyproject.toml.
          WORKSPACE=$(mktemp -d)
          ln -s "$GITHUB_WORKSPACE" "$WORKSPACE/omnibase_infra"
          python "$SCRIPT" --root "$WORKSPACE"

      - name: Check Dockerfile.runtime plugin pins
        run: |
          echo "================================================================"
          echo "Dockerfile.runtime Plugin Pin Check (OMN-5108)"
          echo "================================================================"
          uv run python scripts/check_dockerfile_pins.py

  # ============================================================================
  # ONEX Compliance Check
  # Runs `onex compliance check` to validate contracts, handlers, and schemas.
  # External-service checks WARN only (not FAIL) — structural failures remain FAIL.
  # Conditional: only runs if the `onex compliance` command is available.
  # ============================================================================
  compliance:
    name: Contract Compliance
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"
          shared-env-enabled: "false"

      - name: Install dependencies
        run: uv sync --no-cache

      - name: Check if onex compliance command exists
        id: check-command
        run: |
          if uv run onex compliance check --help >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::onex compliance check command not available yet — skipping"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run onex compliance check
        id: compliance
        if: steps.check-command.outputs.available == 'true'
        run: |
          mkdir -p .onex_state/compliance
          if uv run onex compliance check --repo-root . --output .onex_state/compliance/report.yaml; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "::warning::ONEX compliance check reported failures (warn-only for external-service checks)"
          fi

      - name: Upload compliance report
        if: always() && steps.check-command.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: compliance-report
          path: .onex_state/compliance/report.yaml
          retention-days: 30

  # ============================================================================
  # CI Tests Gate (aggregator for branch protection)
  # Required check: "CI Tests Gate" -- do not rename without updating
  # branch protection AND .github/required-checks.yaml
  # ============================================================================
  tests-gate:
    name: CI Tests Gate
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [test-parallel, detect-changes]
    if: always()
    steps:
      - name: Check test matrix results
        env:
          TESTS_RESULT: ${{ needs.test-parallel.result }}
          SPLIT_COUNT: ${{ needs.detect-changes.outputs.split_count }}
        run: |
          if [ "$TESTS_RESULT" != "success" ] && [ "$TESTS_RESULT" != "skipped" ]; then
            echo "::error::Test matrix failed (result: $TESTS_RESULT)"
            exit 1
          fi
          if [ "$TESTS_RESULT" = "skipped" ]; then
            echo "Test matrix skipped - docs-only / declarative-evidence diff"
          else
            echo "All ${SPLIT_COUNT} test splits passed"
          fi

  # ============================================================================
  # CROSS-REPO MIGRATION CONFLICT CHECK (OMN-5772)
  # Validates migration schema conflicts against onex_change_control.
  # ============================================================================

  migration-conflict-check:
    name: Cross-Repo Migration Conflicts
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: OmniNode-ai/onex_change_control/.github/actions/validate-boundaries@main
        id: migration_conflicts
        env:
          OMNI_REPO_CLONE_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        with:
          checks: "migration-conflicts"
          repos: "omniclaude,omnidash,omniintelligence,omnibase_core,omnimemory"
          warn-only: "false"


  contract-compliance:
    name: Contract Compliance Check
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Checkout onex_change_control
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          path: onex_change_control
          token: ${{ secrets.CROSS_REPO_PAT || github.token }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install onex_change_control
        working-directory: onex_change_control
        run: |
          set -euo pipefail
          export UV_HTTP_TIMEOUT="${UV_HTTP_TIMEOUT:-600}"
          attempt=1
          max_attempts=3
          delay=10
          until uv sync --no-cache --all-extras; do
            status=$?
            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "::error::uv sync onex_change_control failed after ${attempt} attempt(s)"
              exit "$status"
            fi
            echo "::warning::uv sync onex_change_control attempt ${attempt}/${max_attempts} failed with exit ${status}; retrying in ${delay}s"
            sleep "$delay"
            attempt=$((attempt + 1))
          done

      - name: Validate contract YAML files
        working-directory: onex_change_control
        run: |
          CONTRACTS=$(find "$GITHUB_WORKSPACE/onex_change_control/contracts" -name "OMN-*.yaml" 2>/dev/null)
          if [ -z "$CONTRACTS" ]; then
            echo "No contract YAML files found — skipping validation"
            exit 0
          fi
          uv run validate-yaml $CONTRACTS
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================================================
  # Runtime Boot Smoke Test (OMN-9120)
  # Calls the reusable reusable-runtime-boot.yml workflow in compose mode.
  # Runs after the full test suite passes so a boot regression doesn't compete
  # with flaky unit tests for signal. Self-hosted runners have Docker available;
  # public-fork runs fall back to ubuntu-latest which also has Docker.
  # ============================================================================
  runtime-boot-smoke:
    name: Runtime Boot Smoke (compose)
    needs: [tests-gate]
    if: needs.tests-gate.result == 'success'
    uses: ./.github/workflows/reusable-runtime-boot.yml
    with:
      mode: compose

  ci-summary:
    name: CI Summary
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    # OMN-9120: runtime-boot-smoke runs as an advisory check during the compose-mode
    # boot stabilization period. It is intentionally NOT in `needs` so a smoke-test
    # failure does not block CI Summary. A follow-up ticket promotes it to a hard
    # gate once compose-mode boot is consistently green on main. See CLAUDE.md
    # "Strict-mode invariants land AFTER all downstream consumers are compliant".
    needs: [zone-filter, tests-gate, lint, onex-validation, infra-node-handler-ownership, migration-freeze, fingerprint-check, demo-loop-gate, topic-enum-drift, topic-naming-lint, topic-drift-check, arch-invariants, schema-handshake, migration-integration, migration-required-check, version-pin-check, compliance, contract-sync-gate]
    if: always()

    steps:
      - name: Check test results
        run: |
          gate="${{ needs.tests-gate.result }}"
          lint="${{ needs.lint.result }}"
          onex="${{ needs.onex-validation.result }}"
          infrahnd="${{ needs.infra-node-handler-ownership.result }}"
          migrationfreeze="${{ needs.migration-freeze.result }}"
          fingerprint="${{ needs.fingerprint-check.result }}"
          demoloop="${{ needs.demo-loop-gate.result }}"
          topicenumdrift="${{ needs.topic-enum-drift.result }}"
          topicnaminglint="${{ needs.topic-naming-lint.result }}"
          topicdriftcheck="${{ needs.topic-drift-check.result }}"
          archinvariants="${{ needs.arch-invariants.result }}"
          schemahandshake="${{ needs.schema-handshake.result }}"
          migrationintegration="${{ needs.migration-integration.result }}"
          migrationrequiredcheck="${{ needs.migration-required-check.result }}"
          compliance="${{ needs.compliance.result }}"
          contractsync="${{ needs.contract-sync-gate.result }}"

          if [[ "$gate" == "success" ]] && \
             [[ "$lint" == "success" ]] && \
             [[ "$onex" == "success" ]] && \
             [[ "$infrahnd" == "success" ]] && \
             [[ "$migrationfreeze" == "success" ]] && \
             [[ "$fingerprint" == "success" ]] && \
             [[ "$demoloop" == "success" ]] && \
             [[ "$topicenumdrift" == "success" ]] && \
             [[ "$topicnaminglint" == "success" ]] && \
             [[ "$topicdriftcheck" == "success" ]] && \
             [[ "$archinvariants" == "success" ]] && \
             [[ "$schemahandshake" == "success" ]] && \
             [[ "$migrationintegration" == "success" || "$migrationintegration" == "skipped" ]] && \
             [[ "$migrationrequiredcheck" == "success" ]] && \
             [[ "$compliance" == "success" || "$compliance" == "skipped" ]] && \
             [[ "$contractsync" == "success" || "$contractsync" == "skipped" ]]; then
            echo "All checks passed successfully"
            echo "CI Tests Gate (15 splits): Passed"
            echo "Code Quality: Passed"
            echo "ONEX Validators: Passed"
            echo "Infra Node Handler Ownership: Passed"
            echo "Migration Freeze: Passed"
            echo "Fingerprint Check: Passed"
            echo "Demo Loop Gate: Passed"
            echo "Topic Enum Drift Check: Passed"
            echo "Topic Naming Lint: Passed"
            echo "Topic Drift Check: Passed"
            echo "Arch Invariants: Passed"
            echo "Kafka Schema Handshake: Passed"
            echo "Migration Integration: Passed"
            echo "Writer-Migration Coupling Check: Passed"
            echo "Contract Compliance: $compliance"
            echo "Contract Sync Gate (Wave C): $contractsync"
            echo "Runtime Boot Smoke: advisory (see runtime-boot-smoke job output)"
            exit 0
          else
            echo "Checks failed"
            echo "CI Tests Gate: $gate"
            echo "Lint: $lint"
            echo "ONEX Validators: $onex"
            echo "Infra Node Handler Ownership: $infrahnd"
            echo "Migration Freeze: $migrationfreeze"
            echo "Fingerprint Check: $fingerprint"
            echo "Demo Loop Gate: $demoloop"
            echo "Topic Enum Drift Check: $topicenumdrift"
            echo "Topic Naming Lint: $topicnaminglint"
            echo "Topic Drift Check: $topicdriftcheck"
            echo "Arch Invariants: $archinvariants"
            echo "Kafka Schema Handshake: $schemahandshake"
            echo "Migration Integration: $migrationintegration"
            echo "Writer-Migration Coupling Check: $migrationrequiredcheck"
            echo "Contract Compliance: $compliance"
            echo "Contract Sync Gate (Wave C): $contractsync"
            echo "Runtime Boot Smoke: advisory (see runtime-boot-smoke job output)"
            exit 1
          fi

  # Cross-repo Kafka boundary compatibility test (OMN-3256)
  # Verifies that producer and consumer Pydantic models can round-trip across
  # the Kafka wire format.  Requires sibling repos omniintelligence + omnimemory.
  # Pairs with known drift are marked xfail — they pass as XFAIL until the
  # upstream fix (e.g. OMN-3248) lands, at which point xfail is removed.
  kafka-boundary-compat:
    name: Kafka Boundary Compat (OMN-3256)
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 45

    steps:
      - name: Checkout omnibase_infra
        uses: actions/checkout@v6
        with:
          path: omnibase_infra

      - name: Checkout omniintelligence (sibling)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omniintelligence
          path: omniintelligence
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout omnimemory (sibling)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnimemory
          path: omnimemory
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout omnibase_compat (sibling)
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnibase_compat
          path: omnibase_compat
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python and uv
        uses: ./omnibase_infra/.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"
          cache-key-prefix: uv-boundary
          lock-file-path: 'omnibase_infra/**/uv.lock'
          working-directory: omnibase_infra
          shared-env-enabled: "false"

      - name: Install sibling repos as editable (boundary test deps)
        working-directory: omnibase_infra
        # Use --overrides to install siblings with their full transitive deps while
        # forcing omnibase-infra to the locally-installed editable version from uv sync.
        # Same rationale as schema-handshake job above.
        run: |
          INFRA_VERSION=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "omnibase-infra==${INFRA_VERSION}" > /tmp/sibling-overrides.txt
          echo "omnibase-compat @ file://$(pwd)/../omnibase_compat" >> /tmp/sibling-overrides.txt
          attempt=1
          max_attempts=5
          until uv pip install --overrides /tmp/sibling-overrides.txt -e ../omniintelligence; do
            status=$?
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::uv pip install sibling deps failed after ${attempt} attempt(s)"
              exit "${status}"
            fi
            echo "::warning::uv pip install sibling deps attempt ${attempt}/${max_attempts} failed with exit ${status}; retrying in 10s"
            attempt=$((attempt + 1))
            sleep 10
          done

      - name: Run Kafka boundary compatibility tests
        working-directory: omnibase_infra
        run: |
          echo "================================================================"
          echo "Kafka Boundary Compat Tests (OMN-3256)"
          echo "xfail pairs = known drift tracked in open tickets (still PASS)"
          echo "================================================================"
          uv run pytest tests/integration/event_bus/test_kafka_boundary_compat.py \
            -v --tb=short || { code=$?; [ $code -eq 5 ] && echo "All tests skipped (omnimemory not installed) — OK for release chain" && exit 0 || exit $code; }

  # Writer-migration coupling check -- ensures any PR touching writer_postgres.py
  # or handler_*_postgres.py includes a migration file or explicit bypass comment (OMN-3530)
  migration-required-check:
    name: Writer-Migration Coupling Check
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"
          install-args: '--reinstall-package omnibase-core --reinstall-package omnibase-spi --frozen'

      - name: Check writer-migration coupling
        run: uv run python scripts/check_migration_required.py --ci

  # Migration integration test -- spins up real Postgres, applies all migrations,
  # and asserts every manifest table exists (OMN-3529)
  migration-integration:
    name: Migration Integration Test
    needs: zone-filter
    if: needs.zone-filter.outputs.docs_only != 'true'
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: omnibase_infra
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          cache-enabled: "false"
          install-args: '--reinstall-package omnibase-core --reinstall-package omnibase-spi --frozen'

      - name: Verify Python Postgres client
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import asyncpg

          print(f"asyncpg {asyncpg.__version__}")
          PY

      - name: Resolve Postgres service host
        id: postgres_host
        env:
          POSTGRES_PORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import socket

          port = int(os.environ["POSTGRES_PORT"])

          def can_connect(host: str) -> bool:
              try:
                  with socket.create_connection((host, port), timeout=1.0):
                      return True
              except OSError:
                  return False

          if can_connect("127.0.0.1"):
              print("host=127.0.0.1")
              raise SystemExit(0)

          with open("/proc/net/route", encoding="utf-8") as routes:
              for line in routes.readlines()[1:]:
                  fields = line.split()
                  if len(fields) >= 3 and fields[1] == "00000000":
                      gateway_hex = fields[2]
                      gateway = ".".join(
                          str(int(gateway_hex[i : i + 2], 16))
                          for i in (6, 4, 2, 0)
                      )
                      if can_connect(gateway):
                          print(f"host={gateway}")
                          raise SystemExit(0)

          raise SystemExit(
              f"could not reach Postgres service on localhost or default gateway port {port}"
          )
          PY

      - name: Apply all migrations
        env:
          OMNIBASE_INFRA_DB_URL: postgresql://postgres:test_password@${{ steps.postgres_host.outputs.host }}:${{ job.services.postgres.ports['5432'] }}/omnibase_infra
        run: |
          uv run python scripts/run-migrations.py

      - name: Assert manifest tables exist
        env:
          POSTGRES_HOST: ${{ steps.postgres_host.outputs.host }}
          POSTGRES_PORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          uv run python - <<'PY'
          import asyncio
          import os

          import asyncpg

          EXPECTED_TABLES = {
              "agent_actions",
              "agent_detection_failures",
              "agent_execution_logs",
              "agent_routing_decisions",
              "agent_status_events",
              "agent_transformation_events",
              "baselines_breakdown",
              "baselines_comparisons",
              "baselines_trend",
              "contracts",
              "db_error_tickets",
              "db_metadata",
              "gmail_intent_evaluations",
              "injection_effectiveness",
              "latency_breakdowns",
              "llm_call_metrics",
              "llm_cost_aggregates",
              "manifest_injection_lifecycle",
              "pattern_hit_rates",
              "registration_projections",
              "router_performance_metrics",
              "skill_executions",
              "topics",
              "schema_migrations",
          }


          async def main() -> None:
              conn = await asyncpg.connect(
                  host=os.environ["POSTGRES_HOST"],
                  port=int(os.environ["POSTGRES_PORT"]),
                  user="postgres",
                  password="test_password",
                  database="omnibase_infra",
              )
              try:
                  rows = await conn.fetch(
                      """
                      SELECT table_name
                      FROM information_schema.tables
                      WHERE table_schema = 'public'
                      ORDER BY table_name
                      """
                  )
              finally:
                  await conn.close()

              tables = {row["table_name"] for row in rows}
              for table in sorted(tables):
                  print(table)

              missing = sorted(EXPECTED_TABLES - tables)
              if missing:
                  raise SystemExit(
                      "FAIL: expected table(s) not found in database: "
                      + ", ".join(missing)
                  )


          asyncio.run(main())
          PY
          echo "All 24 tables present."

  ai-slop-check:
    name: AI-Slop Pattern Check (strict, PR diff)
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.12'
          skip-install: "true"
          cache-enabled: "false"
          shared-env-enabled: "true"
      - name: Compute changed Python/Markdown files vs PR base
        id: changed
        run: |
          if [ -n "$GITHUB_BASE_REF" ]; then
            git fetch origin "$GITHUB_BASE_REF" --no-tags --depth=1
            FILES=$(git diff --name-only "origin/$GITHUB_BASE_REF"...HEAD -- '*.py' '*.md' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 -- '*.py' '*.md' 2>/dev/null | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
      - name: Check changed files for AI-slop patterns (strict)
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          if [ -z "$CHANGED_FILES" ]; then exit 0; fi
          echo "$CHANGED_FILES" | tr ' ' '\n' | xargs python scripts/validation/check_ai_slop.py --strict
