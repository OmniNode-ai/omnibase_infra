# OMN-13291: Enforce validator-requirements.yaml fleet gate for omnibase_infra.
# Reports ALL missing gates in a single pass (never fail-on-first).
name: Validate Validator Requirements

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  # OMN-14017: this workflow runs a raw `uv sync` (not the hardened
  # setup-python-uv composite), which otherwise inherits uv's 30s default and
  # fails HARD on the first PyPI timeout under fleet egress saturation (WS-F).
  # Match the composite's 600s so downloads ride out contention. Propagates to
  # every uv invocation in the job.
  UV_HTTP_TIMEOUT: "600"

concurrency:
  # OMN-13949: cancel superseded PR runs to free saturated runners. merge_group
  # entries carry a unique github.ref, so queue entries never cross-cancel.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UV_HTTP_TIMEOUT: "600"

jobs:
  occ-preflight:
    # self-gating-ok: centralized OCC preflight reusable is the canonical cross-repo gate for non-OCC repositories.
    uses: OmniNode-ai/omnibase_core/.github/workflows/occ-preflight.yml@8a47e092002dd1338599fa0733feda469436acbf
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts
      core-ref: 8a47e092002dd1338599fa0733feda469436acbf

  validate-validator-requirements:
    needs: occ-preflight
    name: Enforce validator-requirements.yaml (OMN-13291)
    # OMNI_RUNNER_SELECTOR_V1 — runners are resolved from centralized selector variables.
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    # OMN-14017: sibling checkout plus uv sync can consume the default budget
    # while retrying transient GitHub/PyPI fetch failures.
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout omnibase_core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: OmniNode-ai/omnibase_core
          # Pinned to the commit that exports the validate-validator-requirements hook (OMN-13291).
          # Update by running: gh api repos/OmniNode-ai/omnibase_core/commits/dev --jq '.sha'
          ref: d163312724489f10f58ffdf8115ba1fa9d5783e8
          path: omnibase_core
          token: ${{ secrets.OMNIBASE_CORE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Enforce validator-requirements.yaml
        run: |
          cd omnibase_core
          uv sync --all-extras
          uv run python -m omnibase_core.validation.validator_requirements_consumer \
            --repo omnibase_infra \
            --repo-root .. \
            --spec ../architecture-handshakes/validator-requirements.yaml \
            --baseline ../architecture-handshakes/validator-requirements-baseline.yaml
