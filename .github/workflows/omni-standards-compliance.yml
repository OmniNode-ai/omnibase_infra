---
name: Omni* Ecosystem Standards Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, dev, develop]
  merge_group:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8.3"
  REPO_NAME: "omnibase_infra"

jobs:
  type-safety:
    name: Type Safety Validation
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-enabled: "false"
          cache-key-prefix: uv-type-safety
          install-args: --all-extras
          github-token: ${{ secrets.CROSS_REPO_PAT || github.token }}

      - name: Run MyPy type checking
        run: |
          if [ -f mypy.ini ]; then
            uv run mypy src/ --config-file=mypy.ini
          else
            uv run mypy src/ --strict
          fi

  type-union-check:
    name: PEP 604 Type Union Check (UP007)
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}
          cache-enabled: "false"
          cache-key-prefix: uv-type-union
          install-args: --all-extras
          github-token: ${{ secrets.CROSS_REPO_PAT || github.token }}

      - name: Check for Optional/Union usage (PEP 604)
        run: uv run ruff check src/ --select UP007,UP006

  handler-contract-compliance:
    name: Handler Contract Compliance
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install onex_change_control (pinned)
        env:
          GIT_FETCH_TOKEN: ${{ secrets.CROSS_REPO_PAT || github.token }}
        run: |
          # Authenticate the git+https fetch so it isn't anonymous-rate-limited
          # on the self-hosted runner ("Empty reply from server"). Process-scoped
          # insteadOf rewrite; never writes the token to disk. (OMN-12432)
          if [ -n "${GIT_FETCH_TOKEN}" ]; then
            export GIT_CONFIG_COUNT=1
            export GIT_CONFIG_KEY_0="url.https://x-access-token:${GIT_FETCH_TOKEN}@github.com/.insteadOf"
            export GIT_CONFIG_VALUE_0="https://github.com/"
          fi
          uv venv .venv --python "${pythonLocation}/bin/python"
          . .venv/bin/activate
          python - <<'PY' > /tmp/onex-change-control-overrides.txt
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          source = (
              pyproject.get("tool", {})
              .get("uv", {})
              .get("sources", {})
              .get("omnibase-core")
          )
          if isinstance(source, dict) and source.get("git"):
              ref = source.get("rev") or source.get("tag") or source.get("branch")
              if ref:
                  print(f"omnibase-core @ git+{source['git']}@{ref}")
          PY
          if [ -s /tmp/onex-change-control-overrides.txt ]; then
            uv pip install \
              --overrides /tmp/onex-change-control-overrides.txt \
              "onex_change_control @ git+https://github.com/OmniNode-ai/onex_change_control.git@08a5194c6e587e8b2256c1f1edde236ad34cd397"
          else
            uv pip install "onex_change_control @ git+https://github.com/OmniNode-ai/onex_change_control.git@08a5194c6e587e8b2256c1f1edde236ad34cd397"
          fi

      - name: Run handler contract compliance check
        run: |
          . .venv/bin/activate
          python -m onex_change_control.validators.arch_handler_contract_compliance \
            --repo-root . \
            --allowlist-path arch-handler-contract-compliance-allowlist.yaml

  omni-standards-gate:
    name: Omni Standards Gate
    # OMNI_RUNNER_SELECTOR_V1 — trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs:
      - type-safety
      - type-union-check
      - handler-contract-compliance
    if: always()
    steps:
      - name: Check standards results
        run: |
          FAILED=false
          for check in \
            "type-safety=${{ needs.type-safety.result }}" \
            "type-union-check=${{ needs.type-union-check.result }}" \
            "handler-contract-compliance=${{ needs.handler-contract-compliance.result }}"; do
            NAME="${check%%=*}"
            RESULT="${check##*=}"
            if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
              echo "::error::$NAME failed (result: $RESULT)"
              FAILED=true
            else
              echo "$NAME: $RESULT"
            fi
          done
          if [ "$FAILED" = "true" ]; then
            echo "Omni Standards Gate FAILED"
            exit 1
          fi
          echo "Omni Standards Gate PASSED"

  ci-naming-convention:
    name: CI Naming Convention
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify CI workflow naming convention
        run: |
          if [ ! -f .github/workflows/ci.yml ]; then
            echo "::error::Missing .github/workflows/ci.yml"
            exit 1
          fi
          CI_NAME=$(grep -m1 "^name:" .github/workflows/ci.yml | sed "s/name: *//")
          if [ "$CI_NAME" != "CI" ]; then
            echo "::error::ci.yml has name '$CI_NAME' — must be 'CI'"
            exit 1
          fi
          for legacy in test.yml ci.yaml; do
            if [ -f ".github/workflows/$legacy" ]; then
              echo "::error::Legacy workflow .github/workflows/$legacy exists"
              exit 1
            fi
          done
          echo "CI naming convention: PASS"
