name: docs-validate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # OMN-13949: cancel superseded PR runs to free saturated runners. merge_group
  # entries carry a unique github.ref, so queue entries never cross-cancel.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  occ-preflight:
    # self-gating-ok: centralized OCC preflight reusable is the canonical cross-repo gate for non-OCC repositories.
    uses: OmniNode-ai/omnibase_core/.github/workflows/occ-preflight.yml@dev
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts

  call:
    needs: occ-preflight
    # @main is intentional — validate-docs.yml header states "Callers use @main"
    uses: OmniNode-ai/omnibase_core/.github/workflows/validate-docs.yml@main
