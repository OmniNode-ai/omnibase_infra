name: No bare compose teardown (OMN-13886)

# Mechanical enforcement of profile-aware runtime-lane teardown. The ONEX
# runtime services are gated behind compose `profiles: ["runtime","full"]`, so a
# bare `docker compose ... down` (no `--profile runtime`/`--profile full` and no
# `--remove-orphans`) tears down the un-profiled core deps while orphaning the
# profile-gated runtime containers — the OMN-13886 teardown defect. Rejects any
# committed bare runtime-lane teardown unless the line carries `--remove-orphans`
# / `--profile runtime` or an explicit `# compose-profile-ok:` annotation.
#
# CLAUDE.md Operating Rule #5: enforcement, not detection. This gate runs the
# same `tests/test_compose_profile_teardown_policy.py` that a developer runs
# locally (also wired as a pre-commit hook).

on:
  pull_request:
  push:
    branches: [dev, main]

concurrency:
  group: no-bare-compose-teardown-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-bare-compose-teardown:
    name: No bare compose teardown
    # OMNI_RUNNER_SELECTOR_V1 - trusted CI defaults to self-hosted omnibase-ci; public forks default to ubuntu-latest.
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # git ls-files (used by the scanner) needs the full tracked index.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # pytest is imported by the module (for the @pytest.mark decorators), but
      # the gate runs the module's standalone __main__ scanner — NOT `pytest` —
      # so `tests/conftest.py` (which pulls heavy runtime deps) is never loaded.
      # The self-tests run in the full `uv run pytest tests/` suite + pre-commit.
      - run: pip install pytest
      - name: Scan for bare runtime-lane teardown recipes
        run: python tests/test_compose_profile_teardown_policy.py
