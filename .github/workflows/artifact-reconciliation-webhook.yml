#
# artifact-reconciliation-webhook.yml
#
# Publishes a slim PR event to onex.evt.github.pr-webhook.v1 on every
# pull_request lifecycle event.  The downstream EFFECT node
# (node_artifact_change_detector_effect) consumes the event and triggers
# the artifact reconciliation pipeline.
#
# Ticket: OMN-3946
#
# Required GitHub Secrets:
#   KAFKA_BOOTSTRAP_SERVERS  — e.g. pkc-xxx.us-east-1.aws.confluent.cloud:9092
#   KAFKA_SASL_USERNAME      — Confluent Cloud API key (or SASL username)
#   KAFKA_SASL_PASSWORD      — Confluent Cloud API secret (or SASL password)

name: Artifact Reconciliation Webhook

on:
  pull_request:
    types: [opened, synchronize, closed, reopened]

jobs:
  occ-preflight:
    # self-gating-ok: centralized OCC preflight reusable is the canonical cross-repo gate for non-OCC repositories.
    uses: OmniNode-ai/omnibase_core/.github/workflows/occ-preflight.yml@79c620f904526f773f6b92eb98743b011fe2eb12
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts
      core-ref: 8a47e092002dd1338599fa0733feda469436acbf

  publish-pr-webhook:
    needs: occ-preflight
    name: Publish PR Webhook Event
    runs-on: >-
      ${{
        ((github.event_name == 'pull_request' && github.base_ref == 'dev') ||
         (github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository))
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    # OMN-14017: shared CI env creation can legitimately spend several minutes
    # retrying git/PyPI fetches during fleet egress saturation.
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get changed files
        id: changed-files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["PR_REPO"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GH_TOKEN"]
          output_path = os.environ["GITHUB_OUTPUT"]
          files = []
          page = 1

          while True:
              url = (
                  f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files"
                  f"?per_page=100&page={page}"
              )
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.load(response)
              if not payload:
                  break
              files.extend(item["filename"] for item in payload)
              page += 1

          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"all_changed_files={','.join(files)}\n")
          PY

      - name: Check webhook credentials
        id: webhook-credentials
        env:
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_SASL_USERNAME: ${{ secrets.KAFKA_SASL_USERNAME }}
          KAFKA_SASL_PASSWORD: ${{ secrets.KAFKA_SASL_PASSWORD }}
        run: |
          if [[ -z "${KAFKA_BOOTSTRAP_SERVERS:-}" || -z "${KAFKA_SASL_USERNAME:-}" || -z "${KAFKA_SASL_PASSWORD:-}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=PR webhook not published::Kafka webhook secrets are unavailable on this runner/event; skipping non-authoritative PR webhook publication."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Set up CI Python environment
        if: ${{ steps.webhook-credentials.outputs.enabled == 'true' }}
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
          cache-key-prefix: uv-pr-webhook
          cache-enabled: "false"
          install-args: --frozen
          shared-env-enabled: "true"

      - name: Publish PR webhook event
        if: ${{ steps.webhook-credentials.outputs.enabled == 'true' }}
        # All potentially attacker-controlled inputs (head_ref, actor) are passed
        # through environment variables, not interpolated directly into the run
        # command, to prevent shell injection.
        env:
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_SASL_USERNAME: ${{ secrets.KAFKA_SASL_USERNAME }}
          KAFKA_SASL_PASSWORD: ${{ secrets.KAFKA_SASL_PASSWORD }}
          PR_ACTION: ${{ github.event.action }}
          PR_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_ACTOR: ${{ github.actor }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          if [[ -z "${KAFKA_BOOTSTRAP_SERVERS:-}" || -z "${KAFKA_SASL_USERNAME:-}" || -z "${KAFKA_SASL_PASSWORD:-}" ]]; then
            echo "::notice title=PR webhook not published::Kafka webhook secrets are unavailable on this runner/event; skipping non-authoritative PR webhook publication."
            exit 0
          fi

          uv run python scripts/publish_pr_webhook_event.py \
            --action "$PR_ACTION" \
            --repo "$PR_REPO" \
            --pr-number "$PR_NUMBER" \
            --head-ref "$PR_HEAD_REF" \
            --head-sha "$PR_HEAD_SHA" \
            --actor "$PR_ACTOR" \
            --merged "$PR_MERGED" \
            --changed-files "$PR_CHANGED_FILES"
