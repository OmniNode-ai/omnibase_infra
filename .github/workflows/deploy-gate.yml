#
# Wave D CI gate: runtime-change PRs must cite a ticket with deploy evidence.
# Ticket: OMN-8912 | DGM-Phase6 (OMN-9734): thin caller — validator lives in omniclaude.
# Reusable workflow landed in omniclaude PR #1418.
#
# Required status check: "deploy-gate"
# Must pass before merging to main on all repos with runtime code.

name: Deploy Gate

on:
  pull_request:
    branches: [main, dev, develop]
  merge_group:

concurrency:
  group: deploy-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  occ-preflight:
    # self-gating-ok: centralized OCC preflight reusable is the canonical cross-repo gate for non-OCC repositories.
    uses: OmniNode-ai/omnibase_core/.github/workflows/occ-preflight.yml@8a47e092002dd1338599fa0733feda469436acbf
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts
      core-ref: 8a47e092002dd1338599fa0733feda469436acbf

  deploy-gate:
    needs: occ-preflight
    uses: OmniNode-ai/omniclaude/.github/workflows/deploy-gate-reusable.yml@main
    secrets: inherit
    with:
      contracts-dir: contracts
