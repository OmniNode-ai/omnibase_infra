#
# OMN-10422 (Wave 5): Caller — re-scan skip-gate bypass tokens at merge_group entry.
#
# Invokes the omniclaude-hosted reusable workflow on pull_request and merge_group.
# On merge_group, the reusable workflow resolves the PR via head SHA and asserts
# exactly-one-PR (invariant I10). Cache is not reused across events (invariant I9).
#
# Required-status-check name: `scan / reject-skip-gate-token`
# Wire via: Settings → Branches → main → Require status checks → add the check name above.

name: Reject skip-gate bypass tokens

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main, dev]
  merge_group:

concurrency:
  # OMN-13949: cancel superseded PR runs to free saturated runners. merge_group
  # entries carry a unique github.ref, so queue entries never cross-cancel.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  occ-preflight:
    # self-gating-ok: centralized OCC preflight reusable is the canonical cross-repo gate for non-OCC repositories.
    uses: OmniNode-ai/omnibase_core/.github/workflows/occ-preflight.yml@8a47e092002dd1338599fa0733feda469436acbf
    permissions:
      contents: read
      pull-requests: read
    with:
      contracts-dir: contracts
      receipts-dir: drift/dod_receipts
      core-ref: 8a47e092002dd1338599fa0733feda469436acbf

  call-reject-skip-token:
    needs: occ-preflight
    uses: OmniNode-ai/omniclaude/.github/workflows/reject-deploy-gate-skip.yml@a677c8f978cd87a8894e3dab9c0291e12c37c545
    secrets: inherit
