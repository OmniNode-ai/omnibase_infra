name: Imperative Contract Guard

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  # OMN-13949: cancel superseded PR runs to free saturated runners. merge_group
  # entries carry a unique github.ref, so queue entries never cross-cancel.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  imperative-contract-guard:
    # self-gating-ok: central guard is intentionally shared across repos; caller PRs do not modify the referenced workflow.
    uses: OmniNode-ai/onex_change_control/.github/workflows/imperative-contract-guard.yml@4120218a4c874094416312cadcbd88b9fb737cf8
