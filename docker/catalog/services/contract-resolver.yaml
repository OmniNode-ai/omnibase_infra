name: omninode-contract-resolver
description: Synchronous HTTP bridge for dashboard contract resolution
image: runtime:latest
layer: runtime
container_name: omninode-contract-resolver
required_env:
  - POSTGRES_PASSWORD
  - VALKEY_PASSWORD
  - KEYCLOAK_ADMIN_CLIENT_SECRET
  - ONEX_SERVICE_CLIENT_SECRET
  - ONEX_REGISTRATION_AUTO_ACK
hardcoded_env:
  OMNIBASE_INFRA_DB_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/omnibase_infra"
  OMNIINTELLIGENCE_DB_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/omniintelligence"
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  KAFKA_BROKER_ALLOWLIST: 'redpanda:'
  BUS_ID: local
  ONEX_CONTRACTS_DIR: /app/contracts
  VALKEY_HOST: valkey
  VALKEY_PORT: '6379'
  OMNICLAUDE_CONTRACTS_ROOT: /app/.venv/lib/python3.12/site-packages/omniclaude/nodes
  OMNICLAUDE_SKILLS_ROOT: /app/.venv/lib/python3.12/site-packages/omniclaude/plugins/onex/skills
  USE_EVENT_ROUTING: 'true'
  KEYCLOAK_ADMIN_URL: http://keycloak:8080
  OTEL_SERVICE_NAME: omninode-contract-resolver
  CONTRACT_RESOLVER_PORT: '8091'
operational_defaults:
  POSTGRES_USER: postgres
  ONEX_LOG_LEVEL: INFO
  ONEX_ENVIRONMENT: local
  KEYCLOAK_REALM: omninode
  KEYCLOAK_ADMIN_CLIENT_ID: onex-admin
  KEYCLOAK_ISSUER: http://localhost:28080/realms/omninode
  ONEX_SERVICE_CLIENT_ID: onex-service
  CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:8085
ports:
  external: 8091
  internal: 8091
healthcheck:
  test: curl -sf http://localhost:8091/health
  interval_s: 30
  timeout_s: 10
  retries: 3
  start_period_s: 40
volumes:
  - contract_resolver_logs:/app/logs
  - ../contracts:/app/contracts:ro
depends_on:
  - service: omninode-runtime
    condition: service_healthy
  - service: redpanda
    condition: service_healthy
restart: unless-stopped
resources:
  cpus: '0.5'
  memory: 256M
  cpus_reservation: '0.1'
  memory_reservation: 64M
stop_grace_period: 30s
command:
  - uvicorn
  - omnibase_infra.services.contract_resolver.launcher:app
  - --host
  - 0.0.0.0
  - --port
  - '8091'
  - --workers
  - '1'
labels:
  com.omninode.service: contract-resolver
  com.omninode.layer: runtime
  com.omninode.version: ${RUNTIME_VERSION:-0.1.0}
  com.omninode.ticket: OMN-2756
  com.omninode.transitional: 'true'
