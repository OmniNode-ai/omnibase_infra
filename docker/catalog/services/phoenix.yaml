name: phoenix
description: Arize Phoenix LLM observability — traces, spans, and evals
image: arizephoenix/phoenix:13.11.0
layer: observability
container_name: omnibase-infra-phoenix
required_env: []
hardcoded_env:
  PHOENIX_WORKING_DIR: /data
operational_defaults: {}
ports:
  external: 6006
  internal: 6006
healthcheck:
  # Phoenix distroless image — use embedded Python to probe the OTLP endpoint.
  # /healthz may not exist in all versions; POST /v1/traces with empty body
  # returns 200 when Phoenix is ready to accept spans (confirmed manually).
  test:
    - /usr/bin/python3
    - -c
    - "import urllib.request; urllib.request.urlopen('http://localhost:6006/healthz')"
  interval_s: 30
  timeout_s: 10
  retries: 5
  start_period_s: 40
volumes:
  - phoenix_data:/data
depends_on: []
restart: unless-stopped
resources: null
labels:
  com.omninode.service: phoenix
  com.omninode.layer: observability
  com.omninode.ticket: OMN-3542
