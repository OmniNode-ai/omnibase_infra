name: savings-estimation-consumer
description: Estimates token/time savings from context injection, pattern enforcement, and LLM routing
image: runtime:latest
layer: runtime
container_name: omninode-savings-estimation-consumer
required_env: []
hardcoded_env:
  OMNIBASE_INFRA_SAVINGS_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
operational_defaults:
  OMNIBASE_INFRA_SAVINGS_BATCH_SIZE: '100'
  OMNIBASE_INFRA_SAVINGS_BATCH_TIMEOUT_MS: '1000'
  ONEX_LOG_LEVEL: INFO
  ONEX_ENVIRONMENT: local
  OMNIMEMORY_ENABLED: 'false'
ports: null
# No HTTP health endpoint in this consumer yet — process-level restart is sufficient.
healthcheck: null
depends_on:
  - service: migration-gate
    condition: service_healthy
  - service: redpanda
    condition: service_healthy
restart: unless-stopped
resources:
  cpus: '0.5'
  memory: 256M
  cpus_reservation: '0.1'
  memory_reservation: 64M
stop_grace_period: 60s
command:
  - python
  - -m
  - omnibase_infra.services.observability.savings_estimation.consumer
labels:
  com.omninode.service: savings-estimation-consumer
  com.omninode.layer: runtime
  com.omninode.version: ${RUNTIME_VERSION:-0.1.0}
  autoheal: 'true'
