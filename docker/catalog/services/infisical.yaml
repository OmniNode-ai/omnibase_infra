name: infisical
description: Secrets management for runtime config prefetch (optional)
image: infisical/infisical:v0.146.0-postgres
layer: infrastructure
container_name: omnibase-infra-infisical
required_env:
  - DB_CONNECTION_URI
  - REDIS_URL
  - ENCRYPTION_KEY
  - AUTH_SECRET
hardcoded_env:
  TELEMETRY_ENABLED: 'false'
operational_defaults:
  SITE_URL: http://localhost:8880
ports:
  external: 8880
  internal: 8080
healthcheck:
  test: wget -q --spider http://localhost:8080/api/status
  interval_s: 30
  timeout_s: 10
  retries: 3
  start_period_s: 60
volumes: []
depends_on:
  - service: postgres
    condition: service_healthy
  - service: valkey
    condition: service_healthy
restart: unless-stopped
resources: null
labels:
  com.omninode.service: infisical
  com.omninode.layer: infrastructure
