name: runtime-effects
description: ONEX runtime effects handler for external interactions
image: runtime:latest
layer: runtime
container_name: omninode-runtime-effects
required_env:
  - POSTGRES_PASSWORD
  - VALKEY_PASSWORD
  - KEYCLOAK_ADMIN_CLIENT_SECRET
  - ONEX_SERVICE_CLIENT_SECRET
  - ONEX_REGISTRATION_AUTO_ACK
  - LLM_CODER_URL
  - LLM_CODER_FAST_URL
  - LLM_EMBEDDING_URL
  - LLM_DEEPSEEK_R1_URL
  - LLM_ENDPOINT_CIDR_ALLOWLIST
  - LLM_CLOUD_ENDPOINT_HOST_ALLOWLIST
  - LOCAL_LLM_SHARED_SECRET
  - GITHUB_TOKEN
hardcoded_env:
  OMNIBASE_INFRA_DB_URL: 'postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/omnibase_infra'
  OMNIINTELLIGENCE_DB_URL: 'postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/omniintelligence'
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  KAFKA_BROKER_ALLOWLIST: 'redpanda:'
  BUS_ID: local
  ONEX_CONTRACTS_DIR: /app/contracts
  ONEX_STATE_ROOT: /app/data/.onex_state
  ONEX_STATE_DIR: /app/data/.onex_state
  ONEX_ACTIVE_RUNTIME_PACKAGES: ${ONEX_ACTIVE_RUNTIME_PACKAGES:?runtime policy contract must set ONEX_ACTIVE_RUNTIME_PACKAGES}
  VALKEY_HOST: valkey
  VALKEY_PORT: '6379'
  ONEX_MARKETPLACE_SKILLS_ROOT: /app/skills
  USE_EVENT_ROUTING: 'true'
  KEYCLOAK_ADMIN_URL: http://keycloak:8080
  OTEL_SERVICE_NAME: omninode-runtime-effects
  RUNTIME_PROFILE: effects
  # OMN-13247 (Phase B dev-verify fix): credential HOME for the spawned
  # claude/codex subprocess (node_coding_agent_invoke_effect). The dev runtime
  # container runs as root (HOME=/root) while the OAuth creds are bind-mounted at
  # /home/omniinfra/.codex and /home/omniinfra/.claude (volumes below). claude and
  # codex read AMBIENT auth from $HOME, so the effect overrides the child env with
  # HOME=$CODING_AGENT_CRED_HOME (and CODEX_HOME=$CODING_AGENT_CRED_HOME/.codex)
  # rather than letting them look in /root and fail auth. Container-internal path
  # that must match the credential bind-mount target -> hardcoded_env, not a secret.
  CODING_AGENT_CRED_HOME: /home/omniinfra
  ONEX_RUNTIME_CAPABILITIES: ${DEV_RUNTIME_EFFECTS_CAPABILITIES:?runtime policy contract must set DEV_RUNTIME_EFFECTS_CAPABILITIES}
  OMNIBASE_INFRA_SAVINGS_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  POSTGRES_HOST: postgres
  ENABLE_RUNTIME_LOG_BRIDGE: 'true'
operational_defaults:
  POSTGRES_USER: postgres
  ONEX_LOG_LEVEL: INFO
  ONEX_ENVIRONMENT: local
  KEYCLOAK_REALM: omninode
  KEYCLOAK_ADMIN_CLIENT_ID: onex-admin
  KEYCLOAK_ISSUER: http://localhost:28080/realms/omninode
  ONEX_SERVICE_CLIENT_ID: onex-service
  ONEX_GROUP_ID: onex-runtime-effects
ports:
  external: 8086
  internal: 8085
healthcheck:
  test: curl -sf http://localhost:8085/health
  interval_s: 45
  timeout_s: 10
  retries: 5
  start_period_s: 1800
volumes:
  - effects_logs:/app/logs
  - effects_data:/app/data
  - ../contracts:/app/contracts:ro
  # OMN-13248 (epic OMN-13245): read-only OAuth credential bind-mounts for the
  # coding-agent EFFECT (node_coding_agent_invoke_effect). codex / claude read
  # AMBIENT OAuth from ~/.codex and ~/.claude — no ANTHROPIC_API_KEY / *_MODEL /
  # endpoint env. The credential VALUES are NEVER baked into the image and NEVER
  # committed; they are operator-supplied host directories bound read-only.
  #
  # DEV credential source (Phase 0, OMN-13246 / omni_home PR #182): a fresh
  # Linux login inside the .201 container produced portable on-disk creds at
  # /home/omniinfra/.codex (auth.json, ChatGPT OAuth + refresh token) and
  # /home/omniinfra/.claude (.credentials.json, claude.ai OAuth + refresh token).
  # Claude Code 2.x on macOS stores its credential in the Keychain, so there is
  # NO ~/.claude/auth.json on the Mac to copy — the Linux container login is the
  # source of truth. The operator copies those two dirs to a stable host path
  # (e.g. /home/jonah/.onex-agent-creds/{.codex,.claude} on .201) and points
  # CODING_AGENT_{CODEX,CLAUDE}_CREDS_HOST_DIR at them.
  #
  # Default /dev/null keeps lanes without configured creds startable (the CLIs
  # simply have no ambient auth and fail closed on invocation, never at boot).
  #
  # codex: mount the credential FILE (auth.json) read-only, NOT the whole
  # ~/.codex dir. codex 0.141.0 writes app-server / session state into CODEX_HOME
  # (~/.codex) at runtime, so a fully read-only dir mount makes `codex exec` fail
  # with "Read-only file system" even though the creds are valid (verified
  # in-container 2026-06-18). Binding only auth.json :ro keeps the credential
  # VALUE read-only while leaving the rest of ~/.codex on the writable layer.
  - ${CODING_AGENT_CODEX_AUTH_HOST_FILE:-/dev/null}:/home/omniinfra/.codex/auth.json:ro
  # claude: the whole ~/.claude dir read-only works (claude reads
  # .credentials.json for ambient OAuth; `claude -p` needs no write to that dir;
  # verified in-container 2026-06-18).
  - ${CODING_AGENT_CLAUDE_CREDS_HOST_DIR:-/dev/null}:/home/omniinfra/.claude:ro
depends_on:
  - service: omninode-runtime
    condition: service_healthy
  - service: redpanda
    condition: service_healthy
restart: unless-stopped
resources:
  cpus: '1.0'
  memory: 1536M
  cpus_reservation: '0.25'
  memory_reservation: 256M
stop_grace_period: 90s
labels:
  com.omninode.service: runtime-effects
  com.omninode.layer: runtime
  com.omninode.version: ${RUNTIME_VERSION:-0.1.0}
  autoheal: 'true'
