# Bundle definitions for ONEX infrastructure catalog.
# Each bundle groups entries that are deployed together.
# "includes" pulls in all entries from another bundle (transitive).
core:
  description: "Core infrastructure — always deployed"
  services:
    - postgres
    - redpanda
    - valkey
    - infisical
  includes: []
  inject_env:
    INFISICAL_ADDR: "http://infisical:8080"
  inject_required_env:
    - INFISICAL_CLIENT_ID
    - INFISICAL_CLIENT_SECRET
    - INFISICAL_PROJECT_ID
    - INFISICAL_ENCRYPTION_KEY
    - INFISICAL_AUTH_SECRET
runtime-core:
  description: "ONEX runtime core — 7 services with no env requirements beyond the 0.34.0 baseline (OMN-9332). Use `onex up runtime-core` to redeploy correctness fixes without also enabling integrations that need new secrets."
  services:
    - omninode-runtime
    - runtime-effects
    - agent-actions-consumer
    - skill-lifecycle-consumer
    - context-audit-consumer
    - omninode-contract-resolver
    - intelligence-api
  includes: []
runtime-integrations:
  description: "Runtime external-integration services — Linear, CI, Slack webhooks (OMN-9332)"
  services:
    - ci-relay
    - linear-relay
    - waitlist-signup-notifier
  includes: []
runtime-observability-projections:
  description: "Runtime projection/observability consumers — postgres projections, cost aggregation, health projection, decision store (OMN-9332)"
  services:
    - injection-effectiveness-consumer
    - savings-estimation-consumer
    - llm-cost-aggregation-consumer
    - consumer-health-projection
    - decision-store-consumer
  includes: []
runtime-infrastructure:
  description: "Runtime infrastructure glue — migrations, workers, autoheal (OMN-9332)"
  services:
    - forward-migration
    - migration-gate
    - intelligence-migration
    - runtime-worker
    - retry-worker
    - autoheal
  includes: []
runtime:
  description: "ONEX runtime platform — composed of runtime-core, runtime-integrations, runtime-observability-projections, runtime-infrastructure (OMN-9332). Preserves the `onex up runtime` operator contract."
  services: []
  includes:
    - core
    - tracing # OMN-8697: always wire Phoenix OTLP tracing with the runtime
    - runtime-core
    - runtime-integrations
    - runtime-observability-projections
    - runtime-infrastructure
observability:
  description: "LLM observability — Phoenix traces and evals"
  services:
    - phoenix
  includes: []
memgraph:
  description: "Graph memory database for OmniMemory"
  services:
    - omnibase-infra-memgraph
  includes: []
  inject_env:
    OMNIMEMORY_ENABLED: "true"
    OMNIMEMORY_MEMGRAPH_HOST: "omnibase-infra-memgraph"
    OMNIMEMORY_MEMGRAPH_PORT: "7687"
  inject_required_env:
    - OMNIMEMORY_DB_URL
secrets:
  description: "Infisical secrets management (DEPRECATED — Infisical is now in core bundle)"
  services: []
  includes:
    - core
  inject_env: {}
  inject_required_env: []
auth:
  description: "Keycloak local OIDC/auth"
  services:
    - keycloak
  includes: []
  inject_required_env:
    - KEYCLOAK_ADMIN_PASSWORD
tracing:
  description: "OpenTelemetry tracing to Phoenix"
  services: []
  includes:
    - observability
  inject_env:
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://phoenix:6006"
    OTEL_TRACES_EXPORTER: "otlp"
