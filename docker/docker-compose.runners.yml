  # omninode-deploy-runner -- OMN-14889: dedicated runner for the
  # release-train-lab.yml tag-cut/deploy jobs (cut_release_train_tag.sh,
  # refresh_stability_lane.sh, refresh_dev_lane.sh). These scripts need real
  # host-path git access to OMNI_HOME sibling clones (they `git fetch`/
  # `checkout --detach`/tag the clones directly and run deploy-runtime.sh's
  # BUILD_SOURCE=workspace path against them) -- the shared 48-64 omnibase-ci
  # fleet above deliberately does NOT have this (docker.sock only, no
  # OMNI_HOME bind mount) so that a compromised/buggy CI job from the general
  # fleet cannot mutate host git state or lane containers. Fork 1 (OMN-14889
  # ticket): rejected SSH-hop from a shared runner (refresh_stability_lane.sh's
  # own docstring disallows it) and rejected mounting OMNI_HOME into the
  # WHOLE fleet (blast radius). This is the smallest incremental surface: ONE
  # runner with exactly the access the release-train jobs need.
  #
  # PRIVATE OMNI_HOME (OMN-14900). This runner does NOT mount the shared
  # /data/omninode/omni_home clones. Five release-train runs on 2026-07-21
  # all died on uid-mismatch against those shared clones (`detected dubious
  # ownership` 128, `cannot open .git/FETCH_HEAD: Permission denied` 255,
  # `'dev' is already checked out at .../runtime-sync-worktrees/...` 128) --
  # a write surface into clones the runner does not own, relieved only by
  # UNCOMMITTED live hand-edits (exec'd `git config --global`, a compose
  # hand-edit adding group_add 1000 + GIT_CONFIG_* env) that any
  # `--force-recreate` silently drops. The committed fix: a DEDICATED,
  # runner-uid-owned clone tree at DEPLOY_RUNNER_OMNI_HOME
  # (e.g. /data/omninode/runner_omni_home -- operator-chosen, host-side env),
  # bind-mounted at the IDENTICAL container path, with the shared mount
  # REMOVED so writes into the shared clones are structurally impossible.
  # The clones themselves are provisioned automatically by
  # scripts/runtime_build/ensure_runner_clones.sh at the top of every entry
  # script (all 5 repos are public; anonymous https clones, no creds).
  #
  # The IDENTICAL host:container bind path is load-bearing: this container
  # uses the HOST's docker.sock (docker-outside-of-docker), so a
  # `docker compose` invocation issued from inside this container resolves
  # volume paths to absolute paths that the DAEMON (running on the host)
  # then tries to bind -- that only works if the path exists on the host at
  # that exact location. A container-local alias (e.g. /workspace) would
  # resolve to a nonexistent host path and silently produce empty binds.
  #
  # DEPLOY_RUNNER_OMNI_HOME is REQUIRED (fail-fast `:?` interpolation): any
  # `docker compose -f docker-compose.runners.yml ...` against this file
  # needs it in the compose environment (export it, or put it in the .env
  # next to this file). No silent default -- an empty value would produce
  # broken binds (CLAUDE.md rule 8).
  #
  # REGISTRATION IS REPOSITORY-SCOPED (live-verified 2026-07-22):
  # GITHUB_ORG_URL points at the omnibase_infra REPO, matching the live
  # registration and the credential cache seeded in the
  # omninode-deploy-runner-creds volume (cache key = labels + URL; changing
  # the URL orphans the cache and forces re-registration). RUNNER_GROUP is
  # explicitly EMPTY: repo-scoped `config.sh --runnergroup` hard-fails, and
  # the entrypoint (OMN-14900) only omits the flag for an explicitly empty
  # value. A recreate re-registers only if the creds volume is lost; then
  # mint a REPO registration token (`gh api -X POST
  # repos/OmniNode-ai/omnibase_infra/actions/runners/registration-token`,
  # valid 1h) and export DEPLOY_RUNNER_TOKEN before `up -d`.
  # See docs/runbooks/release-train-lab.md for the full recreate procedure.
  omninode-deploy-runner:
    image: omninode-runner:latest
    container_name: omninode-deploy-runner
    restart: unless-stopped
    mem_limit: 4g
    memswap_limit: 8g
    cpus: "2.0"
    pids_limit: 4096
    # Root-phase init (OMN-14900): own the private OMNI_HOME bind for the
    # runner uid, then exec the stock entrypoint (which gosu-drops to
    # `runner`). Committed here so the ownership fix survives every
    # recreate -- the live container's equivalent wrapper was an uncommitted
    # host hand-edit. `$$` escapes keep these as RUNTIME shell vars (compose
    # must not interpolate them).
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -eu
        : "$${OMNI_HOME:?OMNI_HOME must reach the container env (from DEPLOY_RUNNER_OMNI_HOME)}"
        mkdir -p "$${OMNI_HOME}"
        runner_uid="$$(id -u runner)"
        runner_gid="$$(id -g runner)"
        if [ "$$(stat -c '%u' "$${OMNI_HOME}")" != "$${runner_uid}" ]; then
          chown "$${runner_uid}:$${runner_gid}" "$${OMNI_HOME}"
        fi
        exec /usr/local/bin/entrypoint.sh
    environment:
      RUNNER_LABELS: self-hosted,omnibase-deploy,linux,x64
      RUNNER_NAME: omninode-deploy-runner
      # Repo-scoped, matching the live registration + seeded creds volume.
      GITHUB_ORG_URL: https://github.com/OmniNode-ai/omnibase_infra
      RUNNER_TOKEN: ${DEPLOY_RUNNER_TOKEN}
      # Present-and-empty = do NOT pass --runnergroup (repo-scoped
      # registration rejects it; see docker/runners/entrypoint.sh).
      RUNNER_GROUP: ""
      ACTIONS_RUNNER_HOOK_JOB_STARTED: /usr/local/bin/runner-job-started.sh
      OMNI_HOME: ${DEPLOY_RUNNER_OMNI_HOME:?DEPLOY_RUNNER_OMNI_HOME must be set (private deploy-runner clone tree, e.g. /data/omninode/runner_omni_home)}
      # OMN-14958: the runtime_build scripts + deploy-runtime.sh need the
      # operator env (POSTGRES_PASSWORD etc.) for compose interpolation, but
      # this container's $HOME carries no ~/.omnibase/.env -- deploy run
      # 29977968728 crashed on exactly that. Point the scripts at the
      # read-only bind mount below (never at /home/runner/.omnibase, whose
      # state/ subtree must stay runner-writable for refresh receipts).
      OMNIBASE_OPERATOR_ENV_FILE: /run/omnibase-operator.env
      # OMN-14958: health-gate/rollback-gate probes. Inside this container
      # localhost is the container itself, so the refresh scripts' default
      # http://localhost:18085|8085 probes die ECONNREFUSED and report a
      # false "lane unhealthy" STOP. host.docker.internal resolves to the
      # host-gateway (extra_hosts below), where the lane ports are published.
      LANE_PROBE_HOST: host.docker.internal
      # Defense-in-depth safe.directory for the 5 PRIVATE clones. The
      # load-bearing exemption is the scoped `git -c safe.directory=<clone>`
      # committed in the runtime_build scripts themselves (OMN-14900); this
      # env only covers stray git invocations outside those scripts.
      GIT_CONFIG_COUNT: "5"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: ${DEPLOY_RUNNER_OMNI_HOME:?}/omnibase_infra
      GIT_CONFIG_KEY_1: safe.directory
      GIT_CONFIG_VALUE_1: ${DEPLOY_RUNNER_OMNI_HOME:?}/omnibase_core
      GIT_CONFIG_KEY_2: safe.directory
      GIT_CONFIG_VALUE_2: ${DEPLOY_RUNNER_OMNI_HOME:?}/omnibase_compat
      GIT_CONFIG_KEY_3: safe.directory
      GIT_CONFIG_VALUE_3: ${DEPLOY_RUNNER_OMNI_HOME:?}/onex_change_control
      GIT_CONFIG_KEY_4: safe.directory
      GIT_CONFIG_VALUE_4: ${DEPLOY_RUNNER_OMNI_HOME:?}/omnimarket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # PRIVATE clone tree at the identical host:container path. The shared
      # ${OMNI_HOME} bind is deliberately ABSENT (OMN-14900) -- do not re-add
      # it; that reopens the uid-mismatch write surface into clones this
      # runner does not own.
      - ${DEPLOY_RUNNER_OMNI_HOME:?}:${DEPLOY_RUNNER_OMNI_HOME:?}
      # OMN-14958: host operator env file, read-only, at a NEUTRAL path.
      # REQUIRED (fail-fast `:?`, same policy as DEPLOY_RUNNER_OMNI_HOME):
      # a silent default would let docker create a DIRECTORY at a bogus host
      # path and the scripts would crash later with a misleading error. Do
      # NOT mount this at /home/runner/.omnibase/.env -- docker would create
      # root-owned intermediate dirs there and break the runner-writable
      # ~/.omnibase/state receipt tree.
      - ${DEPLOY_RUNNER_OPERATOR_ENV_FILE:?DEPLOY_RUNNER_OPERATOR_ENV_FILE must be set (host path of the operator env file, e.g. /home/<operator>/.omnibase/.env)}:/run/omnibase-operator.env:ro
      - ./runners/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ./runners/runner-job-started.sh:/usr/local/bin/runner-job-started.sh:ro
      - ./runners/healthcheck.sh:/usr/local/bin/healthcheck.sh:ro
      - deploy-runner-creds:/home/runner/.runner-creds
    # OMN-14958: host-gateway alias so LANE_PROBE_HOST=host.docker.internal
    # reaches the lane ports published on the host (18085/8085 etc.).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    group_add:
      - "984" # Match host Docker socket GID for DinD access
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 12s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
