# docker-compose.runners.yml
# OmniNode self-hosted GitHub Actions runners
# Ticket: OMN-3276 / Epic: OMN-3273 | Scaled: OMN-3714 | Reconciled to live 48: OMN-12582 | Phase-A scale to 64: OMN-14029
#
# Runs the full steady-state runner fleet. The fleet count is owned by
# config/runner_fleet.yaml (expected_count). Each runner registers with GitHub
# org OmniNode-ai in the 'omnibase-ci' runner group.
#
# Prerequisites:
#   - Build the runner image first (OMN-3275):
#       scripts/ci/build_runner_image.sh --tag omninode-runner:latest
#   - Set RUNNER_TOKEN in environment or .env file
#       Generate at: https://github.com/organizations/OmniNode-ai/settings/actions/runners/new
#       Token is valid for 1 hour. After registration, entrypoint.sh caches credentials.
#
# Usage:
#   docker compose -f docker/docker-compose.runners.yml up -d
#   docker compose -f docker/docker-compose.runners.yml down
#   docker compose -f docker/docker-compose.runners.yml ps
#
# Validate config (checks mem_limit/cpus/pids_limit not silently dropped):
#   docker compose -f docker/docker-compose.runners.yml config
#
# HOST SYSCTL REQUIREMENT (192.168.86.201 Linux host):
# Large Python test suites trigger inotify exhaustion without this setting.
#
#   sudo sysctl -w fs.inotify.max_user_watches=524288
#   sudo sysctl -w fs.inotify.max_user_instances=1024
#
# To persist across reboots, add to /etc/sysctl.d/99-omninode-runners.conf:
#   fs.inotify.max_user_watches = 524288
#   fs.inotify.max_user_instances = 1024
#
# Verify: cat /proc/sys/fs/inotify/max_user_watches
#
# Resource allocation per runner (RTX 5090 host with ample RAM):
#   mem_limit: 6g     - per-runner memory limit (not a reservation); 64 runners
#                       share the host's 91 GB, peak usage ~24 GB observed live
#   memswap_limit: 12g - bounded swap headroom for large CI spikes
#   cpus: "2.0"       - per-runner CFS quota (not a reservation); 64 runners
#                       share the host's 32 vCPUs (over-subscription tolerated)
#   pids_limit: 4096  - prevents fork bombs from runaway test processes
#
# NOTE: mem_limit/cpus/pids_limit are Compose v2 top-level resource keys.
# Do NOT use deploy.resources - those are Swarm-only and silently ignored here.
x-runner-base: &runner-base
  image: omninode-runner:latest
  restart: unless-stopped
  mem_limit: 6g
  memswap_limit: 12g
  cpus: "2.0"
  pids_limit: 4096
  environment: &runner-env
    RUNNER_LABELS: self-hosted,omnibase-ci,linux,x64
    GITHUB_ORG_URL: https://github.com/OmniNode-ai
    RUNNER_TOKEN: ${RUNNER_TOKEN}
    RUNNER_GROUP: omnibase-ci
    ACTIONS_RUNNER_HOOK_JOB_STARTED: /usr/local/bin/runner-job-started.sh
    # OMN-14027 C3 — fleet-wide uv download stampede cap.
    # 64 runners NAT through one home uplink and share one anonymous egress
    # budget. The hardened setup-python-uv composite serializes downloads to 1 in
    # its OWN step, but the 18 workflows that bypass it (OMN-14193) run raw
    # `uv sync` at uv's built-in concurrency default — 64x in parallel — and
    # stampede the shared uplink, tripping the `uv sync` download timeouts that
    # OMN-14017 band-aids per-workflow. These fleet defaults give EVERY job
    # (composite AND raw-uv) a conservative ceiling and the 600s HTTP timeout the
    # composite already applies, so raw-uv paths inherit the protection too.
    #
    # Value is 1 (not the ticket's tuning target of 2) as the deliberate
    # pre-cache fail-safe: the composite path already pins `${...:-1}` = 1, so a
    # fleet default of 1 keeps that proven-safe path UNCHANGED while capping the
    # currently-uncapped raw-uv paths DOWN from uv's default. A fleet default of
    # 2 would loosen the composite path (1 -> 2) and double its download fan
    # under the same saturated uplink — a regression in exactly the failure
    # window this fix targets. Raise to 2 only after the C1 PyPI cache (below) is
    # active and measured (OMN-14027 rollout step 2 / acceptance metrics).
    UV_CONCURRENT_DOWNLOADS: "1"
    UV_CONCURRENT_BUILDS: "1"
    UV_CONCURRENT_INSTALLS: "1"
    UV_HTTP_TIMEOUT: "600"
    # OMN-14027 C1 — PyPI pull-through cache wiring (INERT until rollout).
    # DO NOT uncomment here. This block is shovel-ready but deliberately inert:
    # activating it fleet-wide is a soak-gated rollout action, and pointing the
    # fleet at a cache host that is not yet up would force every runner onto the
    # PyPI fallback. Per the OMN-14027 rollout, devpi is stood up first
    # (docker/docker-compose.pypi-cache.yml) and ONE canary runner is wired via
    # its own container env, leaving the other 63 on direct egress until the
    # canary is measured green. PyPI stays as the fallback index so a cache
    # miss/outage degrades, not fails-closed. Cache endpoint + activation steps:
    # config/runner_fleet.yaml (pypi_cache:) and
    # docs/runbooks/pypi-cache-egress-rollout.md.
    # UV_DEFAULT_INDEX: "http://omninode-pc.tail75df5e.ts.net:3141/root/pypi/+simple/"
    # UV_INDEX_STRATEGY: "unsafe-best-match"
    # PIP_INDEX_URL: "http://omninode-pc.tail75df5e.ts.net:3141/root/pypi/+simple/"
    # PIP_EXTRA_INDEX_URL: "https://pypi.org/simple/"
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./runners/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
    - ./runners/runner-job-started.sh:/usr/local/bin/runner-job-started.sh:ro
    - ./runners/healthcheck.sh:/usr/local/bin/healthcheck.sh:ro
  group_add:
    - "984" # Match host Docker socket GID for DinD access
  # OMN-12433 / OMN-13915: healthcheck proves BOTH the listener is alive AND
  # github.com is reachable, with _diag heartbeat freshness to catch dead
  # Runner.Listener processes. Healthcheck definitions are frozen at container creation,
  # so changing docker/runners/healthcheck.sh requires recreating the runner
  # containers; a bind-mounted file update alone does not change the live
  # container healthcheck command.
  healthcheck:
    test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
    interval: 30s
    timeout: 12s
    retries: 3
    start_period: 120s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
services:
  omninode-runner-1:
    !!merge <<: *runner-base
    container_name: omninode-runner-1
    environment:
      !!merge <<: *runner-env
      RUNNER_NAME: omninode-runner-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runners/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ./runners/runner-job-started.sh:/usr/local/bin/runner-job-started.sh:ro
      - ./runners/healthcheck.sh:/usr/local/bin/healthcheck.sh:ro
      - runner-1-creds:/home/runner/.runner-creds
