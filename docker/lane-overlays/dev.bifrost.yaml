# docker/lane-overlays/dev.bifrost.yaml
#
# OMN-12864: Committed lane overlay — Bifrost local backend endpoint URLs.
#
# These four values were previously only available via ephemeral shell exports
# on .201. Moving them into this committed YAML file makes the deployment
# authority auditable, diff-able, and CI-checked.
#
# AUTHORITY: This file is the single source of truth for the dev lane's
# BIFROST_LOCAL_* endpoint URL bindings. Values here are TYPED and validated
# by ModelBifrostLaneOverlay (OMN-12815: every URL must be the COMPLETE final
# chat-completions URL, not a bare base).
#
# RENDERED FORM: docker/lane-overlays/dev.bifrost.env is generated from this
# file via `uv run python scripts/render_bifrost_lane_overlay_env.py`.
# The compose stack reads the .env sidecar via an `env_file:` reference.
# Never edit the .env sidecar directly — edit this YAML and re-render.
#
# RE-SEED: On each deploy restart, entrypoint-runtime.sh re-renders the
# Bifrost delegation contract FROM the packaged source (OMN-12945). The volume
# copy is never used as an authority on a fresh restart — it is always rebuilt
# from the packaged bifrost_delegation.yaml merged with the env-var endpoints
# supplied by this overlay.
#
# INTERNAL IPs: the .201 and .200 addresses below are local-lane runtime
# endpoints. They are intentionally committed here — this overlay is the
# canonical config authority, not ephemeral shell state.
# onex-allow-internal-ip OMN-12864 reason="committed lane overlay — dev lane local LLM endpoint bindings"
lane: dev
# Coder: Qwen3.6-35B-A3B on .201 port 8000 (RTX 5090)
coder_endpoint_url: "http://192.168.86.201:8000/v1/chat/completions"
# Reasoner: Qwen3.6-27B-MTP-IQ4_XS on .201 port 8001 (RTX 4090)
reasoner_endpoint_url: "http://192.168.86.201:8001/v1/chat/completions"
# Embedding: vllm-embeddings (text-embedding-qwen3 / qwen3-embedding-0.6b) on .201 port 8002 (OMN-13664)
embedding_endpoint_url: "http://192.168.86.201:8002/v1/chat/completions"
# DS-V4-Flash: DeepSeek V4 Flash 284B MoE on .200 port 8101 (OMN-12492)
# onex-allow-internal-ip OMN-12492 reason="DS-V4-Flash (.200) endpoint in committed lane overlay"
ds4_flash_endpoint_url: "http://192.168.86.200:8101/v1/chat/completions"
