# docker-compose.stability-test.yml
# OMN-10281: non-production stability-test runtime lane overlay.
#
# This file is a prep surface only. It defines isolated names and runtime
# environment for a stability-test lane, but it does not install launch hooks,
# cron jobs, systemd units, or deploy automation.
#
# Intended validation command:
#   docker compose -f docker/docker-compose.infra.yml \
#     -f docker/docker-compose.stability-test.yml \
#     config
#
# Starting this lane is intentionally outside this PR's proof scope and requires
# explicit operator approval.
#
# Requires Docker Compose v2.24.4 or later for !override merge semantics.
name: omnibase-infra-stability-test
x-omninode-contract-overlay:
  stability-test-redpanda:
    # OMN-12832: Kafka clients reconnect to the broker address returned in
    # metadata. This is lane contract data, not host environment. Do not move
    # it back to deploy-time interpolation.
    advertised_kafka_addr: &stability_test_redpanda_advertised_kafka_addr "internal://redpanda:9092,external://100.109.203.94:39092"
    advertised_pandaproxy_addr: &stability_test_redpanda_advertised_pandaproxy_addr "internal://redpanda:8082,external://100.109.203.94:28082"
    kafka_port_publish: &stability_test_redpanda_kafka_port_publish "39092:19092"
    admin_port_publish: &stability_test_redpanda_admin_port_publish "29644:9644"
services:
  postgres:
    container_name: omnibase-infra-stability-test-postgres
    ports: !override
      - "${STABILITY_TEST_POSTGRES_EXTERNAL_PORT:-15436}:5432"
  redpanda:
    container_name: omnibase-infra-stability-test-redpanda
    command: !override
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - ${REDPANDA_MEMORY:-8G}
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - *stability_test_redpanda_advertised_kafka_addr
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - *stability_test_redpanda_advertised_pandaproxy_addr
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports: !override
      - *stability_test_redpanda_kafka_port_publish
      - *stability_test_redpanda_admin_port_publish
  redpanda-partition-cap:
    image: redpandadata/redpanda:v24.2.7
    container_name: omnibase-infra-stability-test-redpanda-partition-cap
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        /usr/bin/rpk -X brokers=redpanda:9092 -X admin.hosts=redpanda:9644 cluster config set topic_partitions_per_shard 7000
        /usr/bin/rpk -X brokers=redpanda:9092 -X admin.hosts=redpanda:9644 cluster config set topic_memory_per_partition 1048576
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - omnibase-infra-network
    restart: "no"
  valkey:
    container_name: omnibase-infra-stability-test-valkey
    ports: !override
      - "${STABILITY_TEST_VALKEY_EXTERNAL_PORT:-26379}:6379"
  keycloak:
    container_name: omnibase-infra-stability-test-keycloak
    ports: !override
      - "${STABILITY_TEST_KEYCLOAK_EXTERNAL_PORT:-38080}:8080"
  infisical:
    profiles: !override ["stability-test-disabled"]
  forward-migration:
    container_name: omnibase-infra-stability-test-forward-migration
    restart: "no"
  migration-gate:
    container_name: omnibase-infra-stability-test-migration-gate
    restart: "no"
  intelligence-migration:
    container_name: omnibase-infra-stability-test-intelligence-migration
  omninode-runtime:
    container_name: omninode-stability-test-runtime
    restart: unless-stopped
    depends_on:
      migration-gate:
        condition: service_healthy
      intelligence-migration:
        condition: service_completed_successfully
      redpanda-partition-cap:
        condition: service_completed_successfully
    environment:
      OMNIMEMORY_ENABLED: ${STABILITY_TEST_RUNTIME_MAIN_OMNIMEMORY_ENABLED:?runtime policy contract must set STABILITY_TEST_RUNTIME_MAIN_OMNIMEMORY_ENABLED}
      OMNIMEMORY_MEMGRAPH_HOST: ${STABILITY_TEST_RUNTIME_MAIN_OMNIMEMORY_MEMGRAPH_HOST?runtime policy contract must set STABILITY_TEST_RUNTIME_MAIN_OMNIMEMORY_MEMGRAPH_HOST}
      ONEX_ENVIRONMENT: stability-test
      KAFKA_ENVIRONMENT: stability-test
      ONEX_TOPIC_PROVISIONER_MAX_PARTITIONS: ${STABILITY_TEST_TOPIC_PROVISIONER_MAX_PARTITIONS:?runtime policy contract must set STABILITY_TEST_TOPIC_PROVISIONER_MAX_PARTITIONS}
      ONEX_STATE_ROOT: /app/data/.onex_state_stability_test
      ONEX_STATE_DIR: /app/data/.onex_state_stability_test
      ONEX_BOX_ID: omninode-pc
      ONEX_RUNTIME_ID: stability-test-main
      ONEX_RUNTIME_ADDRESS: runtime://omninode-pc/stability-test/main
      ONEX_RUNTIME_CAPABILITIES: ${STABILITY_TEST_RUNTIME_MAIN_CAPABILITIES:?runtime policy contract must set STABILITY_TEST_RUNTIME_MAIN_CAPABILITIES}
      ONEX_GROUP_ID: onex-stability-test-runtime-main
      ONEX_INFRA_HOST: ${ONEX_INFRA_HOST:?ONEX_INFRA_HOST required for stability session health probes}
      ONEX_INFRA_USER: ${ONEX_INFRA_USER:?ONEX_INFRA_USER required for stability session health probes}
      OMNI_HOME: ${OMNI_HOME:?OMNI_HOME required for stability session health probes}
      SSH_STRICT_HOST_KEY_CHECKING: ${SSH_STRICT_HOST_KEY_CHECKING:-accept-new}
      KAFKA_INSTANCE_ID: stability-test-main
      KAFKA_MAX_POLL_INTERVAL_MS: "1800000"
      BIFROST_VERIFY_ENDPOINTS: ${STABILITY_TEST_RUNTIME_MAIN_BIFROST_VERIFY_ENDPOINTS:?runtime policy contract must set STABILITY_TEST_RUNTIME_MAIN_BIFROST_VERIFY_ENDPOINTS}
      ONEX_SECRET_RESOLVER_CONFIG_PATH: ${STABILITY_TEST_RUNTIME_MAIN_SECRET_RESOLVER_CONFIG_PATH:?runtime policy contract must set STABILITY_TEST_RUNTIME_MAIN_SECRET_RESOLVER_CONFIG_PATH}
      ONEX_SECRET_RESOLVER_CONFIG_JSON: ${STABILITY_TEST_RUNTIME_MAIN_SECRET_RESOLVER_CONFIG_JSON:?runtime policy contract must set STABILITY_TEST_RUNTIME_MAIN_SECRET_RESOLVER_CONFIG_JSON}
      OMNIINTELLIGENCE_PUBLISH_INTROSPECTION: ${STABILITY_TEST_RUNTIME_MAIN_PUBLISH_INTROSPECTION:?runtime policy contract must set STABILITY_TEST_RUNTIME_MAIN_PUBLISH_INTROSPECTION}
      OTEL_SERVICE_NAME: omninode-stability-test-runtime-main
    ports: !override
      - "${STABILITY_TEST_RUNTIME_MAIN_PORT:?runtime policy contract must set STABILITY_TEST_RUNTIME_MAIN_PORT}:8085"
    volumes: !override
      - runtime_logs:/app/logs
      - runtime_data:/app/data
      - ${OMNICLAUDE_SKILLS_DIR:-./skills}:/app/skills:ro
      - "${OMNI_HOME:?OMNI_HOME required for stability session health probes}:${OMNI_HOME:?OMNI_HOME required for stability session health probes}:ro"
    labels:
      - "com.omninode.lane=stability-test"
      - "com.omninode.ticket=OMN-10281"
      - "com.omninode.runtime.address=runtime://omninode-pc/stability-test/main"
      - "com.omninode.runtime.id=stability-test-main"
  runtime-effects:
    container_name: omninode-stability-test-runtime-effects
    restart: unless-stopped
    depends_on:
      migration-gate:
        condition: service_healthy
    environment:
      OMNIMEMORY_ENABLED: ${STABILITY_TEST_RUNTIME_EFFECTS_OMNIMEMORY_ENABLED:?runtime policy contract must set STABILITY_TEST_RUNTIME_EFFECTS_OMNIMEMORY_ENABLED}
      OMNIMEMORY_MEMGRAPH_HOST: ${STABILITY_TEST_RUNTIME_EFFECTS_OMNIMEMORY_MEMGRAPH_HOST?runtime policy contract must set STABILITY_TEST_RUNTIME_EFFECTS_OMNIMEMORY_MEMGRAPH_HOST}
      ONEX_ENVIRONMENT: stability-test
      KAFKA_ENVIRONMENT: stability-test
      ONEX_TOPIC_PROVISIONER_MAX_PARTITIONS: ${STABILITY_TEST_TOPIC_PROVISIONER_MAX_PARTITIONS:?runtime policy contract must set STABILITY_TEST_TOPIC_PROVISIONER_MAX_PARTITIONS}
      ONEX_STATE_ROOT: /app/data/.onex_state_stability_test
      ONEX_STATE_DIR: /app/data/.onex_state_stability_test
      ONEX_BOX_ID: omninode-pc
      ONEX_RUNTIME_ID: stability-test-effects
      ONEX_RUNTIME_ADDRESS: runtime://omninode-pc/stability-test/effects
      ONEX_RUNTIME_CAPABILITIES: ${STABILITY_TEST_RUNTIME_EFFECTS_CAPABILITIES:?runtime policy contract must set STABILITY_TEST_RUNTIME_EFFECTS_CAPABILITIES}
      ONEX_GROUP_ID: onex-stability-test-runtime-effects
      ONEX_INFRA_HOST: ${ONEX_INFRA_HOST:?ONEX_INFRA_HOST required for stability session health probes}
      ONEX_INFRA_USER: ${ONEX_INFRA_USER:?ONEX_INFRA_USER required for stability session health probes}
      OMNI_HOME: ${OMNI_HOME:?OMNI_HOME required for stability session health probes}
      SSH_STRICT_HOST_KEY_CHECKING: ${SSH_STRICT_HOST_KEY_CHECKING:-accept-new}
      KAFKA_INSTANCE_ID: stability-test-effects
      KAFKA_MAX_POLL_INTERVAL_MS: "1800000"
      BIFROST_VERIFY_ENDPOINTS: ${STABILITY_TEST_RUNTIME_EFFECTS_BIFROST_VERIFY_ENDPOINTS:?runtime policy contract must set STABILITY_TEST_RUNTIME_EFFECTS_BIFROST_VERIFY_ENDPOINTS}
      ONEX_SECRET_RESOLVER_CONFIG_PATH: ${STABILITY_TEST_RUNTIME_EFFECTS_SECRET_RESOLVER_CONFIG_PATH:?runtime policy contract must set STABILITY_TEST_RUNTIME_EFFECTS_SECRET_RESOLVER_CONFIG_PATH}
      ONEX_SECRET_RESOLVER_CONFIG_JSON: ${STABILITY_TEST_RUNTIME_EFFECTS_SECRET_RESOLVER_CONFIG_JSON:?runtime policy contract must set STABILITY_TEST_RUNTIME_EFFECTS_SECRET_RESOLVER_CONFIG_JSON}
      OTEL_SERVICE_NAME: omninode-stability-test-runtime-effects
    ports: !override
      - "${STABILITY_TEST_RUNTIME_EFFECTS_PORT:?runtime policy contract must set STABILITY_TEST_RUNTIME_EFFECTS_PORT}:8085"
    volumes: !override
      - effects_logs:/app/logs
      - effects_data:/app/data
      - ${OMNICLAUDE_SKILLS_DIR:-./skills}:/app/skills:ro
      - "${OMNI_HOME:?OMNI_HOME required for stability session health probes}:${OMNI_HOME:?OMNI_HOME required for stability session health probes}:ro"
    labels:
      - "com.omninode.lane=stability-test"
      - "com.omninode.ticket=OMN-10281"
      - "com.omninode.runtime.address=runtime://omninode-pc/stability-test/effects"
      - "com.omninode.runtime.id=stability-test-effects"
  projection-api:
    container_name: omnimarket-stability-test-projection-api
    restart: unless-stopped
    environment:
      ONEX_ENVIRONMENT: stability-test
      KAFKA_ENVIRONMENT: stability-test
      OTEL_SERVICE_NAME: omnimarket-stability-test-projection-api
    ports: !override
      - "${STABILITY_TEST_PROJECTION_API_PORT:-13002}:3002"
    labels:
      - "com.omninode.lane=stability-test"
      - "com.omninode.ticket=OMN-11542"
      - "com.omninode.service=projection-api"
  runtime-worker:
    container_name: omninode-stability-test-runtime-worker
    restart: unless-stopped
    depends_on:
      migration-gate:
        condition: service_healthy
    environment:
      OMNIMEMORY_ENABLED: ${STABILITY_TEST_RUNTIME_WORKER_OMNIMEMORY_ENABLED:?runtime policy contract must set STABILITY_TEST_RUNTIME_WORKER_OMNIMEMORY_ENABLED}
      OMNIMEMORY_MEMGRAPH_HOST: ${STABILITY_TEST_RUNTIME_WORKER_OMNIMEMORY_MEMGRAPH_HOST?runtime policy contract must set STABILITY_TEST_RUNTIME_WORKER_OMNIMEMORY_MEMGRAPH_HOST}
      ONEX_ENVIRONMENT: stability-test
      KAFKA_ENVIRONMENT: stability-test
      ONEX_TOPIC_PROVISIONER_MAX_PARTITIONS: ${STABILITY_TEST_TOPIC_PROVISIONER_MAX_PARTITIONS:?runtime policy contract must set STABILITY_TEST_TOPIC_PROVISIONER_MAX_PARTITIONS}
      ONEX_STATE_ROOT: /app/data/.onex_state_stability_test
      ONEX_STATE_DIR: /app/data/.onex_state_stability_test
      ONEX_BOX_ID: omninode-pc
      ONEX_RUNTIME_ID: stability-test-worker
      ONEX_RUNTIME_ADDRESS: runtime://omninode-pc/stability-test/worker
      ONEX_RUNTIME_CAPABILITIES: ${STABILITY_TEST_RUNTIME_WORKER_CAPABILITIES:?runtime policy contract must set STABILITY_TEST_RUNTIME_WORKER_CAPABILITIES}
      ONEX_GROUP_ID: onex-stability-test-runtime-workers
      ONEX_INFRA_HOST: ${ONEX_INFRA_HOST:?ONEX_INFRA_HOST required for stability session health probes}
      ONEX_INFRA_USER: ${ONEX_INFRA_USER:?ONEX_INFRA_USER required for stability session health probes}
      OMNI_HOME: ${OMNI_HOME:?OMNI_HOME required for stability session health probes}
      SSH_STRICT_HOST_KEY_CHECKING: ${SSH_STRICT_HOST_KEY_CHECKING:-accept-new}
      KAFKA_INSTANCE_ID: stability-test-worker
      KAFKA_MAX_POLL_INTERVAL_MS: "1800000"
      BIFROST_VERIFY_ENDPOINTS: ${STABILITY_TEST_RUNTIME_WORKER_BIFROST_VERIFY_ENDPOINTS:?runtime policy contract must set STABILITY_TEST_RUNTIME_WORKER_BIFROST_VERIFY_ENDPOINTS}
      ONEX_SECRET_RESOLVER_CONFIG_PATH: ${STABILITY_TEST_RUNTIME_WORKER_SECRET_RESOLVER_CONFIG_PATH:?runtime policy contract must set STABILITY_TEST_RUNTIME_WORKER_SECRET_RESOLVER_CONFIG_PATH}
      ONEX_SECRET_RESOLVER_CONFIG_JSON: ${STABILITY_TEST_RUNTIME_WORKER_SECRET_RESOLVER_CONFIG_JSON:?runtime policy contract must set STABILITY_TEST_RUNTIME_WORKER_SECRET_RESOLVER_CONFIG_JSON}
      OTEL_SERVICE_NAME: omninode-stability-test-runtime-worker
    volumes: !override
      - worker_logs:/app/logs
      - stability_test_worker_data:/app/data
      - ${OMNICLAUDE_SKILLS_DIR:-./skills}:/app/skills:ro
      - "${OMNI_HOME:?OMNI_HOME required for stability session health probes}:${OMNI_HOME:?OMNI_HOME required for stability session health probes}:ro"
    labels:
      - "com.omninode.lane=stability-test"
      - "com.omninode.ticket=OMN-10281"
      - "com.omninode.runtime.address=runtime://omninode-pc/stability-test/worker"
      - "com.omninode.runtime.id=stability-test-worker"
    deploy:
      # OMN-12988: pin the worker to a literal 1 — the base infra compose
      # defaults runtime-worker to replicas 0 (${WORKER_REPLICAS:-0}), so a
      # plain compose up/recreate would silently drop the stability-lane worker
      # (4-container census: main, effects, worker, projection-api). A literal
      # (not ${VAR:-1} env indirection) means no stray exported env var can
      # scale it back to 0 with zero signal.
      replicas: 1
  agent-actions-consumer:
    profiles: !override ["stability-test-disabled"]
  skill-lifecycle-consumer:
    profiles: !override ["stability-test-disabled"]
  context-audit-consumer:
    profiles: !override ["stability-test-disabled"]
  intelligence-api:
    profiles: !override ["stability-test-disabled"]
  omninode-contract-resolver:
    profiles: !override ["stability-test-disabled"]
  phoenix:
    profiles: !override ["stability-test-disabled"]
  autoheal:
    profiles: !override ["stability-test-disabled"]
volumes:
  postgres_data:
    name: omnibase-infra-stability-test-postgres-data
  redpanda_data:
    name: omnibase-infra-stability-test-redpanda-data
  valkey_data:
    name: omnibase-infra-stability-test-valkey-data
  keycloak_data:
    name: omnibase-infra-stability-test-keycloak-data
  runtime_data:
    name: omninode-stability-test-runtime-data
  runtime_logs:
    name: omninode-stability-test-runtime-logs
  effects_logs:
    name: omninode-stability-test-effects-logs
  effects_data:
    name: omninode-stability-test-effects-data
  worker_logs:
    name: omninode-stability-test-worker-logs
  stability_test_worker_data:
    name: omninode-stability-test-worker-data
networks:
  omnibase-infra-network:
    name: omnibase-infra-stability-test-network
    driver: bridge
  omnimemory-network:
    name: omnibase-infra-stability-test-omnimemory-network
    driver: bridge
    external: false
