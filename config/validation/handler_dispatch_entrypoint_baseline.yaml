# OMN-14135 — frozen burn-down baseline for the handler dispatch-ENTRYPOINT gate.
#
# INVARIANT (omnibase_infra.validators.handler_dispatch_entrypoint):
#   a handler named in a contract's `handler_routing.handlers[]` MUST expose a
#   callable `handle` or `handle_async`. Auto-wiring's _make_dispatch_callback binds
#   one of them at wiring time; a handler exposing NEITHER is bound to
#   `_missing_handle`, which raises ModelOnexError on EVERY dispatch — while the
#   contract validates, the node boots, and CI stays green. Registration and routing
#   do NOT imply executability.
#
# THIS IS A RATCHET, NOT AN EXEMPTION. It is SHRINK-ONLY:
#   * a handler NOT listed here with no entrypoint  -> FAIL (no new instances, ever);
#   * a handler listed here that GAINS an entrypoint -> FAIL until it is removed
#     (a fixed handler still listed is STALE = FAIL, so the list cannot rot).
#
# Census 2026-07-13 at dev: 40 of 153 distinct contract-declared handlers
# are entrypointless. HandlerA2ATask is deliberately NOT listed — it is the victim
# that exposed this defect class (OMN-14489) and carries a real def-B entrypoint.
#
# Burn-down tracked under OMN-14135. End state is an empty list, at which point
# `_missing_handle` becomes a wiring-time hard failure instead of a per-message one.
known_entrypointless:
  - contract: handler_architecture_validation
    handler: HandlerArchitectureValidation
    module: omnibase_infra.nodes.node_architecture_validator.handlers.handler_architecture_validation
  - contract: node_artifact_change_detector_effect
