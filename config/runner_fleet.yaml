# Authoritative GitHub Actions runner fleet config.
#
# This file is the source of truth for deploy-runners.sh, runner-monitor.sh,
# and the runner health CLI. Do not duplicate these values in scripts.
version: "1.0"
github_org: OmniNode-ai
# Use Tailscale MagicDNS so rebuild/deploy/monitor flows do not depend on the
# runner host's current LAN or Tailscale IP address.
runner_host: omninode-pc.tail75df5e.ts.net
runner_group: omnibase-ci
runner_name_prefix: omninode-runner
# Phase-A scale-up (OMN-14029): 64 always-on steady-state runners, extending the
# reconciled .201 fleet from 48. All 64 are steady (no burst
# profiles), so burst_count == expected_count (no separate burst tier).
expected_count: 64
burst_count: 64
# Docker subnet-pool alerting (OMN-12566). The runner host's default address
# pool can subnet a bounded number of networks before `docker network create`
# fails with "all predefined address pools have been fully subnetted". Alert at
# network_pool_warn_ratio of capacity so the janitor reclaims before exhaustion.
network_pool_capacity: 31
network_pool_warn_ratio: 0.8
# OMN-14027 C1 — PyPI pull-through cache (devpi) endpoint. Source of truth for the
# egress cache the fleet points at. STATUS: pending-activation / INERT — the
# devpi service (docker/docker-compose.pypi-cache.yml) is stood up and wired only
# at the soak-gated rollout; recording the endpoint here does not activate it. The
# matching UV_DEFAULT_INDEX / PIP_INDEX_URL wiring is kept commented in
# docker/docker-compose.runners.yml until then. Runbook:
# docs/runbooks/pypi-cache-egress-rollout.md.
pypi_cache:
  active: false
  # Tailscale MagicDNS host + published port, matching runner_host above so the
  # endpoint does not depend on the runner host's current LAN/Tailscale IP.
  host: omninode-pc.tail75df5e.ts.net
  port: 3141
  # devpi's built-in on-demand pull-through mirror index.
  simple_index_url: http://omninode-pc.tail75df5e.ts.net:3141/root/pypi/+simple/
  # Keep PyPI as the fallback so a cache miss/outage degrades, not fails-closed.
  fallback_index_url: https://pypi.org/simple/
  # Acceptance target before fleet-wide rollout (OMN-14027 metrics).
  target_hit_rate: 0.90
