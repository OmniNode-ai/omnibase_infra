# Authoritative GitHub Actions runner fleet config.
#
# This file is the source of truth for deploy-runners.sh, runner-monitor.sh,
# and the runner health CLI. Do not duplicate these values in scripts.
version: "1.0"
github_org: OmniNode-ai
# Use Tailscale MagicDNS so rebuild/deploy/monitor flows do not depend on the
# runner host's current LAN or Tailscale IP address.
runner_host: omninode-pc.tail75df5e.ts.net
runner_group: omnibase-ci
runner_name_prefix: omninode-runner
# Phase-A scale-up (OMN-14029): 64 always-on steady-state runners, extending the
# reconciled .201 fleet from 48. All 64 are steady (no burst
# profiles), so burst_count == expected_count (no separate burst tier).
expected_count: 64
burst_count: 64
# Docker subnet-pool alerting (OMN-12566). The runner host's default address
# pool can subnet a bounded number of networks before `docker network create`
# fails with "all predefined address pools have been fully subnetted". Alert at
# network_pool_warn_ratio of capacity so the janitor reclaims before exhaustion.
network_pool_capacity: 31
network_pool_warn_ratio: 0.8
