    VALKEY_HOST: "192.168.86.201"
    VALKEY_PORT: "16379"
# Secrets: raw values are acceptable here (same as .env) when the file is
# chmod 600. In production, use secret references instead of raw values.
secrets: {}
services:
  omniclaude:
    ENABLE_POSTGRES: "true"
    ENABLE_KAFKA: "true"
llm:
  coder:
    url: "http://192.168.86.201:8000"
