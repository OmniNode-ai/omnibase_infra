    POSTGRES_HOST: "192.168.86.201"
    POSTGRES_PORT: "5436"
    POSTGRES_USER: "postgres"
  kafka:
    KAFKA_BOOTSTRAP_SERVERS: "192.168.86.201:19092" # onex-allow-internal-ip
