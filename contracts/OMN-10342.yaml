schema_version: "1.0.0"
ticket_id: "OMN-10342"
title: "Add cost projection snapshot emitters"
summary: "Emit cost summary, by-repo, and token-usage projection snapshots and let cost API routes prefer fresh snapshots."
is_seam_ticket: true
