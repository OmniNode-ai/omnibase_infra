title: "feat(OMN-10792): HandlerComplianceLoop — single-attempt schema-compliance evaluator"
summary: >
  Wave 2 of the tokens-to-compliance epic. Adds HandlerComplianceLoop in node_delegation_orchestrator: composes the omnimarket schema-registry, schema-repair, and budget-policy compute nodes into a per-attempt evaluator that the delegation orchestrator's retry loop drives. Pure compute (no I/O, no event bus, no DB) — the orchestrator owns the attempt counter and accumulated tokens; this handler returns either compliant=True, a repair prompt to feed forward, or an ABORT directive when the budget policy or schema-repair handler says no further attempts are possible. Includes ModelComplianceLoopResult.

