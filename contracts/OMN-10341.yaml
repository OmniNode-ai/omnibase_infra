# OMN-10341 contract file for omnibase_infra deploy-gate (OMN-8912).
# Canonical OCC evidence lives in onex_change_control; this repo-local
# contract carries deploy-gate evidence for the waste detection runtime node.
schema_version: "1.0.0"
ticket_id: "OMN-10341"
title: "Add waste detection node"
summary: "Detect LLM cost-waste findings from session-window telemetry and project durable waste_findings rows."
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "events"
  - "protocols"
evidence_requirements:
  - kind: "tests"
    description: "Waste analyzer unit and replay tests pass"
    command: "PYTHONPATH=src uv run pytest tests/unit/nodes/node_waste_detection_compute/test_analyzers.py tests/integration/observability/test_waste_detection_replay.py -q"
  - kind: "manual"
    description: "Post-merge deploy smoke confirms the waste detection handler imports in the deployed runtime container"
    command: "docker exec ${RUNTIME_CONTAINER:-omninode-runtime} python -c \"from omnibase_infra.nodes.node_waste_detection_compute.handlers.handler_waste_detection import HandlerWasteDetection; print('deploy smoke ok', HandlerWasteDetection.__name__)\""
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-001"
    description: "Waste analyzer unit and replay tests pass"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "PYTHONPATH=src uv run pytest tests/unit/nodes/node_waste_detection_compute/test_analyzers.py tests/integration/observability/test_waste_detection_replay.py -q"
  - id: "dod-002"
    description: "Post-merge deploy smoke plan for waste detection handler"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "docker exec ${RUNTIME_CONTAINER:-omninode-runtime} python -c \"from omnibase_infra.nodes.node_waste_detection_compute.handlers.handler_waste_detection import HandlerWasteDetection; print('deploy smoke ok', HandlerWasteDetection.__name__)\""
