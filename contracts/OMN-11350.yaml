# OMN-11350 contract file for omnibase_infra deploy-gate.
schema_version: "1.0.0"
ticket_id: OMN-11350
title: "Fix stability runtime startup errors"
summary: "Preserve typed envelopes for envelope-style auto-wired handlers, make projection terminal event emission tolerate materialized dispatch dicts, repair the ledger projection handler binding expression rejected during stability runtime startup, suppress false-positive missing handler_routing startup errors for contracts that do not declare that optional subcontract, and suppress recoverable pre-auto-create MISSING_TOPIC startup noise."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: "Focused unit and integration tests cover typed payload handlers, typed envelope handlers, materialized dispatch dicts, and heartbeat dispatcher compatibility."
    command: "uv run pytest tests/integration/test_auto_wiring_typed_envelope_runtime.py tests/unit/runtime/auto_wiring/test_wiring.py tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py tests/unit/runtime/auto_wiring/test_wiring_subscribe.py tests/unit/registration/dispatchers/test_dispatcher_node_heartbeat.py -q"
  - kind: manual
    description: "Deploy proof: .201 stability runtime rebuilt and restarted from PR source, then health and log scans verified the previous auto-wiring failures are gone."
    command: "deploy: rebuild omninode-runtime and runtime-effects on .201; verify /health on 18085 and 18086 plus log scan for prior HandlerNodeHeartbeat and projection terminal AttributeError signatures"
  - kind: tests
    description: "Operation-bindings loader parses the packaged ledger projection handler contract without the invalid bare ${payload} expression."
    command: "uv run pytest tests/unit/runtime/contract_loaders/test_operation_bindings_loader.py -q"
  - kind: tests
    description: "Runtime contract startup loading skips optional missing handler_routing sections without emitting MISSING_HANDLER_ROUTING errors while preserving strict direct loader behavior."
    command: "uv run pytest tests/unit/runtime/test_runtime_contract_config_loader.py tests/unit/runtime/contract_loaders/test_handler_routing_loader.py::TestLoadHandlerRoutingSubcontractErrors::test_missing_handler_routing_section_raises_error tests/integration/runtime/test_kernel_auto_wiring.py::test_auto_wiring_skips_contract_without_handler_routing tests/integration/test_runtime_contract_config_startup_noise.py -q"
  - kind: tests
    description: "Topic startup validation suppresses per-topic MISSING_TOPIC logs during the runtime pre-auto-create validation pass, then revalidates after auto-create while preserving direct validator logging semantics."
    command: "uv run pytest tests/unit/event_bus/test_topic_startup_validator.py tests/unit/runtime/test_topic_provisioner_integration.py tests/integration/test_runtime_crash_loop_fix.py tests/integration/test_topic_startup_noise.py -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: dod-focused-auto-wiring-tests
    description: "Focused unit and integration tests for the auto-wiring regression pass."
    source: manual
    checks:
      - check_type: command
        check_value: "uv run pytest tests/integration/test_auto_wiring_typed_envelope_runtime.py tests/unit/runtime/auto_wiring/test_wiring.py tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py tests/unit/runtime/auto_wiring/test_wiring_subscribe.py tests/unit/registration/dispatchers/test_dispatcher_node_heartbeat.py -q"
  - id: dod-deploy-stability-runtime
    description: "Deploy scope: runtime path change was rebuilt and validated on the .201 stability runtime."
    source: manual
    checks:
      - check_type: command
        check_value: "deploy: .201 stability runtime rebuilt from PR source; omninode-runtime and runtime-effects healthy; prior HandlerNodeHeartbeat payload AttributeError, projection terminal correlation_id AttributeError, and Dispatch completed with errors signatures absent in steady-state log scan"
  - id: dod-ledger-binding-loader
    description: "Ledger projection handler contract no longer uses invalid bare payload binding syntax."
    source: manual
    checks:
      - check_type: command
        check_value: "uv run pytest tests/unit/runtime/contract_loaders/test_operation_bindings_loader.py -q"
  - id: dod-missing-handler-routing-startup-noise
    description: "Runtime contract startup loading no longer logs missing handler_routing as an error for contracts that omit the optional section."
    source: manual
    checks:
      - check_type: command
        check_value: "uv run pytest tests/unit/runtime/test_runtime_contract_config_loader.py tests/unit/runtime/contract_loaders/test_handler_routing_loader.py::TestLoadHandlerRoutingSubcontractErrors::test_missing_handler_routing_section_raises_error tests/integration/runtime/test_kernel_auto_wiring.py::test_auto_wiring_skips_contract_without_handler_routing tests/integration/test_runtime_contract_config_startup_noise.py -q"
  - id: dod-missing-topic-startup-noise
    description: "Runtime topic startup validation no longer emits per-topic MISSING_TOPIC errors before the best-effort auto-create/revalidation path can recover."
    source: manual
    checks:
      - check_type: command
        check_value: "uv run pytest tests/unit/event_bus/test_topic_startup_validator.py tests/unit/runtime/test_topic_provisioner_integration.py tests/integration/test_runtime_crash_loop_fix.py tests/integration/test_topic_startup_noise.py -q"
