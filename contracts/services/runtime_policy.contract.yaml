name: runtime_policy
version: 1
active_runtime_packages:
  - omnibase_infra
  - omnimarket
llm_cloud_endpoint_host_allowlist:
  - generativelanguage.googleapis.com
  - api.z.ai
  # OMN-12971: Vertex AI OpenAI-compatible endpoint host. The region prefix is
  # part of the host (e.g. us-central1-aiplatform.googleapis.com); the suffix
  # below allows region-prefixed Vertex hosts for the ADC ($500-credit) path.
  - aiplatform.googleapis.com
omnimemory_memgraph_port: 7687
auxiliary_services_omnimemory_enabled: false
profiles:
  dev:
    compose_project: omnibase-infra
    main_port: 8085
    effects_port: 8086
    topic_provisioner_max_partitions: 0
    secret_resolver_config_path: /app/data/delegation/secret_resolver.yaml
    secret_resolver_mappings:
      - logical_name: llm.openrouter.api_key
        source:
          source_type: env
          source_path: OPEN_ROUTER_API_KEY
      - logical_name: llm.glm.api_key
        source:
          source_type: env
          source_path: LLM_GLM_API_KEY
      - logical_name: llm.gemini.api_key
        source:
          source_type: env
          source_path: GEMINI_API_KEY
      # OMN-12971: Vertex bearer-token ref. ADDITIVE to the Gemini API-key path.
      # The logical ref MUST match the cloud-vertex-gemini backend's secret_ref in
      # omnimarket bifrost_delegation.yaml (llm.vertex.access_token). The effect
      # boundary posts Authorization: Bearer <value>, so the resolved VALUE is a
      # short-lived OAuth access token (NOT the raw ADC JSON). source_type=file →
      # the ref resolves to the mounted token FILE; the operator/bootstrap mints
      # the token from ADC (`gcloud auth application-default print-access-token`)
      # and refreshes the file (tokens expire ~1h). The token VALUE is never
      # committed — only the ref name and the in-container path live here.
      - logical_name: llm.vertex.access_token
        source:
          source_type: file
          source_path: /run/secrets/vertex_access_token
    services:
      main:
        runtime_id: dev-main
        runtime_address: runtime://omninode-pc/dev/main
        capabilities:
          - market.skill-proof
          - workflow.orchestration
          - runtime.main
        bifrost_verify_endpoints: true
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: true
      effects:
        runtime_id: dev-effects
        runtime_address: runtime://omninode-pc/dev/effects
        capabilities:
          - effects.consumer
          - market.skill-proof
          - runtime.effects
        bifrost_verify_endpoints: true
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
      worker:
        runtime_id: dev-worker
        runtime_address: runtime://omninode-pc/dev/worker
        capabilities:
          - workflow.dispatch
          - contract.update
          - runtime.worker
        bifrost_verify_endpoints: true
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
  stability-test:
