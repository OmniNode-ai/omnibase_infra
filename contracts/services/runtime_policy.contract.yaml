name: runtime_policy
version: 1
active_runtime_packages:
  - omnibase_infra
  - omnimarket
llm_cloud_endpoint_host_allowlist:
  - generativelanguage.googleapis.com
  - api.z.ai
  # OMN-12971: Vertex AI OpenAI-compatible endpoint host. The region prefix is
  # part of the host (e.g. us-central1-aiplatform.googleapis.com); the suffix
  # below allows region-prefixed Vertex hosts for the ADC ($500-credit) path.
  - aiplatform.googleapis.com
bifrost_vertex_gemini_endpoint_url: https://us-central1-aiplatform.googleapis.com/v1beta1/projects/gen-lang-client-0084338881/locations/us-central1/endpoints/openapi/chat/completions
google_cloud_project: gen-lang-client-0084338881
google_cloud_location: us-central1
omnimemory_memgraph_port: 7687
# OMN-14297: bolt URI for node_architecture_graph_{populate,query}_effect.
# Currently only reachable from the dev lane (omnibase-infra-network) —
# the omnimemory-memgraph container is not attached to the stability-test/
# judge/prod lane networks. This is the in-network alias; the Tailscale
# host address (bolt://100.109.203.94:7687) is the cross-lane fallback.
arch_graph_bolt_uri: "bolt://omnibase-infra-memgraph:7687"
auxiliary_services_omnimemory_enabled: false
profiles:
  dev:
    compose_project: omnibase-infra
    main_port: 8085
    effects_port: 8086
    topic_provisioner_max_partitions: 0
    # OMN-14551: boundary DLQ routing (auto-wired consume boundary,
    # ONEX_BOUNDARY_DLQ_ENABLED) stays OFF here. This lane is currently cold;
    # flip only after a dedicated dev-lane live proof, not bundled with the
    # stability-test G6 proof this contract change lands.
    boundary_dlq_enabled: false
    secret_resolver_config_path: /app/data/delegation/secret_resolver.yaml
    secret_resolver_mappings:
      - logical_name: llm.openrouter.api_key
        source:
          source_type: env
          source_path: OPEN_ROUTER_API_KEY
      - logical_name: llm.glm.api_key
        source:
          source_type: env
          source_path: LLM_GLM_API_KEY
      - logical_name: llm.gemini.api_key
        source:
          source_type: env
          source_path: GEMINI_API_KEY
      # OMN-12971: Vertex bearer-token ref. ADDITIVE to the Gemini API-key path.
      # The logical ref MUST match the cloud-vertex-gemini backend's secret_ref in
      # omnimarket bifrost_delegation.yaml (llm.vertex.access_token). The effect
      # boundary posts Authorization: Bearer <value>, so the resolved VALUE is a
      # short-lived OAuth access token (NOT the raw ADC JSON). source_type=file →
      # the ref resolves to the mounted token FILE; the operator/bootstrap mints
      # the token from ADC (`gcloud auth application-default print-access-token`)
      # and refreshes the file (tokens expire ~1h). The token VALUE is never
      # committed — only the ref name and the in-container path live here.
      - logical_name: llm.vertex.access_token
        source:
          source_type: file
          source_path: /run/secrets/vertex_access_token
      # OMN-13726: Slack bot token for outbound Slack integrations (alerter,
      # morning report, etc.). Resolves from env locally; Infisical in prod
      # (/shared/env/SLACK_BOT_TOKEN). Swappable per lane via this mapping.
      - logical_name: slack.bot_token
        source:
          source_type: env
          source_path: SLACK_BOT_TOKEN
    services:
      main:
        runtime_id: dev-main
        runtime_address: runtime://omninode-pc/dev/main
        capabilities:
          - market.skill-proof
          - workflow.orchestration
          - runtime.main
        bifrost_verify_endpoints: true
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: true
      effects:
        runtime_id: dev-effects
        runtime_address: runtime://omninode-pc/dev/effects
        capabilities:
          - effects.consumer
          - market.skill-proof
          - runtime.effects
        bifrost_verify_endpoints: true
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
      worker:
        runtime_id: dev-worker
        runtime_address: runtime://omninode-pc/dev/worker
        # OMN-12990: explicit worker replica pin in the ledgered config surface.
        replicas: 1
        capabilities:
          - workflow.dispatch
          - contract.update
          - runtime.worker
        bifrost_verify_endpoints: true
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
  stability-test:
    compose_project: omnibase-infra-stability-test
    main_port: 18085
    effects_port: 18086
    topic_provisioner_max_partitions: 1
    # OMN-14551 G6: flip ON for the live DLQ readback proof on this lane only.
    # See _boundary_dlq_enabled() in
    # src/omnibase_infra/runtime/auto_wiring/handler_wiring.py for behavior.
    # Best-effort DLQ delivery (no nack/redelivery) per the forbid-verify
    # ruling on OMN-14507/OMN-14548 -- G1 stays deferred, this is scoped
    # strictly to the stability-test lane's live-proof requirement.
    boundary_dlq_enabled: true
    secret_resolver_config_path: /app/data/delegation/secret_resolver.yaml
    secret_resolver_mappings:
      - logical_name: llm.openrouter.api_key
        source:
          source_type: env
          source_path: OPEN_ROUTER_API_KEY
      - logical_name: llm.glm.api_key
        source:
          source_type: env
          source_path: LLM_GLM_API_KEY
      - logical_name: llm.gemini.api_key
        source:
          source_type: env
          source_path: GEMINI_API_KEY
      # OMN-12971: Vertex bearer-token ref. ADDITIVE to the Gemini API-key path.
      # The logical ref MUST match the cloud-vertex-gemini backend's secret_ref in
      # omnimarket bifrost_delegation.yaml (llm.vertex.access_token). The effect
      # boundary posts Authorization: Bearer <value>, so the resolved VALUE is a
      # short-lived OAuth access token (NOT the raw ADC JSON). source_type=file →
      # the ref resolves to the mounted token FILE; the operator/bootstrap mints
      # the token from ADC (`gcloud auth application-default print-access-token`)
      # and refreshes the file (tokens expire ~1h). The token VALUE is never
      # committed — only the ref name and the in-container path live here.
      - logical_name: llm.vertex.access_token
        source:
          source_type: file
          source_path: /run/secrets/vertex_access_token
      # OMN-13726: Slack bot token for outbound Slack integrations.
      - logical_name: slack.bot_token
        source:
          source_type: env
          source_path: SLACK_BOT_TOKEN
    services:
      main:
        runtime_id: stability-test-main
        runtime_address: runtime://omninode-pc/stability-test/main
        capabilities:
          - market.skill-proof
          - workflow.orchestration
          - runtime.main
        bifrost_verify_endpoints: false
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: true
      effects:
        runtime_id: stability-test-effects
        runtime_address: runtime://omninode-pc/stability-test/effects
        capabilities:
          - effects.consumer
          - market.skill-proof
          - runtime.effects
        bifrost_verify_endpoints: false
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
      worker:
        runtime_id: stability-test-worker
        runtime_address: runtime://omninode-pc/stability-test/worker
        # OMN-12990: explicit worker replica pin in the ledgered config surface.
        replicas: 1
        capabilities:
          - workflow.dispatch
          - contract.update
          - runtime.worker
        bifrost_verify_endpoints: false
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
  judge:
    compose_project: omnibase-infra-judge
    main_port: 48085
    effects_port: 48086
    topic_provisioner_max_partitions: 1
    # OMN-14551: judge lane is read-only by lane boundary; not in scope for
    # this flip. OFF until an explicit judge-lane authorization.
    boundary_dlq_enabled: false
    secret_resolver_config_path: /app/data/delegation/secret_resolver.yaml
    secret_resolver_mappings:
      - logical_name: llm.openrouter.api_key
        source:
          source_type: env
          source_path: OPEN_ROUTER_API_KEY
      - logical_name: llm.glm.api_key
        source:
          source_type: env
          source_path: LLM_GLM_API_KEY
      - logical_name: llm.gemini.api_key
        source:
          source_type: env
          source_path: GEMINI_API_KEY
      # OMN-12971: Vertex bearer-token ref. ADDITIVE to the Gemini API-key path.
      # The logical ref MUST match the cloud-vertex-gemini backend's secret_ref in
      # omnimarket bifrost_delegation.yaml (llm.vertex.access_token). The effect
      # boundary posts Authorization: Bearer <value>, so the resolved VALUE is a
      # short-lived OAuth access token (NOT the raw ADC JSON). source_type=file →
      # the ref resolves to the mounted token FILE; the operator/bootstrap mints
      # the token from ADC (`gcloud auth application-default print-access-token`)
      # and refreshes the file (tokens expire ~1h). The token VALUE is never
      # committed — only the ref name and the in-container path live here.
      - logical_name: llm.vertex.access_token
        source:
          source_type: file
          source_path: /run/secrets/vertex_access_token
      # OMN-13726: Slack bot token for outbound Slack integrations.
      - logical_name: slack.bot_token
        source:
          source_type: env
          source_path: SLACK_BOT_TOKEN
    services:
      main:
        runtime_id: judge-main
        runtime_address: runtime://judge-local/judge/main
        capabilities:
          - market.skill-proof
          - workflow.orchestration
          - runtime.main
        bifrost_verify_endpoints: false
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: true
      effects:
        runtime_id: judge-effects
        runtime_address: runtime://judge-local/judge/effects
        capabilities:
          - effects.consumer
          - market.skill-proof
          - runtime.effects
