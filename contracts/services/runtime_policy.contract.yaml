          - workflow.orchestration
          - runtime.main
        bifrost_verify_endpoints: false
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: true
      effects:
        runtime_id: stability-test-effects
        runtime_address: runtime://omninode-pc/stability-test/effects
        capabilities:
          - effects.consumer
          - market.skill-proof
          - runtime.effects
        bifrost_verify_endpoints: false
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
      worker:
