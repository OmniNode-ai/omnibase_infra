        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
      worker:
        runtime_id: judge-worker
        runtime_address: runtime://judge-local/judge/worker
        # OMN-12990: explicit worker replica pin in the ledgered config surface.
        replicas: 1
        capabilities:
          - workflow.dispatch
          - contract.update
          - runtime.worker
        bifrost_verify_endpoints: false
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
  prod:
    compose_project: omnibase-infra-prod
    main_port: 28085
    effects_port: 28086
    topic_provisioner_max_partitions: 0
    # OMN-14551: prod flip requires the alertable message_lost counter (still
    # open per the ticket -- see _route_swallowed_exception's "metric surface"
    # note in handler_wiring.py) AND a fresh prod-promotion grant (rule 2a/12).
    # Neither exists yet. OFF.
    boundary_dlq_enabled: false
    services:
      main:
        runtime_id: prod-main
        runtime_address: runtime://omninode-pc/prod/main
        capabilities:
          - market.skill-proof
