name: runtime_policy
version: 1
active_runtime_packages:
  - omnibase_infra
  - omnimarket
llm_cloud_endpoint_host_allowlist:
  - generativelanguage.googleapis.com
  - api.z.ai
omnimemory_memgraph_port: 7687
auxiliary_services_omnimemory_enabled: false
profiles:
  dev:
    compose_project: omnibase-infra
    main_port: 8085
    effects_port: 8086
    topic_provisioner_max_partitions: 0
    secret_resolver_config_path: /app/data/delegation/secret_resolver.yaml
    secret_resolver_mappings:
      - logical_name: llm.openrouter.api_key
        source:
          source_type: env
          source_path: OPEN_ROUTER_API_KEY
      - logical_name: llm.glm.api_key
        source:
          source_type: env
          source_path: LLM_GLM_API_KEY
      - logical_name: llm.gemini.api_key
        source:
          source_type: env
          source_path: GEMINI_API_KEY
    services:
      main:
        runtime_id: dev-main
        runtime_address: runtime://omninode-pc/dev/main
        capabilities:
          - market.skill-proof
          - workflow.orchestration
          - runtime.main
        bifrost_verify_endpoints: true
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: true
      effects:
        runtime_id: dev-effects
        runtime_address: runtime://omninode-pc/dev/effects
        capabilities:
          - effects.consumer
          - market.skill-proof
          - runtime.effects
        bifrost_verify_endpoints: true
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
      worker:
        runtime_id: dev-worker
        runtime_address: runtime://omninode-pc/dev/worker
        capabilities:
          - workflow.dispatch
          - contract.update
          - runtime.worker
        bifrost_verify_endpoints: true
        omnimemory_enabled: false
        omnimemory_memgraph_host: ""
        publish_introspection: false
  stability-test:
    compose_project: omnibase-infra-stability-test
    main_port: 18085
    effects_port: 18086
    topic_provisioner_max_partitions: 1
    secret_resolver_config_path: /app/data/delegation/secret_resolver.yaml
    secret_resolver_mappings:
