# OMN-7841 contract file for omnibase_infra deploy-gate (OMN-8912).
# The canonical ticket contract lives in onex_change_control; this repo-local
# contract carries deploy-gate evidence for the router runtime catalog change.
schema_version: '1.0.0'
ticket_id: OMN-7841
summary: 'feat(router): remove seed cost/speed from model registry'
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: Unit tests cover seedless router scoring behavior
    command: uv run pytest tests/unit/nodes/test_model_router/test_score_models.py -q
  - kind: tests
    description: Integration test loads the real registry and proves live metrics drive scoring
    command: uv run pytest tests/integration/test_model_router_registry_scoring_integration.py -q
  - kind: ci
    description: Router registry/scoring files pass ruff
    command: uv run ruff check src/omnibase_infra/nodes/node_model_router_compute/handlers/handler_score_models.py src/omnibase_infra/nodes/node_model_router_compute/models/model_registry_entry.py src/omnibase_infra/services/routing_api/routes.py tests/unit/nodes/test_model_router/test_score_models.py tests/integration/test_model_router_registry_scoring_integration.py
  - kind: manual
    description: Post-merge deploy validates the runtime router loads the seedless catalog
    command: deploy omninode-runtime after merge and verify /routing/models loads docker/catalog/model_registry.yaml without seed_cost_per_1k_tokens or seed_tokens_per_sec
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: Unit tests for router scoring pass
    source: generated
    checks:
      - check_type: command
        check_value: 'uv run pytest tests/unit/nodes/test_model_router/test_score_models.py -q'
  - id: dod-002
    description: Integration test proves the real registry is seedless and scored from live metrics
    source: generated
    checks:
      - check_type: command
        check_value: 'uv run pytest tests/integration/test_model_router_registry_scoring_integration.py -q'
  - id: dod-003
    description: Router registry/scoring lint passes
    source: generated
    checks:
      - check_type: command
        check_value: 'uv run ruff check src/omnibase_infra/nodes/node_model_router_compute/handlers/handler_score_models.py src/omnibase_infra/nodes/node_model_router_compute/models/model_registry_entry.py src/omnibase_infra/services/routing_api/routes.py tests/unit/nodes/test_model_router/test_score_models.py tests/integration/test_model_router_registry_scoring_integration.py'
  - id: dod-004
    description: Runtime deploy verifies the seedless router catalog after merge
    source: manual
    checks:
      - check_type: command
        check_value: 'deploy omninode-runtime after merge; verify /routing/models loads docker/catalog/model_registry.yaml without seed_cost_per_1k_tokens or seed_tokens_per_sec'
