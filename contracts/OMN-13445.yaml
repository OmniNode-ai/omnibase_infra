ticket_id: OMN-13445
title: >-
  Phase 3a — Re-point infra to core RuntimeLocal; delete relocated runtime+protocol files; expose EventBusKafka.from_bootstrap factory; widen core pin <0.47.0
summary: >-
  Phase 3a of the local-first runtime re-convergence (epic OMN-13442). Re-points omnibase_infra onto the core-resident RuntimeLocal that Phase 1b (OMN-13444 / core #1296, merged SHA db7f341) relocated into omnibase_core.runtime + omnibase_core.protocols.runtime. The 2 CLI instantiation sites (cli/cli_node.py, cli/receipt_mode.py) now import RuntimeLocal + parse_backend_overrides from omnibase_core.runtime.runtime_local. The infra copies of runtime/runtime_local.py, runtime/runtime_local_adapter.py, and the 5 protocols/protocol_local_runtime_*.py are DELETED (now core-resident). EventBusKafka.from_bootstrap(bootstrap) is added (alongside the existing from_config / default) so the core runtime's kafka_bootstrap override path resolves the provider via the onex.backends:event_bus_kafka entry point without a process-wide env mutation. The core pin is widened >=0.44.0,<0.46.0 -> <0.47.0 and [tool.uv.sources] rev set to the Phase-1b merged SHA for end-to-end proof without a PyPI mint. KEPT infra-bound: EventBusKafka + ModelKafkaEventBusConfig + state probes, runtime_local_ingress.py (RuntimeLocalIngressServer) + event_bus_subcontract_wiring + RuntimeHostProcess/service_kernel. This OCC PR carries the central contract consumed by the omnibase_infra PR Receipt Gate via Evidence-Source.
