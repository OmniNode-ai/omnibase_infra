schema_version: "1.0.0"
ticket_id: "OMN-12522"
title: "Advertise stability Redpanda on the connected network"
summary: >-
  Require the stability-test Redpanda external listener to advertise a connected-network address so authorized off-LAN operators can complete Kafka metadata bootstrap instead of being redirected to a LAN-only broker address.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - protocols
evidence_requirements:
  - kind: "tests"
    description: "Stability runtime lane static and compose render tests pass"
    command: >-
      env -u PYTHONPATH uv run pytest tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py -q
  - kind: "ci"
    description: "Touched stability runtime tests pass ruff checks"
    command: >-
      env -u PYTHONPATH uv run ruff format --check tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py && env -u PYTHONPATH uv run ruff check tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py
  - kind: "manual"
    description: "Stability compose render requires and advertises the connected-network broker host"
    command: >-
      POSTGRES_PASSWORD=test VALKEY_PASSWORD=test LINEAR_API_KEY=test-linear-api-key GITHUB_TOKEN=test-github-token ONEX_REGISTRATION_AUTO_ACK=true ONEX_SERVICE_CLIENT_SECRET=test-service-secret LLM_CODER_URL=http://llm-coder.test:8000 LLM_CODER_FAST_URL=http://llm-coder-fast.test:8001 LLM_EMBEDDING_URL=http://llm-embed.test:8100 LLM_DEEPSEEK_R1_URL=http://llm-r1.test:8101 LLM_ENDPOINT_CIDR_ALLOWLIST=192.168.86.0/24 LOCAL_LLM_SHARED_SECRET=render-only-local-llm-secret OMNI_HOME=/data/omninode/omni_home ONEX_INFRA_HOST=100.109.203.94 ONEX_INFRA_USER=jonah docker compose --env-file docker/runtime-policy.env -f docker/docker-compose.infra.yml -f docker/docker-compose.stability-test.yml --profile runtime config --quiet
  - kind: "manual"
    description: "Post-merge .201 stability Redpanda metadata advertises the connected-network endpoint"
    command: >-
      deploy approval required: stability Redpanda advertised identity is owned by the compose contract overlay (see OMN-12832); recreate/restart the stability Redpanda lane, then verify `kcat -L -b 100.109.203.94:39092` reports broker 0 at 100.109.203.94:39092
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-stability-lane-tests"
    description: "Stability runtime lane static and compose render tests pass"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          env -u PYTHONPATH uv run pytest tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py -q
  - id: "dod-ruff-check"
    description: "Touched stability runtime tests pass ruff checks"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          env -u PYTHONPATH uv run ruff format --check tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py && env -u PYTHONPATH uv run ruff check tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py
  - id: "dod-compose-connected-advertise"
    description: "Stability compose render requires and advertises the connected-network broker host"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          POSTGRES_PASSWORD=test VALKEY_PASSWORD=test LINEAR_API_KEY=test-linear-api-key GITHUB_TOKEN=test-github-token ONEX_REGISTRATION_AUTO_ACK=true ONEX_SERVICE_CLIENT_SECRET=test-service-secret LLM_CODER_URL=http://llm-coder.test:8000 LLM_CODER_FAST_URL=http://llm-coder-fast.test:8001 LLM_EMBEDDING_URL=http://llm-embed.test:8100 LLM_DEEPSEEK_R1_URL=http://llm-r1.test:8101 LLM_ENDPOINT_CIDR_ALLOWLIST=192.168.86.0/24 LOCAL_LLM_SHARED_SECRET=render-only-local-llm-secret OMNI_HOME=/data/omninode/omni_home ONEX_INFRA_HOST=100.109.203.94 ONEX_INFRA_USER=jonah docker compose --env-file docker/runtime-policy.env -f docker/docker-compose.infra.yml -f docker/docker-compose.stability-test.yml --profile runtime config --quiet
  - id: "dod-live-metadata"
    description: "Post-merge .201 stability Redpanda metadata advertises the connected-network endpoint"
    source: "manual"
