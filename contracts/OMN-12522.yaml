      - check_type: "command"
        check_value: >-
          deploy approval required: stability Redpanda advertised identity is owned by the compose contract overlay (see OMN-12832); recreate/restart the stability Redpanda lane, then verify `kcat -L -b 100.109.203.94:39092` reports broker 0 at 100.109.203.94:39092
