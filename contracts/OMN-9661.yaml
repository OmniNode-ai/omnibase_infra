# OMN-9661 contract file for deploy-gate (OMN-8912).
# deploy-gate checks `contracts/<OMN-XXXX>.yaml` for a dod_evidence item whose
# check_value contains one of 'docker exec', 'rpk topic produce', or 'deploy'.
# This file satisfies that gate via dod-004 below.
#
# The canonical ticket contract (schema-validated via onex_change_control
# ModelTicketContract) lives at onex_change_control/contracts/OMN-9661.yaml.
# This file is the per-repo deploy-evidence carrier only.
schema_version: '1.0.0'
ticket_id: OMN-9661
summary: 'feat(infra): migration 068 — landing_content_projection; fix workspace-local .onex_state defaults in project_tracker and agent_registry'
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: CI passes on merge PR
    command: gh pr checks 1404 --repo OmniNode-ai/omnibase_infra
  - kind: tests
    description: Integration tests for workspace-local path defaults
    command: 'uv run pytest tests/integration/test_omn_9600_path_defaults.py -v'
  - kind: manual
    description: Migration 068 applied to live omnibase_infra DB on 192.168.86.201:5436
    command: 'psql -h 192.168.86.201 -p 5436 -U postgres -d omnibase_infra -c "\d landing_content_projection"'
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: PR opened against main branch
    source: generated
    checks:
      - check_type: command
        check_value: 'state=$(gh pr view 1404 --repo OmniNode-ai/omnibase_infra --json state,baseRefName -q ''[.state, .baseRefName] | @tsv''); [ "$(echo "$state" | cut -f1)" = "OPEN" ] && [ "$(echo "$state" | cut -f2)" = "main" ]'
  - id: dod-002
    description: Contract artifact file present in repo
    source: generated
    checks:
      - check_type: command
        check_value: 'test -f contracts/OMN-9661.yaml'
  - id: dod-003
    description: Migration 068 present at correct slot in forward migrations
    source: generated
    checks:
      - check_type: command
        check_value: 'test -f docker/migrations/forward/068_create_landing_content_projection.sql'
  - id: dod-004
    description: Deployed runtime reflects workspace-local .onex_state defaults for project_tracker and agent_registry (deploy evidence)
    source: generated
    checks:
      - check_type: command
        check_value: 'docker exec omninode-runtime python -c "from omnibase_infra.adapters.project_tracker.local_stub_project_tracker import LocalStubProjectTracker; t = LocalStubProjectTracker(); assert not str(t._state_root).startswith(str(__import__(\"pathlib\").Path.home())), f\"Expected workspace-local default, got {t._state_root}\"; assert \".onex_state\" in str(t._state_root), f\"Expected .onex_state in path, got {t._state_root}\""'
