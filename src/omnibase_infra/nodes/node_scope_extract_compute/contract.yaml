# ONEX Node Contract - Scope Extract Compute
#
# Related Tickets:
#   - OMN-14832: HandlerScopeExtract exposes the canonical def-B
#     ModelScopeExtractInput handle(request) entrypoint while preserving scope
#     extraction semantics and golden outputs.
name: "node_scope_extract_compute"
node_type: "COMPUTE_GENERIC"
contract_version:
  major: 1
  minor: 1
  patch: 1
node_version: "1.1.1"
description: "Pure computation: extracts scope items (files, directories, repos, systems) from plan content. Contract patch 1 records the OMN-14832 canonical def-B ModelScopeExtractInput handle(request) entrypoint while preserving extraction semantics."
input_model:
  name: "ModelScopeExtractInput"
  module: "omnibase_infra.nodes.node_scope_extract_compute.models.model_scope_extract_input"
  description: "Plan file content to extract scope from. output_path is propagated through for caller-specified write destination."
output_model:
  name: "ModelScopeExtracted"
  module: "omnibase_infra.nodes.node_scope_extract_compute.models.model_scope_extracted"
  description: "Extracted scope manifest with files, dirs, repos, systems. output_path carried from caller intent."
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "extract_scope"
      handler:
        name: "HandlerScopeExtract"
        module: "omnibase_infra.nodes.node_scope_extract_compute.handlers.handler_scope_extract"
metadata:
  description: "Scope extraction compute node for scope-check workflow using the canonical def-B typed ModelScopeExtractInput handler entrypoint"
  author: "OmniNode Team"
  created: "2026-04-01"
  updated: "2026-07-20"
  ticket: "OMN-14832"
  tags:
    - "compute"
    - "scope-check"
    - "canary"
  related_tickets:
    - "OMN-14832"
