name: "node_emit_daemon_runtime"
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version:
  major: 1
  minor: 0
  patch: 0
node_type: "EFFECT_GENERIC"
description: >
  Runtime emit daemon topic marker. The producer lives in omniclaude hooks; this contract documents the topic surface for provisioning continuity until producer-side omniclaude contracts own it directly. The topics are plugin-managed, not dispatched to an omnibase_infra handler.

input_model:
  name: "ModelEmitDaemonRuntimeInput"
  module: "omnibase_infra.runtime.emit_daemon"
  description: "Runtime emit daemon topic-consumption contract input marker."
output_model:
  name: "ModelEmitDaemonRuntimeOutput"
  module: "omnibase_infra.runtime.emit_daemon"
  description: "Runtime emit daemon topic-consumption contract output marker."
event_bus:
  plugin_managed: true
  subscribe_topics:
    - "onex.evt.omniclaude.phase-metrics.v1"
    - "onex.evt.omniclaude.notification-blocked.v1"
    - "onex.evt.omniclaude.notification-completed.v1"
  publish_topics: []
consumed_events:
  - topic: "onex.evt.omniclaude.phase-metrics.v1"
    event_type: "PhaseMetricsEvent"
    message_category: "EVENT"
    description: "Phase metrics events emitted by omniclaude hooks."
  - topic: "onex.evt.omniclaude.notification-blocked.v1"
    event_type: "NotificationBlockedEvent"
    message_category: "EVENT"
    description: "Blocked notification events emitted by omniclaude hooks."
  - topic: "onex.evt.omniclaude.notification-completed.v1"
    event_type: "NotificationCompletedEvent"
    message_category: "EVENT"
    description: "Completed notification events emitted by omniclaude hooks."
metadata:
  owner: "omnibase_infra"
  ticket: "OMN-13700"
  description: >
    Documents emit-daemon lifecycle topics produced by omniclaude hooks so omnibase_infra can provision and monitor the runtime topic surface without creating handler-owned Kafka subscriptions.

  tags:
    - runtime
    - emit-daemon
    - omniclaude
