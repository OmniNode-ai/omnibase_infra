name: "node_projection_cost_token_usage"
contract_name: "node_projection_cost_token_usage"
node_name: "node_projection_cost_token_usage"
contract_version:
  major: 0
  minor: 1
  patch: 0
node_version:
  major: 0
  minor: 1
  patch: 0
node_type: "COMPUTE_GENERIC"
description: >
  Computes repeatable model token-usage snapshots from LLM call metrics and publishes cost.token_usage snapshots for the cost API read path.

input_model:
  name: "ModelEventMessage"
  module: "omnibase_infra.event_bus.models.model_event_message"
  description: "Event bus envelope for token usage snapshot work."
output_model:
  name: "ModelEventMessage"
  module: "omnibase_infra.event_bus.models.model_event_message"
  description: "Event bus envelope for the emitted token usage snapshot."
capabilities:
  - name: "cost.token_usage.snapshot"
    description: "Compute and publish model token usage projection snapshots."
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "cost.token_usage.snapshot"
      handler:
        name: "HandlerProjectionCostTokenUsage"
        module: "omnibase_infra.nodes.node_projection_cost_token_usage.handlers.handler_projection_cost_token_usage"
      description: "Compute model token usage buckets for one time window."
      input_model:
        name: "ModelEventMessage"
        module: "omnibase_infra.event_bus.models.model_event_message"
        description: "Event bus envelope for token usage snapshot work."
      event_model:
        name: "ModelEventMessage"
        module: "omnibase_infra.event_bus.models.model_event_message"
event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  publish_topics:
    - "onex.snapshot.projection.cost.token_usage.v1"
topics:
  produces:
    - topic: "onex.snapshot.projection.cost.token_usage.v1"
      description: "Token usage projection snapshots."
      schema: "ModelCostTokenUsageSnapshot"
metadata:
  related_tickets:
    - "OMN-10342"
  tags:
    - cost
    - projection
    - snapshot
