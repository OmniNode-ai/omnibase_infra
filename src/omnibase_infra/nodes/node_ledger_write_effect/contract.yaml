# ONEX Node Contract
# Node: NodeLedgerWriteEffect
#
# Capability-oriented effect node for event ledger write operations.
# Provides append-only audit ledger storage with idempotent writes.
#
# This contract defines the interface for storing events to the audit ledger
# and querying events by various criteria. The ledger uses PostgreSQL with
# a (topic, partition, kafka_offset) unique constraint for idempotency.
#
# Related Tickets:
#   - OMN-1646: Event Ledger Schema and Models
#   - OMN-1647: Ledger Write Effect Node
#   - OMN-14134: HandlerLedgerAppend gained a handle() auto-wiring adapter so
#     the operation_match dispatch path (no event_model) can reach append()
#     instead of binding the _missing_handle sentinel.
#   - OMN-14139: handler_routing.handlers[] used the flat handler_class:/
#     handler_module: fields, which ModelHandlerRoutingEntry does not parse
#     (it requires a nested handler: {name, module} block) -- both entries
#     silently dropped, wiring ZERO handlers. Fixed to the nested schema, plus
#     an explicit topic: per entry so the two operation_match handlers don't
#     hit the multi-handler topic-assignment ambiguity guard (which also
#     resolves to zero assigned topics when more than one handler entry
#     competes for the contract's subscribe_topics without disambiguation).
#   - OMN-14140: HandlerLedgerAppend/HandlerLedgerQuery required a db_handler
#     constructor argument that the auto-wiring resolver cannot supply, so
#     even with the routing fixed above the handlers were unconstructable
#     (quarantined). Both handlers now compose HandlerDb internally from
#     `container`; the `handler_db` dependency entry below is documentation
#     only -- it has no runtime effect on wiring. HandlerLedgerQuery also
#     gained a handle() adapter mirroring OMN-14134's fix for Append, since
#     it has the same operation_match/no-event_model dispatch shape. Both
#     handle() implementations were also fixed to accept the DICT-shaped
#     envelope MessageDispatchEngine._materialize_envelope_with_bindings
#     actually delivers on the live dispatch path (the OMN-14134 getattr()-only
#     extraction silently no-op'd on dict envelopes and mis-validated).
# Contract identifiers
name: "node_ledger_write_effect"
contract_name: "node_ledger_write_effect"
node_name: "node_ledger_write_effect"
contract_version:
  major: 0
  minor: 1
  patch: 4
node_version:
  major: 0
  minor: 1
  patch: 4
# Node type
node_type: "EFFECT_GENERIC"
# Description
description: >
  Capability-oriented effect node for event ledger write operations. Handles appending events to the PostgreSQL audit ledger with idempotent write support via unique constraint on (topic, partition, kafka_offset). Supports querying events by correlation ID, event type, topic, or time range.

# Strongly typed I/O models
input_model:
  name: "ModelPayloadLedgerAppend"
  module: "omnibase_infra.nodes.node_registration_reducer.models"
  description: "Input model for ledger append operations (event payload with Kafka position)."
output_model:
  name: "ModelLedgerAppendResult"
  module: "omnibase_infra.nodes.node_ledger_write_effect.models"
  description: "Output model for ledger append results (success, entry ID, duplicate flag)."
# Capability declaration (capability-oriented naming)
capabilities:
  - name: "ledger.write"
    description: "Append events to the audit ledger with idempotent write support"
    version: "0.1.0"
  - name: "ledger.write.append"
    description: "Append a single event to the ledger"
  - name: "ledger.query"
    description: "Query events from the audit ledger"
  - name: "ledger.query.by_correlation"
    description: "Query events by correlation ID"
  - name: "ledger.query.by_topic"
    description: "Query events by Kafka topic"
  - name: "ledger.query.by_time_range"
    description: "Query events within a time range"
# Node capabilities (infrastructure-level feature flags for introspection)
# Extracted at startup by ContractNodeCapabilityExtractor -> ModelNodeCapabilities
node_capabilities:
  postgres: true
  write: true
  database: true
  transactions: true
# Event-driven topic configuration
# Topics use realm-agnostic 5-segment format: onex.<kind>.<producer>.<event-name>.v<N>
# The runtime composes the full qualified topic by prepending env.namespace at startup.
event_bus:
  subscribe_topics:
    - "onex.cmd.platform.ledger-append.v1"
    - "onex.cmd.platform.ledger-query.v1"
  publish_topics:
    - "onex.evt.platform.ledger-appended.v1"
    - "onex.evt.platform.ledger-query-result.v1"
consumed_events:
  - topic: "onex.cmd.platform.ledger-append.v1"
    event_type: "LedgerAppendCommand"
    message_category: "COMMAND"
    description: "Command to append an event to the audit ledger"
  - topic: "onex.cmd.platform.ledger-query.v1"
    event_type: "LedgerQueryCommand"
    message_category: "COMMAND"
    description: "Command to query events from the audit ledger"
published_events:
  - topic: "onex.evt.platform.ledger-appended.v1"
    event_type: "LedgerAppendedEvent"
    description: "Confirmation that event was appended to the ledger"
  - topic: "onex.evt.platform.ledger-query-result.v1"
    event_type: "LedgerQueryResultEvent"
    description: "Result of a ledger query operation"
# IO operations (EFFECT node specific)
# Note: correlation_id is optional (UUID | None) - audit ledger must never drop events.
# Provide correlation_id for distributed tracing when available.
io_operations:
  - operation: "ledger.append"
    description: "Append an event to the audit ledger with idempotent write support"
    input_fields:
      - topic: "str"
      - partition: "int"
      - kafka_offset: "int"
      - event_key: "str | None"
      - event_value: "str"
      - onex_headers: "dict[str, object]"
      - correlation_id: "UUID | None"
      - envelope_id: "UUID | None"
      - event_type: "str | None"
      - source: "str | None"
      - event_timestamp: "datetime | None"
    output_fields:
      - success: "bool"
      - ledger_entry_id: "UUID | None"
      - duplicate: "bool"
      - topic: "str"
      - partition: "int"
      - kafka_offset: "int"
    # Idempotent: Uses ON CONFLICT DO NOTHING with (topic, partition, kafka_offset).
    # Duplicate calls return duplicate=True without creating new entries.
    idempotent: true
  - operation: "ledger.query"
    description: "Query events from the audit ledger by various criteria"
    input_fields:
      - correlation_id: "UUID | None"
      - event_type: "str | None"
      - topic: "str | None"
      - start_time: "datetime | None"
      - end_time: "datetime | None"
      - limit: "int"
      - offset: "int"
    output_fields:
      - entries: "list[ModelLedgerEntry]"
      - total_count: "int"
      - has_more: "bool"
    idempotent: true
# Handler routing for ledger operations
# Handlers compose with HandlerDb for PostgreSQL operations
#
# NOTE (OMN-14139): the handler reference MUST use the nested `handler:
# {name, module}` block -- ModelHandlerRoutingEntry has no handler_class/
# handler_module fields, so a flat entry silently parses to zero handlers
# (discovery._parse_handler_routing skips any entry where h.get("handler")
# is not a dict). `topic:` is likewise required here: with two operation_match
# handler entries and neither declaring event_model/event_type, the topic
# ambiguity guard in handler_wiring._topics_for_handler_entry assigns ZERO
# topics to either entry once more than one handler competes for the
# contract's subscribe_topics.
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "ledger.append"
      handler:
        name: "HandlerLedgerAppend"
        module: "omnibase_infra.nodes.node_ledger_write_effect.handlers.handler_ledger_append"
      topic: "onex.cmd.platform.ledger-append.v1"
      description: "Idempotent append to event ledger with duplicate detection"
    - operation: "ledger.query"
      handler:
        name: "HandlerLedgerQuery"
        module: "omnibase_infra.nodes.node_ledger_write_effect.handlers.handler_ledger_query"
      topic: "onex.cmd.platform.ledger-query.v1"
      description: "Query ledger by correlation_id, time_range, event_type, topic"
# Dependencies (protocols this node requires)
# Note: Ledger handlers compose with HandlerDb internally
dependencies:
  - name: "handler_ledger_append"
    type: "handler"
    class_name: "HandlerLedgerAppend"
    module: "omnibase_infra.nodes.node_ledger_write_effect.handlers.handler_ledger_append"
    description: "Handler for idempotent ledger append operations"
  - name: "handler_ledger_query"
    type: "handler"
    class_name: "HandlerLedgerQuery"
    module: "omnibase_infra.nodes.node_ledger_write_effect.handlers.handler_ledger_query"
    description: "Handler for ledger query operations"
  - name: "handler_db"
    type: "handler"
    class_name: "HandlerDb"
    module: "omnibase_infra.handlers.handler_db"
    description: "PostgreSQL database handler (composed by ledger handlers)"
# Error handling configuration
error_handling:
  retry_policy:
    max_retries: 3
    initial_delay_ms: 100
    max_delay_ms: 5000
    exponential_base: 2
    retry_on:
      - "InfraConnectionError"
      - "InfraTimeoutError"
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    reset_timeout_ms: 60000
  error_types:
    - name: "DatabaseConnectionError"
      description: "Unable to connect to PostgreSQL"
      recoverable: true
      retry_strategy: "exponential_backoff"
    - name: "DatabaseTimeoutError"
      description: "Database operation timed out"
      recoverable: true
      retry_strategy: "exponential_backoff"
    - name: "ValidationError"
      description: "Input validation failed"
      recoverable: false
      retry_strategy: "none"
# Health check configuration
health_check:
  enabled: true
  endpoint: "/health"
  interval_seconds: 30
  timeout_ms: 5000
  checks:
    - name: "database_backend"
      type: "connection"
      critical: true
# Metadata
metadata:
  description: "Capability-oriented effect node for event ledger write operations. Handles appending events to the PostgreSQL audit ledger with idempotent write support via unique constraint on (topic, partition, kafka_offset). Supports querying events by correlation ID, event type, topic, or time range."
  author: "OmniNode Team"
  license: "MIT"
  created: "2026-01-29"
  tags:
    - effect
    - ledger
    - audit
    - storage
    - postgresql
    - capability-oriented
    - idempotent
