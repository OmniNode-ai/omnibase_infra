name: "node_projection_cost_by_repo"
contract_name: "node_projection_cost_by_repo"
node_name: "node_projection_cost_by_repo"
contract_version:
  major: 0
  minor: 1
  patch: 0
node_version:
  major: 0
  minor: 1
  patch: 0
node_type: "COMPUTE_GENERIC"
description: >
  Computes repeatable repository cost snapshots from LLM call metrics and publishes cost.by_repo snapshots for the cost API read path.

input_model:
  name: "ModelEventMessage"
  module: "omnibase_infra.event_bus.models.model_event_message"
  description: "Event bus envelope for repository cost snapshot work."
output_model:
  name: "ModelEventMessage"
  module: "omnibase_infra.event_bus.models.model_event_message"
  description: "Event bus envelope for the emitted repository cost snapshot."
capabilities:
  - name: "cost.by_repo.snapshot"
    description: "Compute and publish repository-level cost projection snapshots."
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "cost.by_repo.snapshot"
      handler:
        name: "HandlerProjectionCostByRepo"
        module: "omnibase_infra.nodes.node_projection_cost_by_repo.handlers.handler_projection_cost_by_repo"
      description: "Compute repository cost totals for one time window."
      input_model:
        name: "ModelEventMessage"
        module: "omnibase_infra.event_bus.models.model_event_message"
        description: "Event bus envelope for repository cost snapshot work."
      event_model:
        name: "ModelEventMessage"
        module: "omnibase_infra.event_bus.models.model_event_message"
event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  publish_topics:
    - "onex.snapshot.projection.cost.by_repo.v1"
topics:
  produces:
    - topic: "onex.snapshot.projection.cost.by_repo.v1"
      description: "Repository cost projection snapshots."
      schema: "ModelCostByRepoSnapshot"
metadata:
  related_tickets:
    - "OMN-10342"
  tags:
    - cost
    - projection
    - snapshot
