name: "node_reward_binder_effect"
node_type: "EFFECT_GENERIC"
contract_version:
  major: 1
  minor: 0
  patch: 1
node_version: "1.0.1"
description: >
  EFFECT node that emits structured reward events to Kafka after ScoringReducer produces an EvaluationResult. Publishes two event types in order: RewardAssignedEvent and PolicyStateUpdatedEvent. This is the only node in the objective pipeline that performs I/O. No scoring logic — only emits what ScoringReducer produced. (RunEvaluatedEvent removed in OMN-2929 — canonical event now in node_evidence_collection_effect.)

input_model:
  name: "ModelRewardBinderInput"
  module: "omnibase_infra.nodes.node_reward_binder_effect.models.model_reward_binder_input"
  description: "Input envelope carrying EvaluationResult and ObjectiveSpec."
output_model:
  name: "ModelRewardBinderOutput"
  module: "omnibase_infra.nodes.node_reward_binder_effect.models.model_reward_binder_output"
  description: "Result reporting emitted event IDs and objective fingerprint."
io_operations:
  - name: "emit_reward_events"
    description: >
      Emit RunEvaluatedEvent, RewardAssignedEvent (per target), and PolicyStateUpdatedEvent to their respective Kafka topics in order.

    input_fields: ["evaluation_result", "objective_spec", "correlation_id"]
    output_fields: ["success", "run_id", "objective_fingerprint", "topics_published"]
event_bus:
  publish_topics:
    - "onex.evt.omnimemory.reward-assigned.v1"
    - "onex.evt.omnimemory.policy-state-updated.v1"
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "emit_reward_events"
      handler:
        name: "HandlerRewardBinder"
        module: "omnibase_infra.nodes.node_reward_binder_effect.handlers.handler_reward_binder"
capabilities:
  - "reward.emit.reward_assigned"
  - "reward.emit.policy_state_updated"
metadata:
  description: "Emits structured reward events to Kafka after ScoringReducer produces an EvaluationResult, publishing RewardAssigned and PolicyStateUpdated events"
  author: "OmniNode Team"
  license: "MIT"
  created: "2026-02-24"
  updated: "2026-06-30"
  ticket: "OMN-7334"
  topic_registry_source: "omnibase_infra.topics SUFFIX_OMNIMEMORY_REWARD_ASSIGNED and SUFFIX_OMNIMEMORY_POLICY_STATE_UPDATED"
  tags:
    - effect
    - reward
    - kafka
    - objective-functions
