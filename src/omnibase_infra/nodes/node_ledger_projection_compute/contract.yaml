# ONEX Node Contract
# Node: NodeLedgerProjectionCompute
#
# COMPUTE node that subscribes to 25 topics (7 platform-lifecycle topics plus
# 18 business command/completion/DLQ topics — OMN-15006) for event ledger
# persistence. This node projects events from the platform event bus into
# the audit ledger for complete traceability and debugging support.
#
# The node subscribes with consumer_purpose="audit" and auto_offset_reset="earliest"
# to ensure no events are missed and all historical events are captured.
#
# Related Tickets:
#   - OMN-1646: Event Ledger Schema and Models
#   - OMN-1647: Ledger Write Effect Node
#   - OMN-1648: Ledger Projection Compute Node
#   - OMN-14823: HandlerLedgerProjection exposes the canonical def-B handle()
#     dispatch entrypoint while preserving ledger.append intent routing.
#   - OMN-15006: widen subscribe_topics from 7 platform-lifecycle topics to
#     25 by adding build_loop (3) + OCC governance (6) + DLQ (9) business
#     topics whose silent loss OMN-15002 documented. The handler
#     (HandlerLedgerProjection) and write-effect (node_ledger_write_effect)
#     are TYPE-AGNOSTIC and required no change — the blindness was a
#     subscription-scoping gap, not a handler bug.
# Contract identifiers
name: "node_ledger_projection_compute"
contract_name: "node_ledger_projection_compute"
node_name: "node_ledger_projection_compute"
contract_version:
  major: 1
  minor: 1
  patch: 0
node_version: "0.2.0"
# Node type - COMPUTE for event projection logic
node_type: "COMPUTE_GENERIC"
# Description
description: >
  COMPUTE node that subscribes to 25 topics (7 platform-lifecycle + 18 business command/completion/DLQ topics, OMN-15006) for event ledger persistence. Projects events from the platform event bus into the audit ledger, enabling complete traceability and debugging support. Uses consumer_purpose="audit" to indicate non-processing read-only consumption and auto_offset_reset="earliest" to capture all historical events. Contract 1.1.0 (OMN-15006) widens the truth surface to build_loop + OCC governance + DLQ topics whose silent loss OMN-15002 documented; contract patch 2 (1.0.2) recorded the OMN-14823 canonical def-B handler entrypoint flip.

# Event bus configuration
event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  # Subscribe to 25 topics for complete audit coverage: 7 platform-lifecycle
  # topics plus 18 business command/completion/DLQ topics (OMN-15006).
  subscribe_topics:
    # Node lifecycle events
    - "onex.evt.platform.node-registration.v1"
    - "onex.evt.platform.node-introspection.v1"
    - "onex.evt.platform.node-heartbeat.v1"
    # Introspection commands
    - "onex.cmd.platform.request-introspection.v1"
    # FSM state tracking
    - "onex.evt.platform.fsm-state-transitions.v1"
    # Runtime coordination
    - "onex.intent.platform.runtime-tick.v1"
    # State snapshots
    - "onex.evt.platform.registration-snapshots.v1"
    # --- OMN-15006: business command/completion/DLQ topics ---
    # build_loop (3) — EnumOmnibaseInfraTopic.CMD_BUILD_LOOP_APPEND_V1,
    # .EVT_BUILD_LOOP_APPENDED_V1; the completion event is owned by
    # omnimarket's node_build_loop_orchestrator (terminal_event) — literal
    # here because infra ↛ market forbids importing EnumOmnimarketTopic.
    - "onex.cmd.omnibase-infra.build-loop-append.v1"
    - "onex.evt.omnibase-infra.build-loop-appended.v1"
    - "onex.evt.omnimarket.build-loop-orchestrator-completed.v1"
    # OCC governance (6) — onex_change_control.kafka.topics.GovernanceTopic;
    # literals here because infra cannot import onex_change_control's enum.
    - "onex.evt.occ.nightly-promotion.v1"
    - "onex.evt.onex-change-control.governance-check-completed.v1"
    - "onex.evt.onex-change-control.contract-drift-detected.v1"
    - "onex.evt.onex-change-control.cosmetic-compliance-scored.v1"
    - "onex.cmd.omnimarket.redeploy-start.v1"
    - "onex.evt.omnimarket.runtime-deployment-proof.v1"
    # DLQ (9) — EnumOmnibaseInfraTopic.DLQ_*_V1. No evt/cmd/intent segment;
    # message_category is "event" per the source-derived fallback documented
    # on each handler_routing entry below.
    - "onex.dlq.omnibase-infra.commands.v1"
    - "onex.dlq.omnibase-infra.events.v1"
    - "onex.dlq.omnibase-infra.intents.v1"
    - "onex.dlq.omnibase-infra.omnibase-infra.v1"
    - "onex.dlq.omnibase-infra.platform.v1"
    - "onex.dlq.omnibase-infra.quarantine.v1"
    - "onex.dlq.omnibase-infra.router.v1"
    - "onex.dlq.omnibase-infra.rsd.v1"
    - "onex.dlq.omnibase-infra.skill.v1"
  # Audit consumer - read-only, non-processing consumption for ledger persistence
  consumer_purpose: "audit"
  # Start from earliest offset to capture all historical events
  auto_offset_reset: "earliest"
  # Consumer group for ledger projection
  consumer_group: "onex-ledger-projection-compute"
# Strongly typed I/O models
input_model:
  name: "ModelEventMessage"
  module: "omnibase_infra.event_bus.models.model_event_message"
  description: >
    Kafka event message containing raw bytes payload and headers. The compute node processes events from all 25 subscribed topics.

output_model:
  name: "ModelIntent"
  module: "omnibase_core.models.reducer.model_intent"
  description: >
    ModelIntent wrapping ModelPayloadLedgerAppend to be passed to NodeLedgerWriteEffect. Contains the event data with Kafka position for idempotent writes.

# Handler routing - delegates compute logic to handler
#
# OMN-14594: one entry PER topic (topic_match), not one operation_match entry
# spanning all 7. Two compounding defects on the single-entry shape:
#
# 1. No event_model -> no payload_type_matcher (OMN-12416). This dispatcher's
#    7 topics are ALSO subscribed by other nodes (e.g.
#    node_registration_orchestrator); MessageDispatchEngine is a single
#    process-wide engine and dispatch() fans out to EVERY registered route
#    for a topic regardless of which subscriber's own Kafka consume loop
#    triggered the call. Without type-scoping, this dispatcher got invoked
#    for every sibling's domain-shaped envelope too, crashing with
#    ValidationError trying to coerce a domain event dict into
#    ModelEventMessage (the raw kafka wrapper this handler actually needs).
# 2. A SINGLE entry/dispatcher spanning topics of MIXED category (5 .evt +
#    1 .cmd + 1 .intent) can only ever be registered under ONE category
#    (handler_wiring derives it once, from either an explicit
#    message_category or the contract's FIRST subscribe_topic) — so 2 of
#    the 7 topics (request-introspection.v1 = command,
#    runtime-tick.v1 = intent) were silently registered under the wrong
#    category and could never route at all (no error — permanent
#    NO_DISPATCHER, same "quiet" symptom class as OMN-14517).
#
# The fix for both: 7 topic_match entries, each single-topic/single-category,
# sharing the same operation + handler class (safe: OMN-14580 folds topic
# into the dispatcher-ID digest, so same-operation/same-handler/different-
# topic entries get distinct dispatcher IDs instead of colliding) and each
# declaring event_model so OMN-12416 type-scoping applies per topic.
handler_routing:
  routing_strategy: "topic_match"
  handlers:
    - topic: "onex.evt.platform.node-registration.v1"
      operation: ledger.project
      message_category: "event"
      handler_type: "ledger_projection"
      event_model:
        name: "ModelEventMessage"
        module: "omnibase_infra.event_bus.models.model_event_message"
      handler:
        name: "HandlerLedgerProjection"
        module: "omnibase_infra.nodes.node_ledger_projection_compute.handlers.handler_ledger_projection"
      supported_operations:
        - "ledger.project"
    - topic: "onex.evt.platform.node-introspection.v1"
      operation: ledger.project
      message_category: "event"
      handler_type: "ledger_projection"
      event_model:
