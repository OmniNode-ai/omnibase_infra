        module: "omnibase_infra.nodes.node_ledger_projection_compute.handlers.handler_ledger_projection"
      supported_operations:
        - "ledger.project"
    - topic: "onex.evt.platform.fsm-state-transitions.v1"
      operation: ledger.project
