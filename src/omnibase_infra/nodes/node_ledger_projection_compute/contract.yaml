# Intent consumption (OMN-14516): the projection emits a `ledger.append` intent
# per consumed platform event. This table is the SOURCE OF TRUTH the kernel uses
# to DERIVE a result applier for this contract — it names the effect node whose
# canonical handle() persists the intent (node_ledger_write_effect →
# HandlerLedgerAppend, keyed by the write-effect's `ledger.append` operation).
# Without this declaration the kernel has no wired effect path, handler_wiring
# FAILS the contract (fail-closed), and event_ledger stays empty. There is no
# by-name kernel allowlist anymore — declare the routing here, get wired.
intent_consumption:
  intent_routing_table:
    "ledger.append": "node_ledger_write_effect"
# Capabilities provided by this node
capabilities:
  - name: "ledger.projection"
    description: "Project platform events into the audit ledger"
    version: "0.1.0"
  - name: "ledger.projection.multi_topic"
    description: "Subscribe to multiple platform topics for comprehensive event capture"
  - name: "ledger.projection.audit"
    description: "Non-processing, read-only event consumption for audit purposes"
# Dependencies (protocols this node requires)
dependencies:
  - name: "node_ledger_write_effect"
    type: "node"
    class_name: "NodeLedgerWriteEffect"
    module: "omnibase_infra.nodes.node_ledger_write_effect"
    description: "Effect node for writing events to the PostgreSQL audit ledger"
  - name: "protocol_event_envelope"
    type: "protocol"
    description: "Protocol for parsing and handling event envelopes"
    optional: false
# Metadata
