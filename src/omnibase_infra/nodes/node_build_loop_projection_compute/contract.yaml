# ONEX Node Contract
# Node: NodeBuildLoopProjectionCompute
#
# COMPUTE node that subscribes to the build_loop_workflow terminal event topic
# and emits ModelIntent payloads for the EFFECT layer to persist into
# build_loop_runs. Mirrors the canonical node_ledger_projection_compute pattern.
#
# Related Tickets:
#   - OMN-9774: Add build-loop projection consumer chain + build_loop_runs table
#   - OMN-8943: Prove Full Four-Node ONEX Pattern End-to-End (parent epic)
#   - OMN-10867: Update build_loop contract schemas to current format
name: "node_build_loop_projection_compute"
node_type: "COMPUTE_GENERIC"
contract_version:
  major: 1
  minor: 0
  patch: 2
node_version: "0.1.2"
description: >
  Subscribes to onex.evt.omnimarket.build-loop-orchestrator-completed.v1 and projects each terminal event into a ModelPayloadBuildLoopAppend intent for NodeBuildLoopWriteEffect to persist into the build_loop_runs append-only audit table. Uses consumer_purpose="audit" and auto_offset_reset="earliest" so retried or replayed terminal events are captured rather than silently swallowed. Mirrors the canonical node_ledger_projection_compute pattern.

event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  subscribe_topics:
    - "onex.evt.omnimarket.build-loop-orchestrator-completed.v1"
  consumer_purpose: "audit"
  auto_offset_reset: "earliest"
  consumer_group: "onex-build-loop-projection-compute"
input_model:
  name: "ModelEventMessage"
  module: "omnibase_infra.event_bus.models.model_event_message"
  description: >
    Kafka event message containing raw bytes payload and headers for the build_loop_workflow terminal event.

output_model:
  name: "ModelIntent"
  module: "omnibase_core.models.reducer.model_intent"
  description: >
    ModelIntent wrapping ModelPayloadBuildLoopAppend, routed to NodeBuildLoopWriteEffect for persistence.

handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - handler_type: "build_loop_projection"
      handler:
        name: "HandlerBuildLoopProjection"
        module: "omnibase_infra.nodes.node_build_loop_projection_compute.handlers.handler_build_loop_projection"
      supported_operations:
        - "build_loop.project"
capabilities:
  - name: "build_loop.projection"
    description: "Project the build_loop_workflow terminal event into a write intent"
    version: "0.1.0"
  - name: "build_loop.projection.audit"
    description: "Read-only, append-only audit consumption of terminal events"
dependencies:
  - name: "node_build_loop_write_effect"
    type: "node"
    class_name: "NodeBuildLoopWriteEffect"
    module: "omnibase_infra.nodes.node_build_loop_write_effect"
    description: "Effect node that persists projected intents into build_loop_runs"
metadata:
  description: >
    Subscribes to the build_loop_workflow terminal event topic and projects each event into a ModelPayloadBuildLoopAppend intent for the EFFECT layer to persist into the build_loop_runs append-only audit table.

  author: "OmniNode Team"
  license: "MIT"
  created: "2026-04-26"
  updated: "2026-05-12"
  ticket: "OMN-9774"
  tags:
    - compute
    - build_loop
    - projection
    - audit
    - omnimarket
