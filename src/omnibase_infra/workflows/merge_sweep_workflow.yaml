# Workflow contract wrapping the merge sweep node orchestrator.
# Enables `onex run` to execute the event-driven merge sweep pipeline.
#
# Topic strings are defined in the orchestrator contract:
#   nodes/node_merge_sweep_workflow_orchestrator/contract.yaml
workflow_id: merge_sweep
contract_version: {major: 1, minor: 0, patch: 0}
node_type: workflow
description: >
  Merge sweep workflow: scan repos for open PRs, classify into tracks, enable auto-merge on Track A PRs.

initial_command: onex.cmd.skill.merge-sweep.v1
terminal_event: onex.evt.skill.merge-sweep-complete.v1
handler:
  class: HandlerMergeSweepInitiate
  module: omnibase_infra.nodes.node_merge_sweep_workflow_orchestrator.handlers.handler_merge_sweep_initiate
  input_model:
    class: ModelMergeSweepCommand
    module: omnibase_infra.nodes.node_merge_sweep_workflow_orchestrator.models.model_merge_sweep_command
nodes:
  - node_merge_sweep_workflow_orchestrator
  - node_merge_sweep_pr_list_effect
  - node_merge_sweep_classify_compute
  - node_merge_sweep_auto_merge_effect
event_flow:
  - source: initial_command
    target: node_merge_sweep_workflow_orchestrator
    topic: onex.cmd.skill.merge-sweep.v1
  - source: node_merge_sweep_workflow_orchestrator
    target: node_merge_sweep_pr_list_effect
    topic: internal
  - source: node_merge_sweep_pr_list_effect
    target: node_merge_sweep_classify_compute
    topic: internal
  - source: node_merge_sweep_classify_compute
    target: node_merge_sweep_auto_merge_effect
    topic: internal
  - source: node_merge_sweep_auto_merge_effect
    target: terminal
    topic: onex.evt.skill.merge-sweep-complete.v1
