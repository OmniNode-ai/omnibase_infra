# Build loop workflow contract.
# Declares the 7-node workflow that orchestrates the autonomous build loop
# through 6 phases: CLOSING_OUT -> VERIFYING -> FILLING -> CLASSIFYING -> BUILDING -> COMPLETE
#
# See: OMN-5113 — Autonomous Build Loop
workflow_id: build_loop
contract_version: {major: 1, minor: 0, patch: 0}
node_type: workflow
description: >
  Autonomous build loop 6-phase orchestration. Coordinates close-out, verification, sprint fill, ticket classification, and build dispatch through a reducer-driven FSM with circuit breaker protection.

initial_command: onex.cmd.omnibase-infra.build-loop-start.v1
terminal_event: onex.evt.omnibase-infra.build-loop-cycle-completed.v1
handler:
  class: HandlerLoopOrchestrator
  module: omnibase_infra.nodes.node_autonomous_loop_orchestrator.handlers.handler_loop_orchestrator
  input_model:
    class: ModelLoopStartCommand
    module: omnibase_infra.nodes.node_autonomous_loop_orchestrator.models.model_loop_start_command
nodes:
  - node_autonomous_loop_orchestrator
  - node_loop_state_reducer
  - node_closeout_effect
  - node_verify_effect
  - node_rsd_fill_compute
  - node_ticket_classify_compute
  - node_build_dispatch_effect
event_flow:
  - source: initial_command
    target: node_autonomous_loop_orchestrator
    topic: onex.cmd.omnibase-infra.build-loop-start.v1
  - source: node_autonomous_loop_orchestrator
    target: node_loop_state_reducer
    topic: internal
  - source: node_autonomous_loop_orchestrator
    target: node_closeout_effect
    topic: internal
  - source: node_autonomous_loop_orchestrator
    target: node_verify_effect
    topic: internal
  - source: node_autonomous_loop_orchestrator
    target: node_rsd_fill_compute
    topic: internal
  - source: node_autonomous_loop_orchestrator
    target: node_ticket_classify_compute
    topic: internal
  - source: node_autonomous_loop_orchestrator
    target: node_build_dispatch_effect
    topic: internal
  - source: node_autonomous_loop_orchestrator
    target: terminal
    topic: onex.evt.omnibase-infra.build-loop-cycle-completed.v1
