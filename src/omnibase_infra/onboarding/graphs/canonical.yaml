#
# Canonical onboarding graph — 10 MVP steps.
# Each step uses ModelOrchestratorStep fields with capability/verification extensions.
#
# DAG:
#   check_python -> install_uv -> install_core -> create_first_node -> run_standalone_node
#                                              \-> check_docker_infra -> check_event_bus -> check_node_bus_connection
#                                                                    \-> check_secrets
#                                                                                      \-> check_omnidash
#                                                                                      \-> configure_cloud_credentials -> deploy_to_cloud
#                                                                                                                     \-> configure_hybrid_split -> deploy_hybrid
title: "onex_onboarding_canonical"
description: "Canonical onboarding graph for the ONEX platform"
version: {major: 1, minor: 0, patch: 0}
steps:
  - step_key: "check_python"
    name: "Check Python Installation"
    step_type: "verification"
    description: "Verify Python 3.12+ is available"
    depends_on: []
    required_capabilities: []
    produces_capabilities: ["python_installed"]
    tags: ["prerequisite"]
    estimated_duration_seconds: 5
    verification:
      check_type: "command_exit_0"
      target: "python3 --version"
      timeout_seconds: 10
      description: "Python 3 is installed and on PATH"
  - step_key: "install_uv"
    name: "Install uv Package Manager"
    step_type: "action"
    description: "Install uv for dependency management"
    depends_on: ["check_python"]
    required_capabilities: ["python_installed"]
    produces_capabilities: ["uv_installed"]
    tags: ["setup", "tooling"]
    estimated_duration_seconds: 30
    verification:
      check_type: "command_exit_0"
      target: "uv --version"
      timeout_seconds: 10
      description: "uv is installed and on PATH"
  - step_key: "install_core"
    name: "Install omnibase_core"
    step_type: "action"
    description: "Install the core ONEX package with uv"
    depends_on: ["install_uv"]
    required_capabilities: ["uv_installed"]
    produces_capabilities: ["core_installed"]
    tags: ["setup", "dependencies"]
    estimated_duration_seconds: 60
    verification:
      check_type: "python_import"
      target: "omnibase_core"
      timeout_seconds: 10
      description: "omnibase_core is importable"
  - step_key: "create_first_node"
    name: "Create First Node"
    step_type: "action"
    description: "Scaffold a minimal ONEX node using the CLI"
    depends_on: ["install_core"]
    required_capabilities: ["core_installed"]
    produces_capabilities: ["node_created"]
    tags: ["development"]
    estimated_duration_seconds: 30
    verification:
      check_type: "file_exists"
      target: "my_first_node/node.py"
      timeout_seconds: 5
      description: "Node scaffold directory exists"
  - step_key: "run_standalone_node"
    name: "Run Standalone Node"
    step_type: "action"
    description: "Execute the node in standalone mode (no infrastructure)"
    depends_on: ["create_first_node"]
    required_capabilities: ["node_created"]
    produces_capabilities: ["first_node_running"]
    tags: ["development", "standalone"]
    estimated_duration_seconds: 15
    verification:
      check_type: "command_exit_0"
      target: "uv run python -m my_first_node.node --dry-run"
      timeout_seconds: 30
      description: "Node executes successfully in dry-run mode"
  - step_key: "check_docker_infra"
    name: "Check Docker Infrastructure"
    step_type: "action"
    description: "Start PostgreSQL, Redpanda, and Valkey via Docker Compose"
    depends_on: ["install_core"]
    required_capabilities: ["core_installed"]
    produces_capabilities: ["docker_infra_running"]
    tags: ["infrastructure"]
    estimated_duration_seconds: 120
    verification:
      check_type: "tcp_probe"
      target: "${POSTGRES_HOST}:${POSTGRES_PORT}"
      timeout_seconds: 30
      description: "PostgreSQL is accepting connections on external port"
  - step_key: "check_event_bus"
    name: "Check Event Bus"
    step_type: "action"
    description: "Verify Redpanda/Kafka event bus is running"
    depends_on: ["check_docker_infra"]
    required_capabilities: ["docker_infra_running"]
    produces_capabilities: ["event_bus_running"]
    tags: ["infrastructure", "messaging"]
    estimated_duration_seconds: 30
    verification:
      check_type: "tcp_probe"
      target: "${REDPANDA_HOST}:${REDPANDA_PORT}"
      timeout_seconds: 15
      description: "Redpanda is accepting connections on external port"
  - step_key: "check_node_bus_connection"
    name: "Check Node Bus Connection"
    step_type: "action"
    description: "Configure node to publish/consume events via Kafka"
    depends_on: ["check_event_bus"]
    required_capabilities: ["event_bus_running"]
    produces_capabilities: ["event_bus_connected"]
    tags: ["development", "messaging"]
    estimated_duration_seconds: 60
    verification:
      check_type: "command_exit_0"
      target: "uv run python -c \"from omnibase_infra.event_bus import get_bus; print('ok')\""
      timeout_seconds: 15
      description: "Event bus client imports successfully"
  - step_key: "check_secrets"
    name: "Check Secrets"
    step_type: "action"
    description: "Set up ~/.omnibase/.env with required environment variables"
    depends_on: ["check_docker_infra"]
    required_capabilities: ["docker_infra_running"]
    produces_capabilities: ["secrets_configured"]
    tags: ["infrastructure", "security"]
    estimated_duration_seconds: 120
    verification:
      check_type: "file_exists"
      target: "~/.omnibase/.env"
      timeout_seconds: 5
      description: "Environment file exists"
  - step_key: "check_omnidash"
    name: "Check Omnidash Dashboard"
    step_type: "action"
    description: "Start the analytics dashboard for monitoring"
    depends_on: ["check_secrets"]
    required_capabilities: ["secrets_configured"]
    produces_capabilities: ["omnidash_running"]
    tags: ["monitoring", "dashboard"]
    estimated_duration_seconds: 60
    verification:
      check_type: "http_health"
      target: "http://${OMNIDASH_HOST}:${OMNIDASH_PORT}"
      timeout_seconds: 30
      description: "Omnidash is serving on port 3000"
  - step_key: "install_omnimarket"
    name: "Install omnimarket"
    step_type: "action"
    description: "Install the omnimarket package with uv"
    depends_on: ["install_uv"]
    required_capabilities: ["uv_installed"]
    produces_capabilities: ["omnimarket_installed"]
    tags: ["setup", "dependencies", "omnimarket"]
    estimated_duration_seconds: 60
    verification:
      check_type: "python_import"
      target: "omnimarket"
      timeout_seconds: 10
      description: "omnimarket is importable"
  - step_key: "validate_omnimarket_config"
    name: "Validate omnimarket Config"
    step_type: "action"
    description: "Run the omnimarket config validator to confirm all required secrets and env vars are present"
    depends_on: ["install_omnimarket", "check_secrets"]
    required_capabilities: ["omnimarket_installed", "secrets_configured"]
    produces_capabilities: ["omnimarket_config_valid"]
    tags: ["setup", "validation", "omnimarket"]
    estimated_duration_seconds: 30
    verification:
      check_type: "command_exit_0"
      target: "uv run python -m omnimarket.cli validate-config"
      timeout_seconds: 30
      description: "omnimarket validate-config exits 0"
  - step_key: "register_omnimarket_node"
    name: "Register omnimarket Node"
    step_type: "action"
    description: "Register the first omnimarket node with the runtime registry"
    depends_on: ["validate_omnimarket_config", "check_node_bus_connection"]
    required_capabilities: ["omnimarket_config_valid", "event_bus_connected"]
    produces_capabilities: ["omnimarket_node_registered"]
    tags: ["development", "omnimarket", "messaging"]
    estimated_duration_seconds: 30
    verification:
      check_type: "command_exit_0"
      target: "uv run python -m omnimarket.cli register-node --dry-run"
      timeout_seconds: 30
      description: "omnimarket register-node dry-run exits 0"
  - step_key: "configure_cloud_credentials"
    name: "Configure Cloud Credentials"
    step_type: "action"
    description: "Set up cloud provider credentials for remote deployment"
    depends_on: ["check_secrets"]
    required_capabilities: ["secrets_configured"]
    produces_capabilities: ["cloud_credentials_configured"]
    tags: ["cloud", "infrastructure"]
    estimated_duration_seconds: 120
    verification:
      check_type: "file_exists"
      target: "~/.omnibase/cloud-config.yaml"
      timeout_seconds: 5
      description: "Cloud configuration file exists"
  - step_key: "deploy_to_cloud"
    name: "Deploy to Cloud"
    step_type: "action"
    description: "Deploy ONEX runtime to cloud provider"
    depends_on: ["configure_cloud_credentials", "check_node_bus_connection"]
    required_capabilities: ["cloud_credentials_configured", "event_bus_connected"]
    produces_capabilities: ["cloud_deployed"]
    tags: ["cloud", "deployment"]
    estimated_duration_seconds: 300
    verification:
      check_type: "command_exit_0"
      target: "uv run python -m omnibase_infra.cli cloud-health-check"
      timeout_seconds: 60
      description: "Cloud deployment responds to health check"
  - step_key: "configure_hybrid_split"
    name: "Configure Hybrid Service Split"
    step_type: "action"
    description: "Declare which services run locally and which run in the cloud"
    depends_on: ["configure_cloud_credentials", "check_docker_infra"]
    required_capabilities: ["cloud_credentials_configured", "docker_infra_running"]
    produces_capabilities: ["hybrid_split_configured"]
    tags: ["hybrid", "infrastructure"]
    estimated_duration_seconds: 60
    verification:
      check_type: "file_exists"
      target: "~/.omnibase/hybrid-split.yaml"
      timeout_seconds: 5
      description: "Hybrid split configuration file exists"
  - step_key: "deploy_hybrid"
    name: "Deploy Hybrid Topology"
    step_type: "action"
    description: "Deploy ONEX runtime in hybrid topology (local + cloud services)"
    depends_on: ["configure_hybrid_split", "check_node_bus_connection"]
    required_capabilities: ["hybrid_split_configured", "event_bus_connected"]
    produces_capabilities: ["hybrid_deployed"]
    tags: ["hybrid", "deployment"]
    estimated_duration_seconds: 240
    verification:
      check_type: "command_exit_0"
      target: "uv run python -m omnibase_infra.cli hybrid-health-check"
      timeout_seconds: 60
      description: "Hybrid deployment responds to health check"
