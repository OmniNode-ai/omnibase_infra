policy_name: "new_employee"
description: "Full platform onboarding for new employees (target: ~45 min, unvalidated on fresh machine)"
target_capabilities:
  - "omnidash_running"
  - "secrets_configured"
  - "event_bus_connected"
  - "first_node_running"
max_estimated_minutes: 45
