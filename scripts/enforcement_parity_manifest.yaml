#
# Enforcement + Merge-Policy Parity Manifest (OMN-14288)
#
# Single, org-wide, machine-asserted declaration of the DETERMINISTIC
# branch-protection policy per repo+branch — expressed as config-as-data, the
# same way the rest of the architecture is. Two dimensions:
#
#   1. load_bearing_gates[] -- the safety gates CLAUDE.md / doctrine CLAIM are
#      enforced (deploy-gate, reject-skip, CI Summary, ...).
#   2. merge_policy         -- the DECIDED merge policy: whether a dev merge
#      queue is enabled, and whether `strict` (require-branches-up-to-date) is on.
#
# The report-only parity ratchet (scripts/audit_required_context_parity_cli.py)
# reads this file, fetches live branch-protection + workflow + merge-queue state,
# and reports where LIVE state drifts from this DECLARED policy. REPORT-ONLY: it
# never mutates branch protection.
#
# This REPLACES the honor-system, per-repo, main-scoped `.github/required-checks.yaml`
# prose manifests AND the recurring human "re-verify branch protection after
# merges" ritual with one machine-checked source of truth.
#
# Coverage modes (load_bearing_gates):
#   direct       -- the gate MUST appear literally in required_status_checks
#                   (with reusable-context fuzzy-leaf normalization). The only
#                   correct pattern for a gate that lives in its OWN workflow file
#                   (deploy-gate, reject-skip, ...), because a `needs:` closure is
#                   intra-workflow only and can never reach it.
#   needs_child  -- enforced transitively: its emitting job is in the `needs:`
#                   closure of a required aggregator job (e.g. occ-preflight
#                   feeding "CI Summary"). Verified structurally, not assumed.
#
# merge_policy:
#   queue: enabled|disabled  -- DECIDED policy: as of 2026-07-10 the merge queue
#                   is DISABLED on ALL OmniNode dev branches. A merge queue's only
#                   unique value is the `merge_group` re-test-against-latest-base,
#                   which wedges the saturated self-hosted fleet; required contexts
#                   fire on `pull_request`, so disabling loses no enforcement.
#   strict: bool  -- require-branches-up-to-date, the lighter combine-breakage
#                   guard. DECIDED true on the two dashboards (omnidash,
#                   omnibase_compat); recorded as-is for the rest.
#
# Live values verified 2026-07-10 via gh api + gh api graphql mergeQueue(branch:"dev").
version: 1
owner: OmniNode-ai
repos:
  # --- The two repos that wired the cross-workflow gates CORRECTLY (control) ---
  omnibase_core:
    dev:
      merge_policy:
        queue: disabled
        strict: false
        rule: "queue disabled org-wide (OMN-14077 precedent); strict recorded as-is"
      load_bearing_gates:
        - context: "deploy-gate / deploy-gate"
          coverage: direct
          rule: "CLAUDE.md #4 / PR-CI-Req #4 (deploy-gate)"
        - context: "call-reject-skip-token / scan / reject-skip-gate-token"
          coverage: direct
          rule: "CLAUDE.md #10 (reject-deploy-gate-skip)"
        - context: "CI Summary"
          coverage: direct
          rule: "Merge Queue Policy / OMN-4497 (umbrella correctness gate)"
  omnibase_infra:
    dev:
      merge_policy:
        queue: disabled
        strict: false
        rule: "queue disabled org-wide; strict recorded as-is"
      load_bearing_gates:
        - context: "deploy-gate / deploy-gate"
          coverage: direct
          rule: "CLAUDE.md #4 / PR-CI-Req #4 (deploy-gate)"
        - context: "call-reject-skip-token / scan / reject-skip-gate-token"
          coverage: direct
          rule: "CLAUDE.md #10 (reject-deploy-gate-skip)"
        - context: "CI Summary"
          coverage: direct
          rule: "Merge Queue Policy / OMN-4497 (umbrella correctness gate)"
  # --- The two repos the audit CONFIRMED are missing the gates (M1-M4) ---
  omnimarket:
    dev:
      merge_policy:
        queue: disabled
        strict: false
        rule: "queue disabled org-wide; strict recorded as-is"
      load_bearing_gates:
        - context: "deploy-gate / deploy-gate"
          coverage: direct
          rule: "CLAUDE.md #4 / PR-CI-Req #4 (deploy-gate) -- spec M1"
        - context: "call-reject-skip-token / scan / reject-skip-gate-token"
          coverage: direct
          rule: "CLAUDE.md #10 (reject-deploy-gate-skip) -- spec M2"
        - context: "CI Summary"
          coverage: direct
          rule: "Merge Queue Policy / OMN-4497 (umbrella correctness gate)"
        # occ-preflight IS transitively enforced via CI Summary's needs-closure
        # on omnimarket (spec §2 note). Declared needs_child to exercise + prove
        # the closure check reports it COVERED (not a false MISSING).
        - context: "occ-preflight"
          coverage: needs_child
          aggregator: "CI Summary"
          aggregator_workflow: "ci.yml"
          aggregator_job_id: "ci-summary"
          gate_job_id: "occ-preflight"
          rule: "reference_occ_receipt_gate_flow (transitive via CI Summary)"
  omniclaude:
    dev:
      merge_policy:
        queue: disabled
        strict: false
        rule: "queue disabled org-wide; strict recorded as-is"
      load_bearing_gates:
        # omniclaude runs deploy-gate inline (single-segment context), unlike the
        # reusable-workflow "deploy-gate / deploy-gate" on core/infra/market.
        - context: "deploy-gate"
          coverage: direct
          rule: "CLAUDE.md #4 / PR-CI-Req #4 (deploy-gate) -- spec M3"
        - context: "scan / reject-skip-gate-token"
          coverage: direct
          rule: "CLAUDE.md #10 (reject-deploy-gate-skip) -- spec M4"
        - context: "CI Summary"
          coverage: direct
          rule: "Merge Queue Policy / OMN-4497 (umbrella correctness gate)"
  # --- Merge-policy-only repos (no deploy-gate.yml; not in the gate scope) ---
  # These have no runtime contracts, so deploy-gate/reject-skip parity gates do
  # not apply. The merge_policy dimension still does.
  onex_change_control:
    dev:
      merge_policy:
        queue: disabled # OMN-14077: dev "Merge Queue" ruleset disabled 2026-07-06
        strict: false
        rule: "OMN-14077 (dev queue disabled, zero enforcement lost); strict as-is"
  omnidash:
    dev:
      merge_policy:
        queue: disabled # last two dev queues disabled 2026-07-10
        strict: true # DECIDED: lighter combine-breakage guard replaces the queue
        rule: "2026-07-10 dashboard policy: queue off, strict on (app_id-15368 preserved)"
  omnibase_compat:
    dev:
      merge_policy:
        queue: disabled # last two dev queues disabled 2026-07-10
        strict: true # DECIDED: lighter combine-breakage guard replaces the queue
        rule: "2026-07-10 dashboard policy: queue off, strict on (app_id-15368 preserved)"
  omnibase_spi:
    dev:
      merge_policy:
        queue: disabled # DECIDED policy: queue disabled org-wide
        strict: false # recorded as-is
        rule: "queue disabled org-wide (decided); strict recorded as-is"
      # NOTE (verified 2026-07-10): omnibase_spi dev still has a LIVE merge queue
      # (mergeQueue id present) against the decided queue=disabled policy, so the
      # ratchet reports QUEUE_DRIFT here. This is real drift surfaced by the
      # merge-policy dimension, not a manifest error — disabling it is a separate,
      # operator/admin branch-protection action (this ratchet does not mutate).

# omniweb is DELIBERATELY omitted. Its `dev` branch has no protection object
# (spec M5), but omniweb deploys from `main` (not dev), so dev protection may be
# intentionally absent. Flagged in the audit spec for confirmation, NOT asserted
# as a defect here. Add it once the intent is confirmed.
