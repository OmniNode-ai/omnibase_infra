spec:
  template:
    spec:
      containers:
        - name: test-app
          env:
            - name: OMNIBASE_INFRA_DB_URL
              valueFrom:
                secretKeyRef:
                  name: test-creds
                  key: OMNIBASE_INFRA_DB_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: test-creds
                  key: NEXTAUTH_SECRET
